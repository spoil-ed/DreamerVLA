# @package _global_
# Chunk-aware WM predictor (true Plan B) over RynnVLA legacy action hidden.
# External VLA latent-observation shape is derived from time_horizon * action_dim * token_dim.
#
# Objective: autoregressive K-step prediction.
#   Each step concatenates the encoded action to every obs token channel,
#   predicts h_{t+1}, then slides that predicted hidden into the next history.
#   Loss is hidden MSE + cosine over the K predicted frames plus the binary
#   reward head (trained on TARGET hiddens, matching parent's convention).
#
# Checkpoint compatibility:
#   This WM-style concat architecture is not shape-compatible with older
#   model_dim=1024 projection/mask-token chunk checkpoints.

defaults:
  - _self_
  - /task: libero_goal

_target_: dreamervla.runners.LatentWMRunner

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/worldmodel/chunk/${now:%Y%m%d_%H%M%S}}
  device: cuda:0
  distributed_strategy: single
  data_parallel: false
  seed: 7
  max_steps: null
  num_epochs: 20
  log_every: 20
  save_every: 1000
  tqdm_interval_sec: 1.0
  resume: false
  resume_path: null
  resume_strict: false
  resume_skip_optimizer: true
  # When warm-starting from a per-step ckpt to launch a NEW chunk-loss run,
  # set this to true: global_step / epoch / RNG stay at fresh-seed values
  # so the lr warmup, save_every cadence and epoch budget all behave as
  # a fresh run.  Leave at false for ordinary mid-training resume.
  resume_reset_step: false
  save_final: true

dataset:
  # Chunk-aware training uses the balanced-terminal sidecar so the reward head
  # has a valid `rewards` field per window (per_window_dense: +1 across every
  # frame of a terminal-ending window).  sequence_length must be >= H + K = 8;
  # we keep 32 for parity with the per-step ckpt training run.
  _target_: dreamervla.dataset.balanced_terminal_dataset.BalancedTerminalDataset
  hdf5_dir: ${task.hdf5_reward_dir}
  hidden_dir: ${task.rynnvla_action_hidden_dir}
  expected_model_path: ${task.vla_ckpt_path}
  expected_encoder_state_ckpt: null
  expected_time_horizon: ${task.legacy_action_hidden.chunk_size}
  expected_action_head_type: ${task.legacy_action_hidden.expected_action_head_type}
  expected_obs_hidden_source: ${task.legacy_action_hidden.expected_obs_hidden_source}
  expected_prompt_style: ${task.legacy_action_hidden.expected_prompt_style}
  expected_history: ${task.legacy_action_hidden.expected_history}
  expected_include_state: ${task.legacy_action_hidden.expected_include_state}
  expected_rotate_images_180: ${task.legacy_action_hidden.expected_rotate_images_180}
  reward_mode: per_window_dense
  balanced_length: 50000
  balanced_seed: 0
  sequence_length: 24  # H + N*K + 1 = 3 + 4*5 + 1 for 4-chunk closed-loop rollout
  image_size: ${task.image_size}
  image_keys: ${task.image_keys}
  hidden_key: ${task.hidden_key}
  load_actor_sequence: false
  stride: 1
  max_files: null
  max_demos_per_file: null
  max_windows: null

dataloader:
  batch_size: 16
  num_workers: 4
  pin_memory: true
  drop_last: true
  persistent_workers: true
  prefetch_factor: 2
  multiprocessing_context: null

world_model:
  # WM-style chunk transition: action is encoded and concatenated to every
  # obs token channel; chunk rollout is autoregressive over predicted hiddens.
  _target_: dreamervla.models.world_model.wm_chunk.ChunkAwareWorldModel
  chunk_size: ${task.legacy_action_hidden.chunk_size}
  # Close-loop multi-chunk rollout loss to cure WM-internal autoregressive drift.
  # N=4 means chunks 1..3 are rolled forward from chunk 0's predicted hidden
  # (no teacher forcing).  Constraint: sequence_length >= num_hist + N*K.
  chunk_rollout_chunks: 4
  chunk_rollout_loss_scale: 1.0
  obs_dim: ${task.legacy_action_hidden.wm_obs_dim}
  action_dim: ${task.action_dim}
  token_count: ${task.legacy_action_hidden.token_count}
  token_dim: ${task.legacy_action_hidden.token_dim}
  time_horizon: ${task.legacy_action_hidden.chunk_size}
  latent_stage: ${task.legacy_action_hidden.latent_stage}
  action_emb_dim: 10
  num_action_repeat: 1
  model_dim: 1034
  depth: 6
  heads: 16
  dim_head: 64
  mlp_dim: 2048
  dropout: 0.1
  num_hist: 3
  num_pred: 1
  max_seq_len: 128
  hidden_loss_scale: 1.0
  cosine_loss_scale: 0.1
  # NOTE: parent's rollout_loss_scale / rollout_horizon / rollout_context are
  # NEVER invoked here — chunk WM overrides loss() to chunk_loss only.
  reward_head_type: binary
  reward_loss_scale: 32.0
  reward_hidden_dim: 1024
  reward_init_logit: 0.0
  reward_pos_weight: 1.0
  return_predictions: false

optim:
  lr: 5e-5
  beta1: 0.9
  beta2: 0.999
  eps: 1e-20
  weight_decay: 0.0
  warmup: 1000
  grad_clip: 100.0

viz:
  enabled: false
