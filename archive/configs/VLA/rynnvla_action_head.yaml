# @package _global_
defaults:
  - _self_
  - /task: libero_goal

_target_: dreamervla.runners.VLASFTRunner
seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda:0
  debug: false

training:
  device: cuda:0
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/vla/rynnvla_action_head/${now:%Y%m%d_%H%M%S}}
  debug: false
  resume: false
  resume_advance_epoch: false
  distributed_strategy: fsdp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  train_encoder_backbone: true
  vla_train_action_head_only: true
  num_epochs: 20
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 50
  vla_action_loss_coef: 10
  vla_token_loss_coef: 1

ema:
  decay: 0.9999
  update_after_step: 0

init:
  vla_ckpt_path: ${task.vla_ckpt_path}

encoder:
  _target_: dreamervla.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: ${task.tokenizer_path}
  text_tokenizer_path: ${task.text_tokenizer_path}
  chameleon_vqgan_config: ${task.chameleon_vqgan_config}
  chameleon_vqgan_ckpt: ${task.chameleon_vqgan_ckpt}
  resolution: ${task.image_resolution}
  action_dim: ${task.action_dim}
  time_horizon: ${task.legacy_action_hidden.chunk_size}
  action_head_type: legacy
  pool: mean

dataset:
  _target_: dreamervla.dataset.pretokenize_dataset.PretokenizeActionChunkDataset
  config_path: ${task.pretokenize_config_path}
  action_horizon: ${task.action_horizon}

dataset_val_ind:
  _target_: dreamervla.dataset.pretokenize_dataset.PretokenizeActionChunkDataset
  config_path: ${task.pretokenize_val_ind_config_path}
  action_horizon: ${task.action_horizon}

dataset_val_ood:
  _target_: dreamervla.dataset.pretokenize_dataset.PretokenizeActionChunkDataset
  config_path: ${task.pretokenize_val_ood_config_path}
  action_horizon: ${task.action_horizon}

dataloader:
  batch_size: 20
  num_workers: 2
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true

optim:
  grad_clip_norm: 4.0
  zero_grad_set_to_none: true
  vla:
    name: adamw
    lr: 5.0e-6
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.1

eval:
  eval_every: 1

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  save_hf_encoder: true
  hf_safe_serialization: true
  topk:
    monitor_key: train_vla_loss
    mode: min
    k: 3
    format_str: 'epoch={epoch:03d}-train_vla_loss={train_vla_loss:.3f}.ckpt'
