# RLINF-03: lightweight CI gate (RLinf-aligned engineering hygiene).
#
# Scope note — this repo deliberately runs only the dependency-free checks on
# stock GitHub runners:
#   * `ruff check` and `ruff format --check` are the whole-repo source gates
#     (fast, no heavy deps). The vendored LIBERO venv remains format-exempt.
#   * `bash -n` checks every tracked launcher/install/preprocess shell script.
#   * The pytest suite is NOT run here: it requires the hand-built `dreamervla`
#     conda env (transformers 4.40.1 fork, robosuite/third_party, torch) which
#     is not reproducible from PyPI on a stock runner. Run it locally with
#     `conda run -n dreamervla python -m pytest tests/unit_tests`.
#   * An `__init__.py`-presence check is intentionally omitted: several packages
#     use PEP 420 namespace packages (no `__init__.py`) on purpose.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff==0.15.14"
      - name: Lint
        run: ruff check dreamervla tests
      - name: Check formatting
        run: >-
          ruff format --check dreamervla tests
          --exclude dreamervla/envs/libero/venv.py
      - name: Check shell syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
