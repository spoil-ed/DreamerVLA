name: docker-publish

on:
  workflow_dispatch:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "docker/**"
      - ".dockerignore"
      - "requirements.txt"
      - "scripts/install/**"
      - "scripts/install_env.sh"
      - "dreamervla/**"
      - "configs/**"

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Resolve image tags
        id: image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          namespace="${DOCKERHUB_USERNAME:-local}"
          short_sha="${GITHUB_SHA::12}"
          echo "name=${namespace}/dreamervla" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            DVLA_GIT_COMMIT=${{ github.sha }}
            DVLA_IMAGE_VERSION=cu124-h100-v1
            DVLA_BUILD_TIME=${{ github.event.repository.updated_at }}
          tags: |
            ${{ steps.image.outputs.name }}:cu124-h100-v1
            ${{ steps.image.outputs.name }}:v1
            ${{ steps.image.outputs.name }}:sha-${{ steps.image.outputs.short_sha }}

