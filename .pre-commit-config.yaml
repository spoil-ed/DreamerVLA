repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.14"
    hooks:
      - id: ruff
        args: ["--preview", "--fix"]
      - id: ruff-format
        # This file is vendored from LIBERO; lint it, but preserve upstream layout.
        exclude: ^dreamervla/envs/libero/venv\.py$

  - repo: https://github.com/commit-check/commit-check
    rev: "v0.10.2"
    hooks: # support hooks
    -   id: check-message  # requires commit-msg hook
    -   id: check-commit-signoff

# https://pre-commit.com/
