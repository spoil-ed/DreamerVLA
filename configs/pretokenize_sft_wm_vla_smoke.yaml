_target_: src.workspace.pretokenize_sft_workspace.PretokenizeSFTWorkspace

seed: 7

hydra:
  run:
    dir: .
  output_subdir: null

trainer:
  device: cuda
  debug: false

training:
  device: cuda
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/smoke_pretokenize_sft_wm_vla
  debug: false
  resume: false
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: false
  num_epochs: 1
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: 1
  use_ema: false
  train_encoder_backbone: false
  vla_train_action_head_only: true
  checkpoint_every: 1

init:
  vla_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10

encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/models--Alpha-VLLM--Lumina-mGPT-7B-768
  text_tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 10
  pool: mean

world_model:
  _target_: src.models.world_model.TSSMWorldModel
  hidden_dim: 4096
  action_dim: 7
  latent_dim: 256
  state_token_count: 1
  mapper_hidden_dim: 1024
  dynamics_hidden_dim: 4096
  reward_hidden_dim: 512
  reward_loss_coef: 0.1
  kl_loss_coef: 0.1
  min_std: 0.1
  pretrained_model_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/Action_World_model_512/libero_10
  freeze_transition_backbone: false
  backbone_dtype: bfloat16
  transition_time_horizon: null

dataset:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/smoke_pretokenize.yaml

dataloader:
  batch_size: 2
  num_workers: 0
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: false

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  vla:
    name: adam
    lr: 5.0e-6
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.15
  world_model:
    name: adam
    lr: 1.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

checkpoint:
  save_last_ckpt: false
  save_last_snapshot: false
  topk:
    monitor_key: train_vla_loss
    mode: min
    k: 1
    format_str: 'epoch={epoch:03d}-train_vla_loss={train_vla_loss:.3f}.ckpt'
