# V4-I capacity stress test for the current legacy action-hidden target.
# Target stays fixed at 35 * 1024 = 35840.  RSSM feature capacity is increased,
# and the hidden decoder is deepened with residual MLP blocks.
defaults:
  - dreamer_vla_libero_goal_pi0_legacy_action_hidden_head_actor
  - _self_

training:
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/dreamervla_diag/pi0_legacy_v4i_overdim
  run_actor_critic_phase: false
  run_wm_phase: true
  num_epochs: 8
  checkpoint_every: 1

init:
  require_encoder_state_ckpt: false

dataset:
  sequence_length: 8

dataloader:
  # Per-rank batch size; the launcher uses 2 GPUs by default, so effective batch is 192.
  batch_size: 96
  num_workers: 4

world_model:
  obs_dim: 35840
  # Preserve the RSSM h:z ratio from the current baseline:
  # 8192 : (32*64=2048) = 12288 : (48*64=3072) = 4 : 1.
  # Keep the internal RSSM hidden:deter ratio as 1024:8192 = 1536:12288.
  deter: 12288
  hidden: 1536
  stoch: 48
  classes: 64
  hidden_decoder_kind: resnet
  hidden_decoder_layers: 8
  hidden_decoder_units: 8192
  rec_scale: 0.01
  hidden_rec_scale: 1000.0

policy:
  hidden_dim: 35840
  head_type: legacy

critic:
  hidden_dim: 15360

checkpoint:
  topk:
    monitor_key: epoch_wm_loss
    mode: min
    k: 3
    format_str: 'epoch={epoch:03d}-epoch_wm_loss={epoch_wm_loss:.4f}.ckpt'
