# @package _global_
# Scheme B: DreamerVLA over OpenVLA-OFT frame-level projected vision tokens.
defaults:
  - dreamervla_oft_dino_wm_wmpo_outcome
  - _self_

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,data}/outputs/dreamervla/oft_wmpo_outcome_input_tokens/${task.name}/${now:%Y%m%d_%H%M%S}}

init:
  world_model_state_ckpt: null
  classifier_state_ckpt: null

dataset:
  hidden_dir: ${task.openvla_oft.input_token_hidden_dir}
  expected_action_head_type: ${task.openvla_oft.input_tokens.expected_action_head_type}
  expected_obs_hidden_source: ${task.openvla_oft.input_tokens.expected_obs_hidden_source}
  expected_prompt_style: ${task.openvla_oft.input_tokens.expected_prompt_style}
  expected_history: ${task.openvla_oft.input_tokens.expected_history}
  expected_include_state: ${task.openvla_oft.input_tokens.expected_include_state}
  expected_rotate_images_180: ${task.openvla_oft.input_tokens.expected_rotate_images_180}

world_model:
  chunk_size: ${task.openvla_oft.input_tokens.chunk_size}
  obs_dim: ${task.openvla_oft.input_tokens.wm_obs_dim}
  token_count: ${task.openvla_oft.input_tokens.token_count}
  token_dim: ${task.openvla_oft.input_tokens.token_dim}
  time_horizon: ${task.openvla_oft.time_horizon}
  latent_source: ${task.openvla_oft.input_tokens.latent_source}

policy:
  _target_: dreamer_vla.models.actor.LatentToActionHiddenActor
  hidden_dim: null
  source_token_count: ${task.openvla_oft.input_tokens.token_count}
  source_token_dim: ${task.openvla_oft.input_tokens.token_dim}
  action_hidden_dim: ${task.openvla_oft.input_tokens.action_hidden_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.openvla_oft.input_tokens.chunk_size}
  head_type: oft_l1_regression
  bridge_hidden_dim: 1024
  num_bridge_layers: 2
  num_bridge_heads: 8
  bridge_dropout: 0.1
  freeze_output_projection: true
  initial_log_std: -3.0
  min_log_std: -5.0
  max_log_std: -2.0
  freeze_log_std: false
  init_action_head_ckpt: ${task.openvla_oft.action_head_ckpt}

critic:
  hidden_dim: ${task.openvla_oft.input_tokens.token_dim}

algorithm:
  wmpo:
    chunk_size: ${task.openvla_oft.input_tokens.chunk_size}
