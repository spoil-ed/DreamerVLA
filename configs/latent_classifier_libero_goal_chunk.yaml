# LatentSuccessClassifier — CHUNK-LEVEL variant aligned 1:1 with the
# action-level small_tf baseline, with ONLY the time unit reinterpreted:
#
#   action-level (small_tf, archived):           chunk-level (this config):
#     window=8 env-steps consecutive               window=8 chunks (= 40 env-steps)
#     stride_train=8 env-steps (non-overlap)       stride_train=8 chunks = 40 env-steps
#     stride_val=1 env-step (dense sweep)          stride_val=1 chunk  = 5 env-steps
#     1 "frame" = 1 env-step hidden                1 "frame" = chunk-end hidden
#
# Every other knob (arch, optimizer, regularization, max_steps, batch_size,
# label_smoothing, weight_decay, episode_eval cadence) is byte-identical to
# the archived small_tf config — only the data-time unit and the chunk-pool
# fields change.
#
# chunk_pool="last" matches the user spec "实实在在做完 chunk 的那一帧": each
# classifier-frame is the hidden AT the end of the chunk (= after executing
# the K-action chunk), which is also what the chunk WM's
# predict_next_chunk hidden_seq[:, -1] emits at inference time.
#
# Launch:
#   CONFIG=latent_classifier_libero_goal_chunk NGPU=1 CUDA_VISIBLE_DEVICES=4 \
#     bash scripts/train_wm.sh

_target_: dreamer_vla.runners.LatentClassifierRunner

classifier:
  latent_dim: null
  action_dim: 7
  time_horizon: 5
  token_dim: 1024
  window: 8
  head_type: transformer
  hidden_dim: 256
  num_layers: 4
  num_heads: 4
  mlp_ratio: 2.0
  dropout: 0.5
  granularity: chunk
  chunk_size: 5
  chunk_pool: last

data:
  success_dir_raw: ${oc.env:DVLA_ROOT,.}/data/processed_data/libero_goal_no_noops_t_256
  success_dir_hidden: ${oc.env:DVLA_ROOT,.}/data/processed_data/libero_goal_no_noops_t_256_pi0_legacy_action_hidden_vla_policy_h2
  failure_dir_raw: ${oc.env:DVLA_ROOT,.}/data/processed_data/libero_goal_no_noops_t_256_failures
  failure_dir_hidden: ${oc.env:DVLA_ROOT,.}/data/processed_data/libero_goal_no_noops_t_256_failures_pi0_legacy_action_hidden_vla_policy_h2
  window: 8
  # stride values in env-step units; mapped to "chunks" by multiplying by K=5
  # so they match small_tf's stride semantics: stride_train = 1 window-length
  # (non-overlapping negatives), stride_val = 1 unit (dense sweep).
  stride_train: 40
  stride_val: 5
  chunk_subsample: 5
  chunk_pool: last

training:
  out_dir: ${oc.env:DVLA_ROOT,.}/data/outputs/dreamervla/outcome_classifier/libero_goal/wmpo_aligned_small_tf_chunk
  device: cuda
  seed: 0
  resume: false

  # ---- optimization (byte-identical to small_tf) ----
  max_steps: 8000
  batch_size: 32
  val_batch_size: 256
  num_workers: 2
  lr: 1.0e-4
  weight_decay: 1.0e-2
  label_smoothing: 0.1
  class_balanced: false

  # ---- cadence ----
  eval_every: 200
  ckpt_every: 500
  log_every: 50

  # ---- threshold sweep ----
  thresh_min: 0.3
  thresh_max: 1.0
  thresh_steps: 20

  # ---- episode-level eval ----
  # CHUNK units (native).  Effective gate: first_end_chunk = max(W, min_steps + W)
  # = max(8, 7 + 8) = 15 chunks → 75 env-step (K=5).  Matches action-level
  # small_tf baseline (W=8 env-step + min_steps=64 → first_end=72 env-step).
  # Lower min_steps would false-negative success demos finishing early.
  episode_eval_enabled: true
  episode_eval_min_steps: 7  # CHUNK units (was 32 env-step / K=5, ceil → 7)
  episode_eval_stride: 1     # CHUNK units
  episode_eval_batch: 256
