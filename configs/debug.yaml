trainer:
  device: cuda:01
  seed: 7
  num_epochs: 1
  log_every: 1
  debug: true

data:
  batch_size: 1
  num_samples: 1
  shuffle: false
  num_workers: 0
  pin_memory: false
  drop_last: false
  min_language_tokens: 4

model:
  image_size: 224
  patch_size: 16
  image_channels: 3
  vocab_size: 32000
  max_language_length: 32
  proprio_dim: 16
  embed_dim: 128
  fused_dim: 64
  image_depth: 2
  language_depth: 2
  num_heads: 8
  mlp_ratio: 4.0
  proprio_hidden_dim: 256
  dropout: 0.0
  pad_token_id: 0
  encoder_type: rynn_vla
  pretrained_policy_ckpt: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/pretrained_models/RynnVLA-001-7B-Trajectory
  precision: fp32
  condition_frame_num: 1

vla_encoder:
  train_dataset:
    img_size: 32
    use_rel_action: true
    min_max_norm: false
    mean_std_norm: true
  action_dim: 6
  repeat_lang_tokens: 1
  use_transformer_final_hidden_states: false

optim:
  name: adam
  learning_rate: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.0
  zero_grad_set_to_none: true

loss:
  name: mse
  reduction: mean
  target_value: 0.0
