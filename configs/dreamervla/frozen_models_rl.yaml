# @package _global_
# Pre-mainline causal test: immutable official-data WM/CLS, policy-only imagination.
defaults:
  - _self_

_target_: dreamervla.runners.FrozenModelPolicyRunner
seed: 7

pre_mainline:
  stage: frozen_models_rl

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

training:
  out_dir: ${oc.env:RUN_ROOT,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/pre_mainline/frozen_rl/${now:%Y%m%d_%H%M%S}}
  device: cuda
  checkpoint_format: torch
  distributed_strategy: single
  resume: false
  resume_dir: null
  num_updates: 20000
  checkpoint_every: 500
  require_policy_update: true
  gradient_accumulate_every: 1

init:
  vla_ckpt_path: ${task.openvla_oft.ckpt_path}
  world_model_state_ckpt: null
  classifier_state_ckpt: null

# These are the official processed demonstrations and canonical [T,256,4096]
# hidden-token sidecars. No collected-rollout directory is accepted by validation.
official_replay:
  data_dir: ${task.hdf5_reward_dir}
  hidden_dir: ${task.openvla_oft.hidden_token_dir}
  task_id: null
  infer_task_id_from_shard: true
  task_ids: ${pre_mainline.official_task_ids}
  max_episodes_per_task: null
  require_reference_complete: false
  capacity: 160000
  sequence_length: ${task.openvla_oft.wm_sequence_length}
  capacity_mode: total_sharded
  task_balanced: true
  rank: 0
  replay_sampling:
    enabled: false

# Persisted in the policy checkpoint so real-LIBERO evaluation reconstructs the
# exact OpenVLA-OFT observation metadata. This runner does not instantiate it.
encoder:
  _target_: dreamervla.models.embodiment.OpenVLAOFTPolicy
  model_path: ${task.openvla_oft.ckpt_path}
  torch_dtype: bf16
  num_images_in_input: ${task.openvla_oft.num_images_in_input}
  use_lora: false
  use_l1_regression: ${task.openvla_oft.use_l1_regression}
  use_diffusion: false
  use_proprio: ${task.openvla_oft.use_proprio}
  use_film: false
  freeze_vla_backbone: true

task_conditioning:
  enabled: false
  num_tasks: 10
  embedding_dim: 64

world_model:
  _target_: ${task.openvla_oft.wm_target}
  chunk_size: ${task.openvla_oft.hidden_token.chunk_size}
  obs_dim: ${task.openvla_oft.hidden_token.wm_obs_dim}
  action_dim: ${task.action_dim}
  token_count: ${task.openvla_oft.hidden_token.token_count}
  token_dim: ${task.openvla_oft.hidden_token.token_dim}
  time_horizon: ${task.openvla_oft.hidden_token.chunk_size}
  latent_stage: ${task.openvla_oft.hidden_token.latent_stage}
  latent_source: ${task.openvla_oft.hidden_token.latent_source}
  action_emb_dim: ${task.openvla_oft.hidden_token.action_emb_dim}
  num_action_repeat: ${task.openvla_oft.hidden_token.num_action_repeat}
  proprio_dim: ${task.openvla_oft.hidden_token.proprio_dim}
  proprio_emb_dim: ${task.openvla_oft.hidden_token.proprio_emb_dim}
  num_proprio_repeat: ${task.openvla_oft.hidden_token.num_proprio_repeat}
  proprio_reconstruction_loss_scale: 0.0
  lang_dim: ${task.openvla_oft.hidden_token.lang_dim}
  lang_emb_dim: ${task.openvla_oft.hidden_token.lang_emb_dim}
  num_lang_repeat: ${task.openvla_oft.hidden_token.num_lang_repeat}
  grad_checkpoint: true
  model_dim: ${task.openvla_oft.hidden_token.model_dim}
  num_hist: 3
  depth: 6
  heads: 16
  dim_head: 128
  attn_impl: sdpa
  mlp_dim: 2048
  dropout: 0.1
  num_pred: 1
  max_seq_len: 128
  hidden_loss_scale: 1.0
  cosine_loss_scale: 0.0
  chunk_rollout_chunks: 4
  chunk_rollout_loss_scale: 0.2
  reward_head_type: binary
  reward_loss_scale: 0.0
  reward_hidden_dim: 1024
  reward_init_logit: 0.0
  reward_pos_weight: 1.0
  return_predictions: false
  freeze_backbone: true
  task_conditioning: ${task_conditioning}

policy:
  _target_: dreamervla.algorithms.actor.LatentToOpenVLAHiddenStateActor
  hidden_dim: null
  source_token_count: ${task.openvla_oft.hidden_token.token_count}
  source_token_dim: ${task.openvla_oft.hidden_token.token_dim}
  hidden_state_dim: ${task.openvla_oft.hidden_token.hidden_state_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.openvla_oft.hidden_token.chunk_size}
  head_type: oft_discrete_token
  adapter_type: ${task.openvla_oft.actor_adapter_type}
  adapter_hidden_dim: ${task.openvla_oft.actor_adapter_hidden_dim}
  freeze_lm_head: ${task.openvla_oft.actor_freeze_lm_head}
  init_lm_head_ckpt: ${task.openvla_oft.ckpt_path}
  vocab_size: ${task.openvla_oft.vocab_size}
  action_token_bins: ${task.openvla_oft.action_token_bins}
  min_action: ${task.openvla_oft.min_action}
  max_action: ${task.openvla_oft.max_action}
  bridge_hidden_dim: 1024
  num_bridge_layers: 2
  num_bridge_heads: 8
  bridge_dropout: 0.1

algorithm:
  update_type: LUMOS
  lumos:
    chunk_size: ${task.openvla_oft.hidden_token.chunk_size}
    episode_max_steps: 300
    reward_model: probability_outcome
    classifier_min_steps: 3
    classifier_threshold: null
    classifier_granularity: chunk
    classifier_chunk_pool: last
    filter_zero_variance_groups: true
    ppo_rollouts_per_start_min: 1
    ppo_rollouts_per_start_max: 4
    imagine_micro_batch: 2
    eval_micro_batch: 4
    update_micro_batch_starts: 2
  actor_input_mode: pooled
  rssm_action_scale: env
  rssm_action_clip: true
  imag_last: 4
  imagination_horizon: 5
  horizon: 333
  contdisc: true
  lam: 0.95
  actent: 0.0
  kl_coef: 0.01
  kl_penalty_kind: kl
  actor_bc_to_ref_scale: 0.1
  ppo_rollouts_per_start: 1
  ppo_update_epochs: 1
  ppo_gamma: 1.0
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  clip_ratio_c: 3.0
  clip_log_ratio: 10.0
  advantage_eps: 1.0e-6

# Deliberately only one optimizer. Config validation rejects WM, CLS, or critic
# optimizer sections even if a caller attempts to add them via Hydra overrides.
optim:
  precision: bf16
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  policy:
    name: adam
    lr: 5.0e-7
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0

dataloader:
  batch_size: 2

runner:
  logger:
    logger_backends: [tensorboard, wandb]
    project_name: dreamervla
    log_path: ${training.out_dir}/log
    wandb_mode: offline
    wandb_proxy: null
