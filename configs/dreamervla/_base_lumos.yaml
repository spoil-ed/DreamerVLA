# @package _global_
# CFG-05: shared base for the *_lumos dreamervla configs.
# Holds the content common to openvla_oft_lumos and rynnvla_lumos
# (and, by inheritance, their input-token / discrete-token / online children).
# Each variant deep-merges only its divergent keys (out_dir, ckpt paths, dataset,
# world_model dims, policy, algorithm.lumos.chunk_size/classifier_min_steps, and the
# rynnvla-only real_rollout_relabel block).
_target_: dreamervla.runners.JointDreamerVLARunner
seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda
  debug: false

training:
  # out_dir is variant-specific.
  debug: false
  resume: false
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 20
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  checkpoint_every: 1
  use_ema: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  run_wm_phase: true
  run_actor_critic_phase: true

init:
  # vla_ckpt_path / world_model_state_ckpt / classifier_state_ckpt are variant-specific.
  encoder_state_ckpt: null
  require_encoder_state_ckpt: false
  dreamervla_state_ckpt: null
  load_dreamervla_world_model: false
  load_dreamervla_critic: false
  load_dreamervla_target_critic: false
  load_dreamervla_policy: false
  load_dreamervla_return_tracker: false
  load_dreamervla_strict: false
  reset_world_model_reward_head: false

encoder: null

critic:
  # _target_ is variant-specific (OFT uses ${task.openvla_oft.critic_target}).
  hidden_dim: 1024
  critic_hidden_dim: 1024
  critic_layers: 3
  activation: silu
  norm: rms
  outscale: 0.0
  num_bins: 255
  bin_min: -20.0
  bin_max: 20.0

algorithm:
  update_type: LUMOS
  lumos:
    # chunk_size + classifier_min_steps are variant-specific.
    episode_max_steps: 300  # LIBERO official horizon
    filter_zero_variance_groups: true
    ppo_rollouts_per_start_min: 4
    ppo_rollouts_per_start_max: 16
    # MEM-RL-01 — bound the outcome update's peak GPU memory. All numerically
    # equivalent to the full-batch update (the imagination is pure data; the PPO
    # gradient flows only through the policy re-eval). Defaults preserve the
    # original full-batch behavior.
    # update_micro_batch_starts: process the effective batch in group-aligned
    #   slices of this many imagination START points (each = group_size rollouts);
    #   <=0 ⇒ one full-batch slice. The PRIMARY memory bound — size it so one
    #   slice fits (e.g. ~96 rollouts/slice on an 80GB H100).
    update_micro_batch_starts: 0
    # imagine_micro_batch: secondary bound on the WM predict_next_chunk forward
    #   (rollouts per WM call within a slice); <=0 ⇒ the whole slice at once.
    imagine_micro_batch: 0
    # eval_micro_batch: rollouts per classifier predict_success sweep within a
    #   slice (also the only bound for the full-batch fallback).
    eval_micro_batch: 64
  actor_input_mode: pooled
  rssm_action_scale: env
  rssm_action_clip: true
  imag_last: 4
  imagination_horizon: 5
  horizon: 333
  contdisc: true
  lam: 0.95
  actent: 0.0
  kl_coef: 0.01
  kl_penalty_kind: kl
  actor_bc_to_ref_scale: 0.1
  ppo_rollouts_per_start: 4
  ppo_update_epochs: 1
  ppo_gamma: 1.0
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  # A2/A3 numerical-stability guards (RLinf-aligned dual-clip; log-ratio
  # clamp guards the summed-trajectory ratio before exp). changes-numerics.
  clip_ratio_c: 3.0
  clip_log_ratio: 10.0
  advantage_eps: 1.0e-6
  tdmpc_ac:
    enabled: false
    value_mode: state
    action_dim: ${task.action_dim}
    terminal_value_scale: 1.0
    critic_loss_scale: 1.0
    imagined_critic_loss_scale: 0.1
    replay_critic_loss_scale: 1.0
    target_critic_tau: 0.02
  slowtar: false
  slowreg: 1.0
  repval_loss: true
  repval_scale: 0.3
  repl_loss:
    slowtar: false
    lam: 0.95
    slowreg: 1.0
  target_critic_tau: 0.02
  return_tracker:
    decay: 0.99
    low: 0.05
    high: 0.95
  return_normalization:
    mode: dreamerv3
    low: 0.05
    high: 0.95
    eps: 1.0e-6

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adamw
    lr: 2.0e-6
    betas: [0.9, 0.999]
    eps: 1.0e-20
    weight_decay: 0.0
  policy:
    name: adam
    lr: 5.0e-7
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0
  critic:
    name: adam
    lr: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

eval:
  eval_every: 1

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: epoch_returns_mean
    mode: max
    k: 3
    format_str: 'epoch={epoch:03d}-epoch_returns={epoch_returns_mean:.4f}.ckpt'
