# @package _global_
# Scheme B: DreamerVLA over RynnVLA frame-level input-token WM latents.
defaults:
  - rynnvla_lumos
  - _self_

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/dreamervla/lumos_input_tokens/${task.name}/${now:%Y%m%d_%H%M%S}}

init:
  world_model_state_ckpt: null
  classifier_state_ckpt: null

dataset:
  hidden_dir: ${task.rynnvla_input_token_hidden_dir}
  expected_action_head_type: ${task.legacy_input_tokens.expected_action_head_type}
  expected_obs_hidden_source: ${task.legacy_input_tokens.expected_obs_hidden_source}
  expected_prompt_style: ${task.legacy_input_tokens.expected_prompt_style}
  expected_history: ${task.legacy_input_tokens.expected_history}
  expected_include_state: ${task.legacy_input_tokens.expected_include_state}
  expected_rotate_images_180: ${task.legacy_input_tokens.expected_rotate_images_180}

world_model:
  chunk_size: ${task.legacy_input_tokens.chunk_size}
  obs_dim: ${task.legacy_input_tokens.wm_obs_dim}
  token_count: ${task.legacy_input_tokens.token_count}
  token_dim: ${task.legacy_input_tokens.token_dim}
  time_horizon: ${task.legacy_input_tokens.chunk_size}
  latent_stage: ${task.legacy_input_tokens.latent_stage}
  latent_source: ${task.legacy_input_tokens.latent_source}
  action_emb_dim: 10
  num_action_repeat: 1
  model_dim: 4106
  depth: 4
  heads: 8
  dim_head: 32
  mlp_dim: 1024

policy:
  _target_: dreamervla.models.actor.LatentToActionHiddenActor
  hidden_dim: null
  source_token_count: ${task.legacy_input_tokens.token_count}
  source_token_dim: ${task.legacy_input_tokens.token_dim}
  action_hidden_dim: ${task.legacy_input_tokens.action_hidden_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.legacy_input_tokens.chunk_size}
  head_type: legacy
  bridge_hidden_dim: 1024
  num_bridge_layers: 2
  num_bridge_heads: 8
  bridge_dropout: 0.1
  freeze_output_projection: true
  initial_log_std: -3.0
  min_log_std: -5.0
  max_log_std: -2.0
  freeze_log_std: false
  init_action_head_ckpt: ${init.vla_ckpt_path}

critic:
  hidden_dim: ${task.legacy_input_tokens.token_dim}

algorithm:
  lumos:
    chunk_size: ${task.legacy_input_tokens.chunk_size}
