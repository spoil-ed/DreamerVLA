# @package _global_
# Target manual-cotrain Ray route for OpenVLA-OFT hidden-token embeddings.
#
# This composes the existing OFT backbone latent component definitions, then
# switches the runner topology to the manual-notes four-group route.
defaults:
  - openvla_onetraj_libero_cotrain_ray_base
  - _self_

_target_: dreamervla.runners.CotrainRunner
render_backend: osmesa

cluster:
  component_placement:
    env: 0
    rollout: 0
    actor: 0

manual_cotrain:
  ngpu: 1
  global_steps: 1000  # cotrain epochs
  # Causal mainline order: real -> encoder SFT -> re-encode -> WM/CLS ->
  # imagined PPO. The frozen feasibility recipe deliberately leaves this off.
  staged_policy_update: true
  learner_update_step: 1
  learner_update_phase: cotrain
  learner_updates_per_global_step: 128
  learner_early_stop_patience: 16
  # One old->new trust region shared by encoder SFT and imagined actor PPO.
  max_policy_kl: 0.10
  checkpoint_every: 0
  # One 1024x512 rollout step can exceed ten minutes. 5400s still catches an
  # actual stuck handshake without killing a progressing production step.
  env_rollout_timeout_s: 5400
  save_replay_state: false
  sync_every: 1
  requires_bootstrap_value: false
  wm_env_write_replay: false
  rollout_epoch: ${algorithm.rollout_epoch}
  real_env_workers: 1
  real_task_ids: ${ray_data.task_ids}
  real_render_backend: null
  real_rollout_epoch: 1
  real_rollout_target_trajectories: 32
  # One completed LIBERO episode (300 steps) per slot/epoch, rounded to an
  # OFT-chunk multiple. Four epochs x eight slots therefore yields exactly 32
  # completed trajectories without carrying partial episodes between epochs.
  real_max_steps_per_rollout_epoch: 304
  wm_rollout_epoch: ${manual_cotrain.rollout_epoch}
  # RLinf LIBERO geometry: 64 env slots * 16 rollout epochs = 1024
  # trajectories.  Each trajectory spans 512 physical steps (64 OFT chunks).
  wm_rollout_target_trajectories: 1024
  wm_rollout_lease_epochs: 1
  max_steps_per_rollout_epoch: 512
  wm_rollout_multiplier: 1
  num_action_chunks: ${task.openvla_oft.hidden_token.chunk_size}
  envs_per_worker: 8
  wm_envs_per_worker: 16
  eval_interval_global_steps: 0
  debug_eval_interval_global_steps: 0
  eval_initial_global_step: false
  eval_protocol:
    # Standalone real-LIBERO evaluation. Step 0 uses the base OFT checkpoint;
    # learned steps restore the complete ActorGroup VLA, including the updated
    # vision backbone/projector and native LM/OFT action decoder.
    base_vla_ckpt: ${task.openvla_oft.ckpt_path}
    task_suite_name: ${task.suite}
    task_ids: ${ray_data.task_ids}
    num_episodes_per_task: 10
    num_envs: 10
    action_steps: ${task.openvla_oft.hidden_token.chunk_size}
    history_length: ${task.openvla_oft.hidden_token.expected_history}
    seed: ${seed}
    gpus: "0"
    render_backend: osmesa
    significant_drop_threshold: 0.10
  task_id: 0

algorithm:
  group_size: 8
  rollout_epoch: 16
  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level
  loss_type: actor
  loss_agg_func: token-mean
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  clip_ratio_c: 3.0
  reward_coef: 5.0
  # WMEnv emits dense classifier probabilities per chunk; RLinf's bounded
  # summed-reward filter is for sparse/normalized returns and drops every rollout
  # here before the actor optimizer can step.
  filter_rewards: false
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5
  gamma: 0.99
  gae_lambda: 0.95
  kl_beta: 0.01
  entropy_bonus: 0.0

# Shared by the trainable-WM/CLS mainline and the frozen-WM/CLS Ray test.
ray_actor_optimizer:
  name: adam
  lr: 5.0e-7
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true

ray_encoder_optimizer:
  name: adamw
  lr: 1.0e-7
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0

actor:
  policy_cfg: ${ray_components.policy}
  init_ckpt: {}
  train_cfg:
    device: auto
    lr: 5.0e-7
    # Counts are flattened trajectory-chunk samples, matching RLinf ActorGroup.
    # 1024 trajectories * (512 / 8) chunks = 65536 samples, hence four
    # optimizer steps per PPO epoch at global_batch_size=16384.
    global_batch_size: 16384
    micro_batch_size: 32
    seed: ${seed}
    progress_every_s: 5.0
    syncer:
      store_name: DreamerVLAActorRolloutPatchStore
      precision: bf16
    fsdp:
      strategy: fsdp
      precision: bf16
      cpu_offload: false
      activation_checkpointing: false
      backend: nccl
      use_orig_params: true
    optimizers:
      policy: ${ray_actor_optimizer}
      encoder: ${ray_encoder_optimizer}
    encoder_sft:
      epochs: 2
      batch_size: 4
      reencode_batch_size: 4
      grad_clip_norm: 1.0
      zero_grad_set_to_none: true
    algorithm_cfg:
      group_size: ${algorithm.group_size}
      ppo_update_epochs: 1
      reward_type: ${algorithm.reward_type}
      logprob_type: ${algorithm.logprob_type}
      entropy_type: ${algorithm.entropy_type}
      loss_type: ${algorithm.loss_type}
      loss_agg_func: ${algorithm.loss_agg_func}
      clip_ratio_low: ${algorithm.clip_ratio_low}
      clip_ratio_high: ${algorithm.clip_ratio_high}
      clip_ratio_c: ${algorithm.clip_ratio_c}
      gamma: ${algorithm.gamma}
      gae_lambda: ${algorithm.gae_lambda}
      kl_beta: ${algorithm.kl_beta}
      entropy_coef: ${algorithm.entropy_bonus}
      clip_log_ratio: null
      filter_rewards: ${algorithm.filter_rewards}
      reward_coef: ${algorithm.reward_coef}
      rewards_lower_bound: ${algorithm.rewards_lower_bound}
      rewards_upper_bound: ${algorithm.rewards_upper_bound}
      loss_normalization: token_mean

rollout:
  policy_cfg: ${ray_components.policy}
  encoder_cfg: null
  init_ckpt: {}
  train_cfg:
    device: auto
    precision: bf16
    deterministic: false
    logprob_type: ${algorithm.logprob_type}
    syncer:
      store_name: DreamerVLAActorRolloutPatchStore

learner:
  init_ckpt:
    path: ${init.warmup_ckpt_path}
    components: [world_model, classifier]
  model_cfg:
    policy: null
    world_model: ${ray_components.world_model}
    classifier: ${ray_components.classifier}
  train_cfg:
    mode: wm_classifier_only
    batch_size: 16
    classifier_batch_size: 2
    classifier_early_neg_stride: 8
    classifier_loss_type: bce
    classifier_sampling_protocol: wmpo
    classifier_balance_batches: true
    classifier_threshold: null
    lr: 1.0e-4
    device: auto
    precision: bf16
    syncer:
      store_name: DreamerVLALearnerWMClassifierStore
    algorithm_cfg:
      group_size: ${algorithm.group_size}
      rollout_epoch: ${algorithm.rollout_epoch}
      imag_last: 4
    optim_cfg:
      grad_clip_norm: 1.0
      zero_grad_set_to_none: true
    optimizers:
      world_model:
        lr: 3.0e-5
        weight_decay: 0.0
      classifier:
        lr: 1.0e-4
        weight_decay: 0.0

env:
  # Keep the inherited hidden-token environment contract.
  cfg:
    action_postprocess: openvla_oft
    render_backend: ${render_backend}
    # The exact real budget is slots * rollout_epoch. Early LIBERO success may
    # terminate before 300 steps, but must not start a second trajectory inside
    # the same epoch.
    one_trajectory_per_rollout_epoch: true
  real:
    cfg: ${env.cfg}
  wm:
    cfg:
      target: dreamervla.envs.world_model.latent_world_model_env:LatentWorldModelEnv
      action_postprocess: openvla_oft
      kwargs:
        world_model: ${ray_components.world_model}
        classifier: ${ray_components.classifier}
        latent_dim: ${task.openvla_oft.hidden_token.wm_obs_dim}
        token_count: ${task.openvla_oft.hidden_token.token_count}
        token_dim: ${task.openvla_oft.hidden_token.token_dim}
        action_dim: ${task.action_dim}
        lang_dim: ${task.openvla_oft.hidden_token.lang_dim}
        proprio_dim: ${task.openvla_oft.hidden_token.proprio_dim}
        success_threshold: 0.5
        max_episode_steps: ${manual_cotrain.max_steps_per_rollout_epoch}
        num_envs: ${manual_cotrain.wm_envs_per_worker}
        device: cuda
        inference_dtype: bf16
        observation_format: tensor

replay:
  cfg:
    capacity: ${ray_data.replay_capacity}
    sequence_length: ${ray_data.sequence_length}
    task_ids: ${ray_data.task_ids}
    rank: 0
