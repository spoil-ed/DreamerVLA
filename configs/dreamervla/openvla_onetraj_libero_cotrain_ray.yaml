# @package _global_
# Target manual-cotrain Ray route for OpenVLA-OFT backbone_latent/query-before tokens.
#
# This composes the existing OFT backbone latent component definitions, then
# switches the runner topology to the manual-notes four-group route.
defaults:
  - openvla_onetraj_libero_cotrain_ray_base
  - _self_

_target_: dreamervla.runners.ManualCotrainRayRunner
render_backend: osmesa

cluster:
  component_placement:
    env: 0
    rollout: 0
    actor: 0

manual_cotrain:
  ngpu: 1
  global_steps: 1000  # cotrain epochs
  learner_update_step: 1
  learner_update_phase: cotrain
  checkpoint_every: 0
  save_replay_state: false
  sync_every: 1
  requires_bootstrap_value: false
  wm_env_write_replay: false
  rollout_epoch: ${algorithm.rollout_epoch}
  real_env_workers: 1
  real_render_backend: null
  real_rollout_epoch: 1
  real_rollout_target_trajectories: 32
  wm_rollout_epoch: ${manual_cotrain.rollout_epoch}
  wm_rollout_target_trajectories: 256
  wm_rollout_lease_epochs: 1
  max_steps_per_rollout_epoch: 512
  wm_rollout_multiplier: 1
  num_action_chunks: ${task.openvla_oft.input_tokens.chunk_size}
  envs_per_worker: 8
  wm_envs_per_worker: 16
  eval_interval_global_steps: 0
  debug_eval_interval_global_steps: 0
  task_id: 0

algorithm:
  group_size: 8
  rollout_epoch: 16
  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level
  loss_type: actor
  loss_agg_func: token-mean
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  clip_ratio_c: 3.0
  reward_coef: 5.0
  # WMEnv emits dense classifier probabilities per chunk; RLinf's bounded
  # summed-reward filter is for sparse/normalized returns and drops every rollout
  # here before the actor optimizer can step.
  filter_rewards: false
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5
  gamma: 0.99
  gae_lambda: 0.95
  kl_beta: 0.0
  entropy_bonus: 0.0

actor:
  policy_cfg: ${ray_components.policy}
  init_ckpt: {}
  train_cfg:
    device: auto
    lr: 5.0e-7
    syncer:
      store_name: DreamerVLAActorRolloutPatchStore
    fsdp:
      strategy: fsdp
      precision: bf16
      cpu_offload: false
      activation_checkpointing: false
      backend: nccl
      use_orig_params: true
    optimizers:
      policy:
        lr: 5.0e-7
        weight_decay: 0.0
        grad_clip_norm: 1.0
        zero_grad_set_to_none: true
    algorithm_cfg:
      group_size: ${algorithm.group_size}
      ppo_update_epochs: 1
      reward_type: ${algorithm.reward_type}
      logprob_type: ${algorithm.logprob_type}
      entropy_type: ${algorithm.entropy_type}
      loss_type: ${algorithm.loss_type}
      loss_agg_func: ${algorithm.loss_agg_func}
      clip_ratio_low: ${algorithm.clip_ratio_low}
      clip_ratio_high: ${algorithm.clip_ratio_high}
      clip_ratio_c: ${algorithm.clip_ratio_c}
      gamma: ${algorithm.gamma}
      gae_lambda: ${algorithm.gae_lambda}
      kl_beta: ${algorithm.kl_beta}
      entropy_coef: ${algorithm.entropy_bonus}
      clip_log_ratio: null
      filter_rewards: ${algorithm.filter_rewards}
      reward_coef: ${algorithm.reward_coef}
      rewards_lower_bound: ${algorithm.rewards_lower_bound}
      rewards_upper_bound: ${algorithm.rewards_upper_bound}
      loss_normalization: token_mean

rollout:
  policy_cfg: ${ray_components.policy}
  encoder_cfg:
    target: dreamervla.workers.inference.oft_rollout:OFTRolloutBundle
    kwargs:
      policy_cfg:
        model_path: ${task.openvla_oft.ckpt_path}
        policy_mode: auto
        num_images_in_input: ${task.openvla_oft.num_images_in_input}
        unnorm_key: ${task.openvla_oft.dataset_statistics_key}
      unnorm_key: ${task.openvla_oft.dataset_statistics_key}
      image_keys: ${task.image_keys}
      history: ${task.openvla_oft.input_tokens.expected_history}
      rotate_images_180: ${task.openvla_oft.input_tokens.expected_rotate_images_180}
      center_crop: true
      obs_hidden_source: ${task.openvla_oft.input_tokens.expected_obs_hidden_source}
      expected_action_head_type: ${task.openvla_oft.input_tokens.expected_action_head_type}
      expected_include_state: ${task.openvla_oft.input_tokens.expected_include_state}
      device: cuda
  init_ckpt: {}
  train_cfg:
    device: auto
    deterministic: false
    logprob_type: ${algorithm.logprob_type}
    syncer:
      store_name: DreamerVLAActorRolloutPatchStore

learner:
  init_ckpt:
    path: ${init.warmup_ckpt_path}
    components: [world_model, classifier]
  model_cfg:
    policy: null
    world_model: ${ray_components.world_model}
    classifier: ${ray_components.classifier}
  train_cfg:
    mode: wm_classifier_only
    batch_size: 16
    classifier_batch_size: 2
    classifier_early_neg_stride: 8
    classifier_loss_type: bce
    classifier_sampling_protocol: wmpo
    classifier_balance_batches: true
    classifier_threshold: null
    lr: 1.0e-4
    device: auto
    precision: bf16
    syncer:
      store_name: DreamerVLALearnerWMClassifierStore
    algorithm_cfg:
      group_size: ${algorithm.group_size}
      rollout_epoch: ${algorithm.rollout_epoch}
      imag_last: 4
    optim_cfg:
      grad_clip_norm: 1.0
      zero_grad_set_to_none: true
    optimizers:
      world_model:
        lr: 3.0e-5
        weight_decay: 0.0
      classifier:
        lr: 1.0e-4
        weight_decay: 0.0

env:
  # Keep inherited legacy env.* keys so existing launcher overrides compose.
  cfg:
    action_postprocess: openvla_oft
    render_backend: ${render_backend}
  real:
    cfg: ${env.cfg}
  wm:
    cfg:
      target: dreamervla.envs.world_model.latent_world_model_env:LatentWorldModelEnv
      action_postprocess: openvla_oft
      kwargs:
        world_model: ${ray_components.world_model}
        classifier: ${ray_components.classifier}
        latent_dim: ${task.openvla_oft.input_tokens.wm_obs_dim}
        action_dim: ${task.action_dim}
        lang_dim: ${task.openvla_oft.input_tokens.lang_dim}
        proprio_dim: ${task.openvla_oft.input_tokens.proprio_dim}
        success_threshold: 0.5
        max_episode_steps: ${manual_cotrain.max_steps_per_rollout_epoch}
        num_envs: ${manual_cotrain.wm_envs_per_worker}
        device: cuda
        inference_dtype: bf16
        observation_format: tensor

replay:
  cfg:
    capacity: ${ray_data.replay_capacity}
    sequence_length: ${ray_data.sequence_length}
    task_ids: ${ray_data.task_ids}
    rank: 0
