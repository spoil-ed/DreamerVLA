# @package _global_
# Offline-warmup cotrain pipeline for OpenVLA-OFT discrete action-hidden sidecars.
# Structural dimensions come from task.openvla_oft; script profiles may only
# scale runtime throughput knobs such as batch sizes and warmup steps.
defaults:
  - online_cotrain_pipeline_libero_goal
  - _self_

latent_type: action_hidden

offline_warmup:
  data_dir: ${task.openvla_oft.hdf5_reward_dir}
  hidden_dir: ${task.openvla_oft.action_hidden_dir}

init:
  vla_ckpt_path: ${task.openvla_oft.ckpt_path}

online_rollout:
  sequence_length: ${task.openvla_oft.wm_sequence_length}

env:
  task_suite_name: ${task.suite}
  episode_horizon: 300
  history_length: ${task.openvla_oft.expected_history}
  include_state: ${task.openvla_oft.expected_include_state}
  vla_rotate_180: ${task.openvla_oft.expected_rotate_images_180}

world_model:
  _target_: ${task.openvla_oft.wm_target}
  chunk_size: ${task.openvla_oft.chunk_size}
  obs_dim: ${task.openvla_oft.wm_obs_dim}
  action_dim: ${task.action_dim}
  token_count: ${task.openvla_oft.token_count}
  token_dim: ${task.openvla_oft.token_dim}
  time_horizon: ${task.openvla_oft.time_horizon}
  latent_stage: ${task.openvla_oft.latent_stage}
  latent_source: ${task.openvla_oft.latent_source}
  action_emb_dim: 10
  num_action_repeat: 1
  # Recompute the chunk rollout's N*K (=chunk_rollout_chunks*chunk_size) autoregressive
  # steps in backward instead of storing them: activation memory drops from O(N*K) to
  # O(1), numerically identical. Keeps batch_size=96 within 80GB during WM warmup.
  grad_checkpoint: true
  model_dim: 4106
  # DINO-WM balanced predictor (query_after / action-hidden, seq = num_hist*token_count = 168):
  # FULL-WIDTH attention inner = heads*dim_head = 4096 = model_dim — no compression of the
  # dense 4096-d VLA tokens (accuracy); LEAN FFN mlp_dim = model_dim (efficiency). The short
  # 168-token sequence makes full-width attention nearly free here, so capacity is spent where
  # it is cheap. ~610M total (<1B). See the tutorial md for the per-profile table.
  num_hist: 3      # 3-frame sliding window; the autoregressive recursion needs exactly 3.
  depth: 6
  heads: 16
  dim_head: 256
  mlp_dim: 4096

policy:
  _target_: ${task.openvla_oft.actor_target}
  hidden_dim: null
  action_hidden_dim: ${task.openvla_oft.token_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.openvla_oft.chunk_size}
  head_type: ${task.openvla_oft.actor_head_type}
  adapter_type: ${task.openvla_oft.actor_adapter_type}
  adapter_hidden_dim: ${task.openvla_oft.actor_adapter_hidden_dim}
  freeze_lm_head: ${task.openvla_oft.actor_freeze_lm_head}
  init_lm_head_ckpt: ${task.openvla_oft.ckpt_path}
  vocab_size: ${task.openvla_oft.vocab_size}
  action_token_bins: ${task.openvla_oft.action_token_bins}
  min_action: ${task.openvla_oft.min_action}
  max_action: ${task.openvla_oft.max_action}

classifier:
  _target_: ${task.openvla_oft.classifier_target}
  latent_dim: ${task.openvla_oft.token_dim}
  chunk_size: ${task.openvla_oft.chunk_size}
  token_dim: ${task.openvla_oft.token_dim}
  token_pool: mean
  token_count: ${task.openvla_oft.token_count}

algorithm:
  wmpo:
    chunk_size: ${task.openvla_oft.chunk_size}
