# @package _global_
# Failure-conditioned imagined RL. Every global step collects real trajectories,
# appends them to replay, samples failed episode starts, and updates only the actor
# with PPO under a frozen WM and frozen success classifier.
defaults:
  - openvla_onetraj_libero_cotrain
  - _self_

_target_: dreamervla.runners.DreamerRunner

cluster:
  num_nodes: 1
  num_gpus: 8
  component_placement: null

training:
  debug: false
  device: cuda
  distributed_strategy: single
  require_policy_update: true

manual_cotrain:
  ngpu: 8
  global_steps: 20000
  checkpoint_every: 10
  keep_last_checkpoints: 2
  real_env_enabled: true
  real_env_workers: 25
  real_envs_per_worker: 1
  training_mode: failure_imagined_rl
  initial_condition_selector: failed_episode_start
  staged_policy_update: false
  learner_updates_enabled: false
  refresh_wm_initial_conditions_per_lease: true
  wm_rollout_target_trajectories: 1024
  wm_rollout_lease_epochs: 1
  max_steps_per_rollout_epoch: 512
  wm_envs_per_worker: 16
  eval_interval_global_steps: 10
  eval_initial_global_step: true
  eval_protocol:
    num_envs: 25

replay:
  cfg:
    capacity: ${ray_data.replay_capacity}
    sequence_length: ${ray_data.sequence_length}
    task_ids: ${ray_data.task_ids}
    rank: 0
    capacity_mode: total_sharded
    task_balanced: true
    replay_sampling:
      enabled: false
  # Current real episodes append to this bounded replay. A seed may be supplied
  # to make failed anchors available before the first online collection.
  seed: null

env:
  wm:
    cfg:
      # Frozen WM/classifier only occupy GPU1-7 during latent imagination.
      enable_offload: true
      bootstrap_task_ids: ${ray_data.task_ids}
      bootstrap_group_size: ${algorithm.group_size}
      initial_condition_selector: ${manual_cotrain.initial_condition_selector}
      defer_initial_condition_bootstrap: true
      require_balanced_initial_conditions: true

actor:
  train_cfg:
    # Preserve the 16384 effective global batch while bounding per-forward
    # Llama attention activations during imagined-trajectory PPO.
    micro_batch_size: 8
