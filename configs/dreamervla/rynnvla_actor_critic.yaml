# @package _global_
# Dreamer actor-critic on the DINO-WM-style full RynnVLA action-hidden world model.
# WM target/action hidden shape is derived from time_horizon * action_dim * token_dim.
defaults:
  - _self_
  - /task: libero_goal

_target_: dreamervla.runners.JointDreamerVLARunner
seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda
  debug: false

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,data}/outputs/dreamervla/actor_critic/${now:%Y%m%d_%H%M%S}}
  debug: false
  resume: false
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 20
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  checkpoint_every: 1
  use_ema: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  # Only an attached feature backbone/encoder is frozen.  The DINO-WM predictor
  # and reward head keep receiving supervised WM/reward updates.
  run_wm_phase: true
  run_actor_critic_phase: true

init:
  vla_ckpt_path: ${task.vla_ckpt_path}
  encoder_state_ckpt: null
  require_encoder_state_ckpt: false
  world_model_state_ckpt: ${oc.env:DVLA_DATA_ROOT,data}/outputs/worldmodel/rynn_dino_wm_fullhidden/m1024_d6_rollout8_reward32_bs80/fixed_branch_20260523_195333/ckpt/step_00002000.ckpt
  dreamervla_state_ckpt: null
  load_dreamervla_world_model: false
  load_dreamervla_critic: false
  load_dreamervla_target_critic: false
  load_dreamervla_policy: false
  load_dreamervla_return_tracker: false
  load_dreamervla_strict: false
  reset_world_model_reward_head: false

encoder: null

dataset:
  _target_: dreamervla.dataset.libero_balanced_terminal_dataset.LIBEROBalancedTerminalDataset
  hdf5_dir: ${task.hdf5_reward_dir}
  hidden_dir: ${task.rynnvla_action_hidden_dir}
  expected_model_path: ${task.vla_ckpt_path}
  expected_encoder_state_ckpt: null
  expected_time_horizon: ${task.time_horizon}
  expected_action_head_type: ${task.legacy_action_hidden.expected_action_head_type}
  expected_obs_hidden_source: ${task.legacy_action_hidden.expected_obs_hidden_source}
  expected_prompt_style: ${task.legacy_action_hidden.expected_prompt_style}
  expected_history: ${task.legacy_action_hidden.expected_history}
  expected_include_state: ${task.legacy_action_hidden.expected_include_state}
  expected_rotate_images_180: ${task.legacy_action_hidden.expected_rotate_images_180}
  reward_mode: per_window_dense
  balanced_length: 50000
  balanced_seed: 0
  sequence_length: 32
  image_size: ${task.image_size}
  image_keys: ${task.image_keys}
  hidden_key: ${task.hidden_key}
  load_actor_sequence: false
  stride: 1
  max_files: null
  max_demos_per_file: null
  max_windows: null

dataloader:
  batch_size: 1
  num_workers: 2
  shuffle: true
  drop_last: true
  pin_memory: false
  persistent_workers: true
  prefetch_factor: 1
  multiprocessing_context: forkserver

world_model:
  _target_: dreamervla.models.world_model.rynn_dino_wm.RynnDinoWMWorldModel
  obs_dim: ${task.legacy_action_hidden.wm_obs_dim}
  action_dim: ${task.action_dim}
  token_count: ${task.legacy_action_hidden.token_count}
  token_dim: ${task.legacy_action_hidden.token_dim}
  time_horizon: ${task.time_horizon}
  model_dim: 1024
  depth: 6
  heads: 8
  mlp_dim: 2048
  dropout: 0.1
  num_hist: 3
  num_pred: 1
  max_seq_len: 128
  hidden_loss_scale: 1.0
  cosine_loss_scale: 0.1
  rollout_loss_scale: 1.0
  rollout_horizon: 8
  rollout_context: null
  reward_head_type: binary
  reward_loss_scale: 32.0
  reward_hidden_dim: 1024
  reward_init_logit: 0.0
  reward_pos_weight: 1.0
  return_predictions: false
  freeze_backbone: true

policy:
  _target_: dreamervla.models.actor.RynnVLAActionHiddenActor
  hidden_dim: null
  action_hidden_dim: ${task.legacy_action_hidden.token_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.time_horizon}
  head_type: legacy
  adapter_type: residual_mlp
  adapter_hidden_dim: 1024
  freeze_output_projection: false
  initial_log_std: -3.0
  min_log_std: -5.0
  max_log_std: -2.0
  freeze_log_std: false
  init_action_head_ckpt: ${init.vla_ckpt_path}

critic:
  _target_: dreamervla.models.critic.twohot_critic.TwohotCritic
  hidden_dim: 1024
  critic_hidden_dim: 1024
  critic_layers: 3
  activation: silu
  norm: rms
  outscale: 0.0
  num_bins: 255
  bin_min: -20.0
  bin_max: 20.0

algorithm:
  # Mainline: PPO/WMPO-style imagined-trajectory actor update (dreamervla/algorithms/ppo/).
  # The dreamer-style lambda-return AC path (dreamervla/algorithms/dreamervla.py:imagine_actor_critic_step)
  # is preserved as an optional fallback: set `update_type=dreamer` to use it.
  # Dispatch is in dreamervla/runners/dreamervla_runner.py:~1105.
  update_type: wmpo_ppo
  actor_input_mode: pooled
  rssm_action_scale: env
  rssm_action_clip: true
  imag_last: 4
  imagination_horizon: 5
  horizon: 333
  contdisc: true
  lam: 0.95
  actent: 0.0
  kl_coef: 0.01
  kl_penalty_kind: kl
  actor_bc_to_ref_scale: 0.1
  ppo_rollouts_per_start: 4
  ppo_update_epochs: 1
  ppo_gamma: 1.0
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  advantage_eps: 1.0e-6
  real_rollout_relabel:
    enabled: false
    path: null
    paths: null
    loss_scale: 0.0
    batch_size: 64
    outcome_baseline: 0.5
    positive_weight: 1.0
    negative_weight: 1.0
    reward_placement: terminal
    max_steps_per_trajectory: 0
    accuracy_lower_bound: 0.01
    accuracy_upper_bound: 0.99
    keep_all_failures_as_negatives: true
  tdmpc_ac:
    enabled: false
    value_mode: state
    action_dim: 7
    terminal_value_scale: 1.0
    critic_loss_scale: 1.0
    imagined_critic_loss_scale: 0.1
    replay_critic_loss_scale: 1.0
    target_critic_tau: 0.02
  slowtar: false
  slowreg: 1.0
  repval_loss: true
  repval_scale: 0.3
  repl_loss:
    slowtar: false
    lam: 0.95
    slowreg: 1.0
  target_critic_tau: 0.02
  return_tracker:
    decay: 0.99
    low: 0.05
    high: 0.95
  return_normalization:
    mode: dreamerv3
    low: 0.05
    high: 0.95
    eps: 1.0e-6

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adamw
    lr: 2.0e-6
    betas: [0.9, 0.999]
    eps: 1.0e-20
    weight_decay: 0.0
  policy:
    name: adam
    lr: 5.0e-7
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0
  critic:
    name: adam
    lr: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

eval:
  eval_every: 1

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: epoch_returns_mean
    mode: max
    k: 3
    format_str: 'epoch={epoch:03d}-epoch_returns={epoch_returns_mean:.4f}.ckpt'
