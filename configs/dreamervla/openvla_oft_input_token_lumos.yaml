# @package _global_
# DreamerVLA over OpenVLA-OFT query-before hidden states.
defaults:
  - _base_lumos
  - _self_
  - /task: libero_goal

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/dreamervla/oft_lumos_hidden_state/${task.name}/${now:%Y%m%d_%H%M%S}}

init:
  vla_ckpt_path: ${task.openvla_oft.ckpt_path}
  world_model_state_ckpt: null
  classifier_state_ckpt: null

dataset:
  _target_: dreamervla.dataset.balanced_terminal_dataset.BalancedTerminalDataset
  hdf5_dir: ${task.openvla_oft.hdf5_reward_dir}
  hidden_dir: ${task.openvla_oft.input_token_hidden_dir}
  proprio_keys: ${task.openvla_oft.input_tokens.proprio_keys}
  lang_emb_dir: ${task.openvla_oft.input_tokens.lang_emb_dir}
  expected_model_path: ${task.openvla_oft.ckpt_path}
  expected_encoder_state_ckpt: null
  expected_time_horizon: ${task.openvla_oft.input_tokens.chunk_size}
  expected_action_head_type: ${task.openvla_oft.input_tokens.expected_action_head_type}
  expected_obs_hidden_source: ${task.openvla_oft.input_tokens.expected_obs_hidden_source}
  expected_prompt_style: ${task.openvla_oft.input_tokens.expected_prompt_style}
  expected_history: ${task.openvla_oft.input_tokens.expected_history}
  expected_include_state: ${task.openvla_oft.input_tokens.expected_include_state}
  expected_rotate_images_180: ${task.openvla_oft.input_tokens.expected_rotate_images_180}
  reward_mode: per_window_dense
  balanced_length: 50000
  balanced_seed: 0
  sequence_length: 12
  image_size: ${task.image_size}
  image_keys: ${task.image_keys}
  hidden_key: ${task.hidden_key}
  load_actor_sequence: false
  stride: 1
  max_files: null
  max_demos_per_file: null
  max_windows: null

dataloader:
  batch_size: 2
  num_workers: 2
  shuffle: true
  drop_last: true
  pin_memory: false
  persistent_workers: true
  prefetch_factor: 1
  multiprocessing_context: forkserver

world_model:
  _target_: ${task.openvla_oft.wm_target}
  chunk_size: ${task.openvla_oft.input_tokens.chunk_size}
  obs_dim: ${task.openvla_oft.input_tokens.wm_obs_dim}
  action_dim: ${task.action_dim}
  token_count: ${task.openvla_oft.input_tokens.token_count}
  token_dim: ${task.openvla_oft.input_tokens.token_dim}
  time_horizon: ${task.openvla_oft.input_tokens.chunk_size}
  latent_stage: ${task.openvla_oft.input_tokens.latent_stage}
  latent_source: ${task.openvla_oft.input_tokens.latent_source}
  action_emb_dim: ${task.openvla_oft.input_tokens.action_emb_dim}
  num_action_repeat: ${task.openvla_oft.input_tokens.num_action_repeat}
  proprio_dim: ${task.openvla_oft.input_tokens.proprio_dim}
  proprio_emb_dim: ${task.openvla_oft.input_tokens.proprio_emb_dim}
  num_proprio_repeat: ${task.openvla_oft.input_tokens.num_proprio_repeat}
  proprio_reconstruction_loss_scale: 1.0
  lang_dim: ${task.openvla_oft.input_tokens.lang_dim}
  lang_emb_dim: ${task.openvla_oft.input_tokens.lang_emb_dim}
  num_lang_repeat: ${task.openvla_oft.input_tokens.num_lang_repeat}
  model_dim: ${task.openvla_oft.input_tokens.model_dim}
  depth: 6
  heads: 16
  dim_head: 128
  mlp_dim: 2048
  dropout: 0.1
  num_hist: 3
  num_pred: 1
  max_seq_len: 128
  hidden_loss_scale: 1.0
  cosine_loss_scale: 0.0
  chunk_rollout_chunks: 1
  chunk_rollout_loss_scale: 0.0
  reward_head_type: binary
  reward_loss_scale: 32.0
  reward_hidden_dim: 1024
  reward_init_logit: 0.0
  reward_pos_weight: 1.0
  return_predictions: false
  freeze_backbone: true

policy:
  _target_: dreamervla.models.actor.LatentToOpenVLAHiddenStateActor
  hidden_dim: null
  source_token_count: ${task.openvla_oft.input_tokens.token_count}
  source_token_dim: ${task.openvla_oft.input_tokens.token_dim}
  hidden_state_dim: ${task.openvla_oft.input_tokens.hidden_state_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.openvla_oft.input_tokens.chunk_size}
  head_type: oft_discrete_token
  vocab_size: 32000
  action_token_bins: 256
  min_action: ${task.openvla_oft.min_action}
  max_action: ${task.openvla_oft.max_action}
  adapter_type: residual_mlp
  adapter_hidden_dim: 1024
  freeze_lm_head: true
  init_lm_head_ckpt: ${task.openvla_oft.ckpt_path}
  bridge_hidden_dim: 1024
  num_bridge_layers: 2
  num_bridge_heads: 8
  bridge_dropout: 0.1

critic:
  _target_: ${task.openvla_oft.critic_target}
  hidden_dim: ${task.openvla_oft.input_tokens.token_dim}

algorithm:
  lumos:
    chunk_size: ${task.openvla_oft.input_tokens.chunk_size}
    classifier_min_steps: 3
