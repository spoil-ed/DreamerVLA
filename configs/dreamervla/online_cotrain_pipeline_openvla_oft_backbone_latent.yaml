# @package _global_
# Offline-warmup cotrain pipeline for OpenVLA-OFT query-before hidden states.
defaults:
  - _self_

_target_: dreamervla.runners.OnlineCotrainPipelineRunner
latent_type: backbone_latent
seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda
  debug: false

offline_warmup:
  data_dir: ${task.openvla_oft.hdf5_reward_dir}
  hidden_dir: ${task.openvla_oft.input_token_hidden_dir}
  task_id: null
  max_episodes_per_task: null
  debug_warmup_replay_epochs: 0
  debug_wm_warmup_steps: 2
  debug_classifier_warmup_steps: 2

training:
  out_dir: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/dreamervla/online_cotrain_pipeline_hidden_state/${now:%Y%m%d_%H%M%S}
  debug: false
  resume: false
  checkpoint_format: both
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 1
  gradient_accumulate_every: 1
  lr_scheduler: constant
  lr_warmup_steps: 0
  use_ema: false
  checkpoint_every: 2000
  wm_warmup_steps: 1200
  classifier_warmup_steps: 1200
  replay_warmup_log_every: 1
  warmup_replay_epochs: 1
  warmup_replay_max_steps: 0
  warmup_checkpoint_every: 0
  warmup_steps: 0
  train_actor_after_warmup: true
  train_classifier_inline: true
  classifier_batch_size: 16

init:
  vla_ckpt_path: ${task.openvla_oft.ckpt_path}
  encoder_state_ckpt: null
  require_encoder_state_ckpt: false
  world_model_state_ckpt: null
  classifier_state_ckpt: null
  dreamervla_state_ckpt: null
  load_dreamervla_world_model: false
  load_dreamervla_critic: false
  load_dreamervla_target_critic: false
  load_dreamervla_policy: false
  load_dreamervla_return_tracker: false
  load_dreamervla_strict: false
  reset_world_model_reward_head: false

encoder:
  _target_: dreamervla.models.encoder.OpenVLAOFTPolicy
  model_path: ${task.openvla_oft.ckpt_path}
  component_ckpt_dir: ${task.openvla_oft.component_ckpt_dir}
  resume_step: ${task.openvla_oft.resume_step}
  torch_dtype: bf16
  num_images_in_input: ${task.openvla_oft.num_images_in_input}
  use_lora: false
  use_l1_regression: ${task.openvla_oft.use_l1_regression}
  use_diffusion: false
  use_proprio: ${task.openvla_oft.use_proprio}
  use_film: false
  freeze_vla_backbone: true

online_rollout:
  buffer_size: 20000
  replay_capacity_mode: total_sharded
  sequence_length: ${task.openvla_oft.wm_sequence_length}
  min_replay: 2000
  min_episodes_per_task: 1
  min_sampleable_windows: 0
  require_classifier_evidence: true
  train_trigger: episode_end
  train_every: 8
  updates_per_train: 1
  updates_per_episode: 1
  recent_success_window: 100
  replay_sampling:
    enabled: true
    recent_episode_count: 8
    latest_online_required: true
    mix:
      online_recent: 0.5
      online_replay: 0.3
      coldstart_anchor: 0.2
  total_env_steps: 200000
  rollout_policy_source: dreamer_actor
  warmup_seed_episodes_per_task: 3
  classifier_early_neg_stride: 8
  num_envs: 1
  render_backend: egl
  debug_total_env_steps: 160
  debug_warmup_steps: 2
  debug_min_replay: 48
  debug_max_train_updates: 4
  debug_episode_horizon: 50

task_conditioning:
  enabled: false
  num_tasks: 10
  embedding_dim: 64

env:
  _target_: dreamervla.envs.train_env.DreamerVLAOnlineTrainEnv
  task_suite_name: ${task.suite}
  task_ids: [0]
  episode_horizon: 200
  history_length: ${task.openvla_oft.input_tokens.expected_history}
  include_state: ${task.openvla_oft.input_tokens.expected_include_state}
  vla_rotate_180: ${task.openvla_oft.input_tokens.expected_rotate_images_180}
  obs_hidden_source: ${task.openvla_oft.input_tokens.expected_obs_hidden_source}
  action_head_type: ${task.openvla_oft.input_tokens.expected_action_head_type}
  image_keys: [agentview_rgb]
  target_token_id: 10004

world_model:
  _target_: ${task.openvla_oft.wm_target}
  chunk_size: ${task.openvla_oft.input_tokens.chunk_size}
  obs_dim: ${task.openvla_oft.input_tokens.wm_obs_dim}
  action_dim: ${task.action_dim}
  token_count: ${task.openvla_oft.input_tokens.token_count}
  token_dim: ${task.openvla_oft.input_tokens.token_dim}
  time_horizon: ${task.openvla_oft.input_tokens.chunk_size}
  latent_stage: ${task.openvla_oft.input_tokens.latent_stage}
  latent_source: ${task.openvla_oft.input_tokens.latent_source}
  action_emb_dim: 10
  num_action_repeat: 1
  grad_checkpoint: true
  model_dim: 4106
  num_hist: 3
  depth: 6
  heads: 16
  dim_head: 128
  mlp_dim: 2048
  dropout: 0.1
  num_pred: 1
  max_seq_len: 128
  hidden_loss_scale: 1.0
  cosine_loss_scale: 0.1
  chunk_rollout_chunks: 4
  chunk_rollout_loss_scale: 1.0
  reward_head_type: binary
  reward_loss_scale: 32.0
  reward_hidden_dim: 1024
  reward_init_logit: 0.0
  reward_pos_weight: 1.0
  return_predictions: false
  freeze_backbone: true
  task_conditioning: ${task_conditioning}

policy:
  _target_: dreamervla.models.actor.LatentToOpenVLAHiddenStateActor
  hidden_dim: null
  source_token_count: ${task.openvla_oft.input_tokens.token_count}
  source_token_dim: ${task.openvla_oft.input_tokens.token_dim}
  hidden_state_dim: ${task.openvla_oft.input_tokens.hidden_state_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.openvla_oft.input_tokens.chunk_size}
  head_type: oft_discrete_token
  adapter_type: ${task.openvla_oft.actor_adapter_type}
  adapter_hidden_dim: ${task.openvla_oft.actor_adapter_hidden_dim}
  freeze_lm_head: ${task.openvla_oft.actor_freeze_lm_head}
  init_lm_head_ckpt: ${task.openvla_oft.ckpt_path}
  vocab_size: ${task.openvla_oft.vocab_size}
  action_token_bins: ${task.openvla_oft.action_token_bins}
  min_action: ${task.openvla_oft.min_action}
  max_action: ${task.openvla_oft.max_action}
  bridge_hidden_dim: 1024
  num_bridge_layers: 2
  num_bridge_heads: 8
  bridge_dropout: 0.1

critic:
  _target_: ${task.openvla_oft.critic_target}
  hidden_dim: ${task.openvla_oft.input_tokens.token_dim}
  critic_hidden_dim: 1024
  critic_layers: 3
  activation: silu
  norm: rms
  outscale: 0.0
  num_bins: 255
  bin_min: -20.0
  bin_max: 20.0

classifier:
  _target_: ${task.openvla_oft.classifier_target}
  latent_dim: ${task.openvla_oft.input_tokens.token_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.openvla_oft.input_tokens.chunk_size}
  token_dim: ${task.openvla_oft.input_tokens.token_dim}
  token_count: ${task.openvla_oft.input_tokens.token_count}
  token_pool: mean
  window: 8
  hidden_dim: 1024
  num_layers: 4
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.1
  granularity: chunk
  chunk_size: ${task.openvla_oft.input_tokens.chunk_size}
  chunk_pool: last
  task_conditioning: ${task_conditioning}

algorithm:
  update_type: LUMOS
  lumos:
    chunk_size: ${task.openvla_oft.input_tokens.chunk_size}
    episode_max_steps: 300
    debug_episode_max_steps: 150
    reward_model: probability_outcome
    classifier_min_steps: 3
    filter_zero_variance_groups: true
    ppo_rollouts_per_start_min: 1
    ppo_rollouts_per_start_max: 4
    update_micro_batch_starts: 24
  actor_input_mode: pooled
  rssm_action_scale: env
  rssm_action_clip: true
  imag_last: 4
  imagination_horizon: 5
  debug_imagination_horizon: 3
  horizon: 333
  contdisc: true
  lam: 0.95
  actent: 0.0
  kl_coef: 0.01
  kl_penalty_kind: kl
  actor_bc_to_ref_scale: 0.1
  ppo_rollouts_per_start: 1
  debug_ppo_rollouts_per_start: 1
  ppo_update_epochs: 1
  ppo_gamma: 1.0
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  clip_ratio_c: 3.0
  clip_log_ratio: 10.0
  advantage_eps: 1.0e-6
  slowtar: false
  slowreg: 1.0
  repval_loss: true
  repval_scale: 0.3
  target_critic_tau: 0.02
  return_tracker:
    decay: 0.99
    low: 0.05
    high: 0.95
  return_normalization:
    mode: dreamerv3
    low: 0.05
    high: 0.95
    eps: 1.0e-6

optim:
  precision: bf16
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adamw
    lr: 2.0e-6
    betas: [0.9, 0.999]
    eps: 1.0e-20
    weight_decay: 0.0
  policy:
    name: adam
    lr: 5.0e-7
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0
  critic:
    name: adam
    lr: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01
  classifier:
    name: adamw
    lr: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 1.0e-4

dataloader:
  batch_size: 4
  debug_batch_size: 2

collect:
  demos_per_shard: 0

runner:
  logger:
    logger_backends: [tensorboard]
    project_name: dreamervla
    log_path: ${training.out_dir}/log

checkpoint:
  save_last_ckpt: true
  topk:
    monitor_key: rollout_success_rate
    mode: max
    k: 3
    format_str: 'step={global_step:06d}-succ={rollout_success_rate:.4f}.ckpt'
