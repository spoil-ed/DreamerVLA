# @package _global_
# Single-node Ray online cotrain route for real DreamerVLA components.
#
# Model/component construction is kept under ray_components; task/dataset
# selection stays in task/env/replay. The runner consumes the generic
# learner.model_cfg and inference.cfg contracts without branching on LIBERO,
# RynnVLA, or a concrete sidecar dataset name.
defaults:
  - _self_
  - /task: libero_goal

_target_: dreamervla.runners.OnlineCotrainRayRunner
latent_type: action_hidden
seed: 7
render_backend: osmesa

cluster:
  num_nodes: 1
  component_placement:
    env: 0
    rollout: 1
    actor: 1

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

init:
  vla_ckpt_path: ${task.vla_ckpt_path}
  warmup_ckpt_path: null

ray_data:
  task_ids: [0]
  replay_capacity: 20000
  sequence_length: 24
  min_replay_episodes: 1

ray_components:
  encoder:
    target: dreamervla.models.encoder.RynnVLAEncoder
    kwargs:
      model_path: ${init.vla_ckpt_path}
      tokenizer_path: ${task.tokenizer_path}
      text_tokenizer_path: ${task.text_tokenizer_path}
      chameleon_vqgan_config: ${task.chameleon_vqgan_config}
      chameleon_vqgan_ckpt: ${task.chameleon_vqgan_ckpt}
      resolution: ${task.image_resolution}
      action_dim: ${task.action_dim}
      time_horizon: ${task.legacy_action_hidden.chunk_size}
      action_head_type: legacy
      pool: mean
      freeze_backbone: true
  world_model:
    target: dreamervla.models.world_model.dino_wm_chunk.ChunkAwareDinoWMWorldModel
    kwargs:
      chunk_size: ${task.legacy_action_hidden.chunk_size}
      obs_dim: ${task.legacy_action_hidden.wm_obs_dim}
      action_dim: ${task.action_dim}
      token_count: ${task.legacy_action_hidden.token_count}
      token_dim: ${task.legacy_action_hidden.token_dim}
      time_horizon: ${task.legacy_action_hidden.chunk_size}
      latent_stage: ${task.legacy_action_hidden.latent_stage}
      latent_source: ${task.legacy_action_hidden.latent_source}
      action_emb_dim: 10
      num_action_repeat: 1
      model_dim: 1034
      depth: 6
      heads: 16
      dim_head: 64
      mlp_dim: 2048
      dropout: 0.1
      num_hist: 3
      num_pred: 1
      max_seq_len: 128
      hidden_loss_scale: 1.0
      cosine_loss_scale: 0.1
      chunk_rollout_chunks: 4
      chunk_rollout_loss_scale: 1.0
      reward_head_type: binary
      reward_loss_scale: 32.0
      reward_hidden_dim: 1024
      reward_init_logit: 0.0
      reward_pos_weight: 1.0
      return_predictions: false
      freeze_backbone: true
  policy:
    target: dreamervla.models.actor.RynnVLAActionHiddenActor
    kwargs:
      hidden_dim: null
      action_hidden_dim: ${task.legacy_action_hidden.token_dim}
      action_dim: ${task.action_dim}
      time_horizon: ${task.legacy_action_hidden.chunk_size}
      head_type: legacy
      adapter_type: residual_mlp
      adapter_hidden_dim: 1024
      freeze_output_projection: false
      initial_log_std: -3.0
      min_log_std: -5.0
      max_log_std: -2.0
      freeze_log_std: false
      init_action_head_ckpt: ${init.vla_ckpt_path}
  classifier:
    target: dreamervla.models.reward.latent_success_classifier.LatentSuccessClassifier
    kwargs:
      latent_dim: ${task.legacy_action_hidden.wm_obs_dim}
      action_dim: ${task.action_dim}
      time_horizon: ${task.legacy_action_hidden.chunk_size}
      token_dim: ${task.legacy_action_hidden.token_dim}
      window: 8
      hidden_dim: 1024
      num_layers: 4
      num_heads: 8
      mlp_ratio: 4.0
      dropout: 0.1
      granularity: chunk
      chunk_size: ${task.legacy_action_hidden.chunk_size}
      chunk_pool: last
      head_type: transformer

env:
  num_workers: 1
  envs_per_worker: 4
  cfg:
    target: dreamervla.envs.train_env:DreamerVLAOnlineTrainEnv
    use_from_config: true
    kwargs:
      task_suite_name: ${task.suite}
      task_id: 0
      task_ids: ${ray_data.task_ids}
      resolution: ${task.image_resolution}
      image_size: ${task.image_size}
      history_length: ${task.legacy_action_hidden.expected_history}
      include_state: ${task.legacy_action_hidden.expected_include_state}
      obs_hidden_source: ${task.legacy_action_hidden.expected_obs_hidden_source}
      action_head_type: ${task.legacy_action_hidden.expected_action_head_type}
      vla_rotate_180: ${task.legacy_action_hidden.expected_rotate_images_180}
      action_input: normalized
      max_steps: 300

rollout:
  steps: 200000
  min_replay_episodes: ${ray_data.min_replay_episodes}
  min_replay_transitions: ${ray_data.sequence_length}
  min_sampleable_windows: 0
  require_classifier_evidence: true

replay:
  cfg:
    capacity: ${ray_data.replay_capacity}
    sequence_length: ${ray_data.sequence_length}
    task_ids: ${ray_data.task_ids}
    rank: 0
    replay_sampling:
      enabled: true
      recent_episode_count: 8
      latest_online_required: true
      mix:
        online_recent: 0.5
        online_replay: 0.3
        coldstart_anchor: 0.2

policy:
  cfg: ${ray_components.policy}

inference:
  placement:
    strategy: packed
    gpu_id: 0
  init_ckpt:
    path: ${init.warmup_ckpt_path}
    components: [world_model, policy]
  cfg:
    action_dim: ${task.action_dim}
    action_steps: ${task.legacy_action_hidden.chunk_size}
    encoder: ${ray_components.encoder}
    world_model: ${ray_components.world_model}
    policy: ${ray_components.policy}
    device: auto

learner:
  placement:
    strategy: packed
    start_gpu: 0
    end_gpu: 0
    num_gpus_per_worker: 1
  init_ckpt:
    path: ${init.warmup_ckpt_path}
    components: [policy, world_model, classifier]
  model_cfg:
    policy: ${ray_components.policy}
    world_model: ${ray_components.world_model}
    classifier: ${ray_components.classifier}
  train_cfg:
    mode: dreamervla_cotrain
    batch_size: 2
    classifier_batch_size: 2
    classifier_early_neg_stride: 8
    classifier_threshold: 0.5
    lr: 1.0e-4
    device: auto
    precision: bf16
    algorithm_cfg:
      ppo_rollouts_per_start: 4
      ppo_update_epochs: 1
      entropy_coef: 0.0
      lumos:
        chunk_size: ${task.legacy_action_hidden.chunk_size}
        episode_max_steps: 300
        ppo_rollouts_per_start_min: 4
        ppo_rollouts_per_start_max: 16
        classifier_min_steps: 4
        filter_zero_variance_groups: true
        update_micro_batch_starts: 1
    optim_cfg:
      grad_clip_norm: 1.0
      zero_grad_set_to_none: true
    optimizers:
      world_model:
        lr: 2.0e-6
        weight_decay: 0.0
      policy:
        lr: 5.0e-7
        weight_decay: 0.0
      classifier:
        lr: 1.0e-4
        weight_decay: 0.0
    syncer:
      store_name: ray_cotrain_rynn_action_hidden_weight_store

sync:
  weight_sync_every: 1

checkpoint:
  save_interval: 20
  save_final: true
  filename: learner.ckpt
  latest_name: latest.ckpt

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/ray_cotrain_rynn_action_hidden/${task.name}/${now:%Y%m%d_%H%M%S}}
  max_steps: 1000
  distributed_strategy: single
  data_parallel: false
  gradient_accumulate_every: 1
