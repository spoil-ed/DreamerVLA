# @package _global_
defaults:
  - _self_
  - /task: libero_goal

_target_: dreamervla.runners.JointDreamerVLARunner
seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda
  debug: false

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/dreamervla/oft_wmpo_outcome/${task.name}/${now:%Y%m%d_%H%M%S}}
  debug: false
  resume: false
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 20
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  checkpoint_every: 1
  use_ema: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  run_wm_phase: true
  run_actor_critic_phase: true

init:
  vla_ckpt_path: ${task.openvla_oft.ckpt_path}
  encoder_state_ckpt: null
  require_encoder_state_ckpt: false
  world_model_state_ckpt: null
  classifier_state_ckpt: null
  dreamervla_state_ckpt: null
  load_dreamervla_world_model: false
  load_dreamervla_critic: false
  load_dreamervla_target_critic: false
  load_dreamervla_policy: false
  load_dreamervla_return_tracker: false
  load_dreamervla_strict: false
  reset_world_model_reward_head: false

encoder: null

dataset:
  _target_: dreamervla.dataset.balanced_terminal_dataset.BalancedTerminalDataset
  hdf5_dir: ${task.openvla_oft.hdf5_reward_dir}
  hidden_dir: ${task.openvla_oft.action_hidden_dir}
  expected_model_path: ${task.openvla_oft.ckpt_path}
  expected_encoder_state_ckpt: null
  expected_time_horizon: ${task.openvla_oft.time_horizon}
  expected_action_head_type: ${task.openvla_oft.expected_action_head_type}
  expected_obs_hidden_source: ${task.openvla_oft.expected_obs_hidden_source}
  expected_prompt_style: ${task.openvla_oft.expected_prompt_style}
  expected_history: ${task.openvla_oft.expected_history}
  expected_include_state: ${task.openvla_oft.expected_include_state}
  expected_rotate_images_180: ${task.openvla_oft.expected_rotate_images_180}
  reward_mode: per_window_dense
  balanced_length: 50000
  balanced_seed: 0
  sequence_length: 36  # H + N*K + 1 = 3 + 4*8 + 1 for 4-chunk closed-loop rollout
  image_size: ${task.image_size}
  image_keys: ${task.image_keys}
  hidden_key: ${task.hidden_key}
  load_actor_sequence: false
  stride: 1
  max_files: null
  max_demos_per_file: null
  max_windows: null

dataloader:
  batch_size: 2
  num_workers: 2
  shuffle: true
  drop_last: true
  pin_memory: false
  persistent_workers: true
  prefetch_factor: 1
  multiprocessing_context: forkserver

world_model:
  _target_: ${task.openvla_oft.wm_target}
  chunk_size: ${task.openvla_oft.chunk_size}
  obs_dim: ${task.openvla_oft.wm_obs_dim}
  action_dim: ${task.action_dim}
  token_count: ${task.openvla_oft.token_count}
  token_dim: ${task.openvla_oft.token_dim}
  time_horizon: ${task.openvla_oft.time_horizon}
  latent_stage: ${task.openvla_oft.latent_stage}
  latent_source: ${task.openvla_oft.latent_source}
  action_emb_dim: 10
  num_action_repeat: 1
  model_dim: 4106
  # DINO-WM balanced predictor (query_after / action-hidden, seq=168): full-width
  # attention inner = heads*dim_head = 4096 = model_dim (no compression of the dense
  # 4096-d VLA tokens), lean FFN mlp_dim = model_dim. ~610M (<1B). Matches the offline
  # cotrain/standalone WM so all OpenVLA query_after routes share one latest profile.
  depth: 6
  heads: 16
  dim_head: 256
  mlp_dim: 4096
  dropout: 0.1
  num_hist: 3
  num_pred: 1
  max_seq_len: 128
  hidden_loss_scale: 1.0
  cosine_loss_scale: 0.1
  # chunk WM ignores parent's rollout_* (loss() overrides to chunk_loss only).
  # Anti-drift is controlled by chunk_rollout_chunks/scale below.
  chunk_rollout_chunks: 4
  chunk_rollout_loss_scale: 1.0
  reward_head_type: binary
  reward_loss_scale: 32.0
  reward_hidden_dim: 1024
  reward_init_logit: 0.0
  reward_pos_weight: 1.0
  return_predictions: false
  freeze_backbone: true

policy:
  _target_: ${task.openvla_oft.actor_target}
  hidden_dim: null
  action_hidden_dim: ${task.openvla_oft.token_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.openvla_oft.chunk_size}
  head_type: ${task.openvla_oft.actor_head_type}
  adapter_type: ${task.openvla_oft.actor_adapter_type}
  adapter_hidden_dim: ${task.openvla_oft.actor_adapter_hidden_dim}
  freeze_output_projection: ${task.openvla_oft.actor_freeze_output_projection}
  initial_log_std: -3.0
  min_log_std: -5.0
  max_log_std: -2.0
  freeze_log_std: false
  init_action_head_ckpt: ${task.openvla_oft.action_head_ckpt}

critic:
  _target_: ${task.openvla_oft.critic_target}
  hidden_dim: 1024
  critic_hidden_dim: 1024
  critic_layers: 3
  activation: silu
  norm: rms
  outscale: 0.0
  num_bins: 255
  bin_min: -20.0
  bin_max: 20.0

algorithm:
  update_type: wmpo_outcome
  wmpo:
    chunk_size: ${task.openvla_oft.chunk_size}
    episode_max_steps: 300  # LIBERO official horizon
    classifier_min_steps: 3  # CHUNK units (was 20 env-step / K=8, ceil → 3)
    filter_zero_variance_groups: true
  actor_input_mode: pooled
  rssm_action_scale: env
  rssm_action_clip: true
  imag_last: 4
  imagination_horizon: 5
  horizon: 333
  contdisc: true
  lam: 0.95
  actent: 0.0
  kl_coef: 0.01
  kl_penalty_kind: kl
  actor_bc_to_ref_scale: 0.1
  ppo_rollouts_per_start: 4
  ppo_update_epochs: 1
  ppo_gamma: 1.0
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  # A2/A3 numerical-stability guards (RLinf-aligned dual-clip; log-ratio
  # clamp guards the summed-trajectory ratio before exp). changes-numerics.
  clip_ratio_c: 3.0
  clip_log_ratio: 10.0
  advantage_eps: 1.0e-6
  tdmpc_ac:
    enabled: false
    value_mode: state
    action_dim: ${task.action_dim}
    terminal_value_scale: 1.0
    critic_loss_scale: 1.0
    imagined_critic_loss_scale: 0.1
    replay_critic_loss_scale: 1.0
    target_critic_tau: 0.02
  slowtar: false
  slowreg: 1.0
  repval_loss: true
  repval_scale: 0.3
  repl_loss:
    slowtar: false
    lam: 0.95
    slowreg: 1.0
  target_critic_tau: 0.02
  return_tracker:
    decay: 0.99
    low: 0.05
    high: 0.95
  return_normalization:
    mode: dreamerv3
    low: 0.05
    high: 0.95
    eps: 1.0e-6

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adamw
    lr: 2.0e-6
    betas: [0.9, 0.999]
    eps: 1.0e-20
    weight_decay: 0.0
  policy:
    name: adam
    lr: 5.0e-7
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0
  critic:
    name: adam
    lr: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

eval:
  eval_every: 1

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: epoch_returns_mean
    mode: max
    k: 3
    format_str: 'epoch={epoch:03d}-epoch_returns={epoch_returns_mean:.4f}.ckpt'
