# @package _global_
_target_: src.workspace.TokenWMWorkspace
training:
  out_dir: /mnt/data/spoil/workspace/DreamerVLA/data/outputs/worldmodel/dreamerv3_token/dreamerv3_token_libero_10
  device: cuda:0
  data_parallel: true
  seed: 7
  max_steps: 10000
  num_epochs: null
  log_every: 20
  save_every: 1000
  tqdm_interval_sec: 1.0
  resume: false
  resume_path: null
  resume_strict: true
  resume_skip_optimizer: false

dataset:
  _target_: src.dataloader.libero_token_sequence_dataset.LIBEROTokenSequenceDataset
  config_path: /mnt/data/spoil/workspace/DreamerVLA/data/configs/libero_goal/his_1_third_view_wrist_w_state_1_256_pretokenize_seq.yaml
  vocab_config_path: /mnt/data/spoil/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10/config.json
  history: 1
  batch_length: 31
  replay_context: 1
  sequence_length: 32
  stride: 1
  sequence_next_obs_source: current_obs
  n_image_tokens: 512
  spatial_grid: [16, 16]
  which_blocks: [-2, -1]
  num_image_tokens_vocab: 8192
  max_windows: null

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true
  drop_last: true
  persistent_workers: true

world_model:
  _target_: src.models.world_model.dreamerv3_torch.DreamerV3TokenFromPixelWorldModel
  action_dim: 7
  num_image_tokens_vocab: 8192
  n_image_tokens: 512
  num_views: 2
  spatial_grid: [16, 16]
  token_embed_dim: 512

  # Strict pixel-copy token ablation: the RSSM, reward head, continue head,
  # KL semantics, loss scales, optimizer, and sequence logic follow the pixel
  # baseline. The only change is the observation adapter/loss:
  # uint8 image + MSE -> discrete spatial token views + categorical CE.
  deter: 8192
  hidden: 1024
  stoch: 32
  classes: 64
  blocks: 8
  depth: 64
  mults: [2, 3]
  kernel: 5
  act: silu
  unimix: 0.01
  free_nats: 1.0

  # DreamerV3 world-model loss scales. rec_reduction=sum keeps the categorical
  # observation likelihood on the same "sum over observation dimensions" footing
  # as DreamerV3's pixel decoder, instead of averaging CE over 512 tokens.
  dyn_scale: 1.0
  rep_scale: 0.1
  rec_scale: 1.0
  rew_scale: 1.0
  con_scale: 1.0
  rec_reduction: sum

optim:
  lr: 4e-5
  beta1: 0.9
  beta2: 0.999
  eps: 1e-20
  weight_decay: 0.0
  warmup: 1000
  grad_clip: 100.0

viz:
  enabled: true
  every_n_steps: 100
  num_samples: 4
  cell_size: 192
  view_labels: [third, wrist]
  vqgan_config_path: /mnt/data/spoil/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  vqgan_ckpt_path: /mnt/data/spoil/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  device: null
