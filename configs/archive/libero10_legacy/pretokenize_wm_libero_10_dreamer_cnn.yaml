# Dreamer/TransDreamer-aligned token WM variant.
#
# Differences from pretokenize_wm_libero_10_warmup:
#   1. Observation frontend uses a DreamerV3-style CNN over the image-token
#      embedding grid instead of the compact ConvEncoderStem.
#   2. Dynamics uses the repo's faithful TransDreamer transformer cell rather
#      than the pretrained LLM transition backbone.
#   3. Adds a short rollout CE loss so the latent is pressured to support
#      action-conditioned futures, not only posterior reconstruction.
defaults:
  - pretokenize_wm_libero_10_warmup
  - _self_

training:
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/worldmodel/pretokenize_wm/pretokenize_wm_libero_10_dreamer_cnn

init:
  # The existing pure-VAE warmup checkpoint was trained with ConvEncoderStem.
  # Keep this architecture-clean variant cold-started; use warmup_vae_steps
  # below for an in-run posterior/decoder warmup if desired.
  warmup_ckpt_path: null

world_model:
  # Token ids are still the observation, but the spatial frontend is now a
  # DreamerV3-style CNN over token embeddings.
  obs_encoder_type: dreamer_cnn
  dreamer_cnn_depth: 64
  dreamer_cnn_mults:
  - 2
  - 3
  - 4
  - 4
  dreamer_cnn_kernel: 5
  dreamer_cnn_layers: 1
  dreamer_cnn_norm: true
  dreamer_cnn_act: gelu
  dreamer_cnn_strided: false
  dreamer_cnn_post_norm: true

  # Align dynamics with TransDreamer instead of a pretrained LLM backbone.
  use_pretrained_backbone: false
  transformer_variant: transdreamer
  transformer_max_rel_pos: 64

  # Brief pure posterior/decoder phase, then full KL+dynamics training.
  warmup_vae_steps: 2000

  # Orthodox Dreamer/RSSM posterior: q(z_t | h_t, o_t), not observation-only
  # q(z_t | o_t). This makes the KL comparison match the prior p(z_t | h_t).
  posterior_uses_h: true

  # Action-conditioned rollout pressure. With batch_length=7 + replay_context=1
  # from the parent config, ctx=1 and steps=3 predicts frames 1..3 from frame 0.
  imagine_loss_steps: 3
  imagine_loss_context: 1
  imagine_loss_scale: 0.2
