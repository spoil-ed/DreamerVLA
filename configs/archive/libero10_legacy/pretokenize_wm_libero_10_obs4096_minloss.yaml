# Original DreamerVLA/TSSM token WM with a larger observation embedding and a
# minimal loss set.  This keeps the old DreamerVLA data path and Transformer
# dynamics, but changes the ConvEncoderStem output from 1024 to 4096 so its
# observation embedding capacity matches the DreamerV3 pixel encoder scale.
defaults:
  - pretokenize_wm_libero_10_warmup
  - _self_

training:
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/worldmodel/pretokenize_wm/pretokenize_wm_libero_10_obs4096_minloss

init:
  # The 1024-d pure-VAE checkpoint is still useful for token embeddings and the
  # token decoder.  Shape-mismatched 4096-d heads are skipped by the loader, but
  # we still start WM training directly so the posterior and dynamics co-adapt
  # from step 0 instead of first over-specialising to pure reconstruction.
  warmup_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/outputs/worldmodel/vae/pure_vae/pure_vae_third_wrist_state_warmup_20260503_160838/final.ckpt

world_model:
  # Main requested change: ConvEncoderStem now returns [B,T,4096] instead of
  # [B,T,1024].  This also expands q(z|o), q(z|h,o), and transition_head's
  # output dimension where those modules use obs_dim.
  obs_dim: 4096

  # With pure-VAE preload, an extra pure reconstruction warmup makes q(z|o)
  # too sharp before the prior/dynamics ever see it, which caused immediate
  # KL-to-floor after warmup.  Keep this at 0.
  warmup_vae_steps: 0

  # Minimal loss set for this ablation: KL + image-token CE only.
  # Everything below is kept as explicit zeros so the training log makes it
  # obvious which objectives are intentionally disabled.
  kl_loss_coef: 0.6
  image_decoder_loss_coef: 1.0
  transition_loss_coef: 0.0
  delta_latent_coef: 0.0
  reward_loss_coef: 0.0
  pcont_loss_coef: 0.0
  action_margin_coef: 0.0
  action_ranking_coef: 0.0
  dynamic_token_coef: 0.0
  image_recon_ce_coef: 1.0
  image_recon_mse_coef: 0.0
  imagine_loss_steps: 0
  imagine_loss_scale: 0.0

  # Keep the original DreamerVLA/TransDreamer observation-only posterior and
  # pretrained Transformer dynamics for this specific "original path" ablation.
  posterior_uses_h: false
  use_pretrained_backbone: true
