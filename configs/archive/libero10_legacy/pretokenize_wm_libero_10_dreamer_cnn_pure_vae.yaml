# Config used by src.cli.train_pure_vae for the Dreamer-CNN token autoencoder
# warmup. The CLI consumes encoder/dataset/world_model from this file; run
# controls such as max_steps/batch_size/lr are still passed as CLI flags.
defaults:
  - pretokenize_wm_libero_10_dreamer_cnn
  - _self_

world_model:
  # Keep this pure-VAE checkpoint architecture-identical to the later WM warm
  # start path: image-token ids -> token embeddings -> Dreamer-style CNN stem.
  obs_encoder_type: dreamer_cnn
  dreamer_cnn_depth: 64
  dreamer_cnn_mults:
  - 2
  - 3
  - 4
  - 4
  dreamer_cnn_kernel: 5
  dreamer_cnn_layers: 1
  dreamer_cnn_norm: true
  dreamer_cnn_act: gelu
  dreamer_cnn_strided: false
  dreamer_cnn_post_norm: true

pure_vae:
  recommended_command: >-
    CUDA_VISIBLE_DEVICES=4 python -m src.cli.train_pure_vae
    --config-name pretokenize_wm_libero_10_dreamer_cnn_pure_vae
    --max-steps 5000 --batch-size 32 --lr 1e-4 --lr-warmup-steps 1000
    --include-state --state-loss-coef 1.0 --which-blocks=-2,-1
    --tokens-per-image-block 256 --spatial-grid 32,16 --decoder-minres 8,4
