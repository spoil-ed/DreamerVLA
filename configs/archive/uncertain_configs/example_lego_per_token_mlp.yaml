# Example: LEGO-style WM cfg using _target_ composition (diffusion_policy style).
#
# This cfg builds the exact same WM as v4e_per_token_mlp.yaml (the kind-string version),
# but composes the hidden_decoder as a separate `_target_`-instantiated module.
#
# Run with: --config-name example_lego_per_token_mlp
#
# Why this style:
#   * Building blocks (dreamer_vla/models/world_model/blocks/) are atomic and reusable
#   * Swap a slot by changing only the cfg, no Python code change
#   * Old block classes are preserved forever — adding a new block doesn't
#     modify existing ones (LEGO discipline)

defaults: []
_target_: dreamer_vla.runners.JointDreamerVLARunner
seed: 7

# (truncated) — see configs/dreamer_vla_libero_goal_pi0_legacy_action_hidden_head_actor_v4b.yaml
# for the full surrounding cfg (init, dataset, dataloader, training, policy, critic, optim, eval...).
# This file only demonstrates the WM block-composition pattern.

world_model:
  _target_: dreamer_vla.models.world_model.dreamerv3_torch.DreamerV3PixelRynnBackboneWorldModel
  obs_dim: 35840          # 5×7×1024 = pi0 legacy action_hidden
  action_dim: 7
  image_channels: 6
  image_size: 64
  # encoder slot (Identity by default when embed_dim == obs_dim)
  embed_dim: null
  encoder_hidden: 2048
  encoder_layers: 2
  # RSSM hyperparams
  deter: 8192
  hidden: 1024
  stoch: 32
  classes: 64
  blocks: 8
  # pixel decoder (auxiliary)
  depth: 64
  mults: [2, 3, 4, 4]
  kernel: 5
  act: silu
  unimix: 0.01
  free_nats: 1.0
  # loss scales
  dyn_scale: 1.0
  rep_scale: 0.1
  rec_scale: 1.0
  rew_scale: 10.0
  con_scale: 1.0
  hidden_rec_scale: 100.0
  # reward head
  reward_head_type: binary
  reward_bins: 255
  reward_init_logit: 0.0
  reward_pos_weight: 1.0
  full_hidden_rec_scale: 0.0
  actor_sequence_length: 0
  actor_input_kind: hidden

  # ───── LEGO slot: hidden_decoder ─────────────────────────────────
  # Swap this whole block with a different _target_ to change the decoder.
  # The WM constructor receives an nn.Module directly and uses it.
  hidden_decoder:
    _target_: dreamer_vla.models.world_model.dreamerv3_torch.PerTokenMLPHead
    in_dim: 10240         # = deter (8192) + stoch*classes (32*64=2048)
    n_tokens: 35
    token_dim: 1024
    query_dim: 128
    layers: 2
    units: 2048
    act: silu

# ───── Alternate hidden_decoder slots you can drop in ──────────────
#
# ResMLPHead (wider ResNet):
#   hidden_decoder:
#     _target_: dreamer_vla.models.world_model.common.ResMLPHead
#     in_dim: 10240
#     out_dim: 35840
#     layers: 4
#     units: 16384
#     act: silu
#
# Pi0-style transformer decoder:
#   hidden_decoder:
#     _target_: dreamer_vla.models.world_model.dreamerv3_torch.Pi0StyleHiddenDecoder
#     in_dim: 10240
#     out_dim: 35840
#     layers: 4
#     d_model: 1024
#     nhead: 8
#     mem_tokens: 8
#     dropout: 0.0
#     act: gelu
