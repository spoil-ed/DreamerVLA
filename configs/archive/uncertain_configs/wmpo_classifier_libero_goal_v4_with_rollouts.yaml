# LatentSuccessClassifier — Phase 3 v4 (WM-replay + failures + real rollouts)
#
# Adds a third data source — real policy SFT / online rollouts, where each
# demo's label and finish_step are derived per-episode from rewards/dones.
# This is the most WMPO-aligned source (1 episode = 1 real rollout, mixed
# outcomes), and removes the need for swap-neg padding once enough rollouts
# are available.
#
# Pre-requisite: export pi0 SFT inference rollouts into HDF5 with the same
# schema as the demo HDF5s (data/<demo_key>/{actions, dones, rewards, obs/...})
# plus the matching obs_embedding sidecar under rollout_hidden_dir. Until that
# corpus is built, set rollout_raw_dir / rollout_hidden_dir to null and the
# dataset falls back to v3b behaviour.
classifier:
  latent_dim: 35840
  window: 8
  hidden_dim: 1024
  num_layers: 8
  num_heads: 16
  mlp_ratio: 4.0
  dropout: 0.1

wm_replay:
  raw_dir: data/processed_data/libero_goal_no_noops_t_256
  hidden_dir: data/processed_data/libero_goal_no_noops_t_256_pi0_legacy_action_hidden_vla_policy_h2
  failure_raw_dir: data/processed_data/libero_goal_no_noops_t_256_failures
  failure_hidden_dir: data/processed_data/libero_goal_no_noops_t_256_failures_pi0_legacy_action_hidden_vla_policy_h2
  # Fill in once real-policy SFT / online rollouts are exported with matching
  # obs_embedding sidecars. Label & finish_step are derived per-episode from
  # the HDF5 ``rewards``/``dones`` arrays — no need to pre-split success/fail.
  rollout_raw_dir: null
  rollout_hidden_dir: null
  chunk_wm_ckpt: data/outputs/worldmodel/rynn_dino_wm_fullhidden/m1024_d6_rollout8_reward32_bs80/fixed_branch_20260523_195333/ckpt/step_00002000.ckpt
  K: 5
  num_hist: 3
  # With real rollouts available, swap-neg becomes redundant (rollouts already
  # supply in-distribution failure modes). Keep it off by default for v4;
  # flip back to true if you want hard-contrastive negatives on top.
  include_swap_negatives: false
  neg_method: swap
  noise_std: 0.05
  swap_min_frac: 0.30
  swap_max_frac: 0.80
  max_train_demos: null
  val_demos_tail: 32       # last 32 success demos held out for val
  val_failure_tail: 8      # last 8 failure demos held out for val
  val_rollout_tail: 32     # last 32 rollout demos held out for val (if available)

train:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 8
  max_steps: 20000
  eval_steps: 500
  log_every: 50
  ckpt_dir: data/outputs/dreamervla/outcome_classifier/libero_goal/v4_with_rollouts
  thresh_min: 0.3
  thresh_max: 1.0
  thresh_steps: 20
  stride_train: 8
  stride_val: 1
