# LatentSuccessClassifier — small-Transformer ablation (PAC-Bayes right-sized).
#
# Same workspace + dataset as the linear-default config, only the classifier
# head changes. Compared to the original 137 M Transformer:
#
#   default v3 head (137 M)          this ablation (~11 M)
#   ─────────────────────────────────────────────────────────
#   hidden_dim     1024              256              ↓ 4×
#   num_layers     8                 4                ↓ 2×
#   num_heads      16                4                ↓ 4×
#   mlp_ratio      4.0               2.0              ↓ 2×
#   dropout        0.1               0.5              ↑ 5× (regularization)
#   input_proj     ~36.7 M           ~9.2 M           ↓ 4×
#   8/4 layers     ~100.6 M          ~2.1 M           ↓ 48×
#   total          ~137 M            ~11.3 M          ↓ 12×
#
# Plus strong training-side regularization: label smoothing 0.1, weight_decay
# 1e-2 (vs 1e-4), longer warmup (lr already low). These approximate the
# "+ mixup + heavier wd" recipe from the optimization plan.
#
# Theory check: n ≈ #demos × 2 = 1000 train windows × ~17 effective epochs
# = ~17 K samples; #params 11 M ⇒ ~0.0015 data/param. Still under-determined
# but ~700× better than the 137 M v3 (7e-6). Combined with dropout 0.5 the
# PAC-Bayes generalization gap drops from ">> 1" to a manageable region.
#
# This ablation tests the hypothesis:
#   "Transformer fails ONLY because of capacity overhang vs data, not because
#    of architecture per se."
# If this hits F1 close to LR's 0.91 it confirms the diagnosis.
#
# Launch:
#   bash scripts/train_latent_classifier.sh latent_classifier_libero_goal_small_tf

_target_: dreamer_vla.runners.LatentClassifierRunner

classifier:
  latent_dim: 35840
  window: 8
  head_type: transformer
  hidden_dim: 256
  num_layers: 4
  num_heads: 4
  mlp_ratio: 2.0
  dropout: 0.5                   # strong dropout, the main overfit guard

data:
  success_dir_raw: data/processed_data/libero_goal_no_noops_t_256
  success_dir_hidden: data/processed_data/libero_goal_no_noops_t_256_pi0_legacy_action_hidden_vla_policy_h2
  failure_dir_raw: data/processed_data/libero_goal_no_noops_t_256_failures
  failure_dir_hidden: data/processed_data/libero_goal_no_noops_t_256_failures_pi0_legacy_action_hidden_vla_policy_h2
  window: 8
  stride_train: 8
  stride_val: 1

training:
  out_dir: data/outputs/dreamervla/outcome_classifier/libero_goal/wmpo_aligned_small_tf
  device: cuda
  seed: 0
  resume: false

  # ---- optimization ----
  max_steps: 8000                # longer than linear since TF needs more steps
  batch_size: 32
  val_batch_size: 256
  num_workers: 2
  lr: 1.0e-4
  weight_decay: 1.0e-2           # 100× the linear config
  label_smoothing: 0.1           # extra regularization for the TF head
  class_balanced: false

  # ---- cadence ----
  eval_every: 200
  ckpt_every: 500
  log_every: 50

  # ---- threshold sweep ----
  thresh_min: 0.3
  thresh_max: 1.0
  thresh_steps: 20

  # ---- episode-level eval ----
  episode_eval_enabled: true
  episode_eval_min_steps: 64
  episode_eval_stride: 1
  episode_eval_batch: 256
