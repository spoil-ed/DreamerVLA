# DINO-WM-style predictor over full OpenVLA-OFT action-token hidden.
# Target hidden shape per timestep: 8 * 7 * 4096 = 229376.
_target_: dreamer_vla.runners.OFTDinoWMRunner

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

training:
  out_dir: /mnt/data/spoil/workspace/DreamerVLA/data/outputs/worldmodel/oft_dino_wm/legacy_action_hidden_libero_goal
  device: cuda:0
  distributed_strategy: single
  data_parallel: false
  seed: 7
  max_steps: 10000
  num_epochs: null
  log_every: 20
  save_every: 1000
  tqdm_interval_sec: 1.0
  resume: false
  resume_path: null
  resume_strict: true
  resume_skip_optimizer: false
  save_final: true

dataset:
  _target_: dreamer_vla.dataset.libero_balanced_terminal_dataset.LIBEROBalancedTerminalDataset
  hdf5_dir: /mnt/data/spoil/workspace/DreamerVLA/data/processed_data/libero_goal_no_noops_t_256_pi06_remaining_reward
  hidden_dir: /mnt/data/spoil/workspace/DreamerVLA/data/processed_data/libero_goal_no_noops_t_256_oft_hdf5_6650_legacy_action_hidden_vla_policy_h2
  expected_model_path: /mnt/data/spoil/workspace/DreamerVLA/data/ckpts/OpenVLA-OFT/libero_goal_hdf5_latest_6650
  expected_encoder_state_ckpt: null
  expected_time_horizon: 8
  expected_action_head_type: oft_l1_regression
  expected_obs_hidden_source: action_query
  expected_prompt_style: vla_policy
  expected_history: 2
  expected_include_state: true
  expected_rotate_images_180: true
  reward_mode: per_window_dense
  balanced_length: 50000
  balanced_seed: 0
  sequence_length: 32
  image_size: 64
  image_keys: [agentview_rgb, eye_in_hand_rgb]
  hidden_key: obs_embedding
  load_actor_sequence: false
  stride: 1
  max_files: null
  max_demos_per_file: null
  max_windows: null

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true
  drop_last: true
  persistent_workers: true
  prefetch_factor: 2
  multiprocessing_context: null

world_model:
  _target_: dreamer_vla.models.world_model.dreamerv3_torch.OFTDinoWMWorldModel
  obs_dim: 229376
  action_dim: 7
  token_count: 56
  token_dim: 4096
  model_dim: 1024
  depth: 6
  heads: 8
  mlp_dim: 2048
  dropout: 0.1
  num_hist: 3
  num_pred: 1
  max_seq_len: 128
  hidden_loss_scale: 1.0
  cosine_loss_scale: 0.1
  rollout_loss_scale: 1.0
  rollout_horizon: 8
  rollout_context: null
  reward_head_type: binary
  reward_loss_scale: 32.0
  reward_hidden_dim: 1024
  reward_init_logit: 0.0
  reward_pos_weight: 1.0
  return_predictions: false

optim:
  lr: 5e-5
  beta1: 0.9
  beta2: 0.999
  eps: 1e-20
  weight_decay: 0.0
  warmup: 1000
  grad_clip: 100.0

viz:
  enabled: false
