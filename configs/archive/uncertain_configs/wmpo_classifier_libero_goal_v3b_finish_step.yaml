# LatentSuccessClassifier — Phase 3 v3b + WMPO finish_step alignment
#
# Identical to v3b (success demos + swap-neg + real failures, ~1:3.3 pos:neg)
# but trained on top of the updated dataset that:
#   - derives finish_step (in imagined-traj coords) from HDF5 `dones`
#   - derives `complete` from HDF5 `rewards.sum() > 0`
#   - anchors the "end" window at finish_step (not full imagined length)
#
# Hypothesis: old v3b leaked trajectory LENGTH as a feature (failures ran to
# timeout, success demos ended at completion → "long = fail"). finish_step
# anchoring removes that shortcut.
classifier:
  latent_dim: 35840
  window: 8
  hidden_dim: 1024
  num_layers: 8
  num_heads: 16
  mlp_ratio: 4.0
  dropout: 0.1

wm_replay:
  raw_dir: data/processed_data/libero_goal_no_noops_t_256
  hidden_dir: data/processed_data/libero_goal_no_noops_t_256_pi0_legacy_action_hidden_vla_policy_h2
  failure_raw_dir: data/processed_data/libero_goal_no_noops_t_256_failures
  failure_hidden_dir: data/processed_data/libero_goal_no_noops_t_256_failures_pi0_legacy_action_hidden_vla_policy_h2
  chunk_wm_ckpt: data/outputs/worldmodel/rynn_dino_wm_fullhidden/m1024_d6_rollout8_reward32_bs80/fixed_branch_20260523_195333/ckpt/step_00002000.ckpt
  K: 5
  num_hist: 3
  include_swap_negatives: true
  neg_method: swap
  noise_std: 0.05
  swap_min_frac: 0.30
  swap_max_frac: 0.80
  max_train_demos: null
  val_demos_tail: 32
  val_failure_tail: 8

train:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 8
  max_steps: 20000
  eval_steps: 500
  log_every: 50
  ckpt_dir: data/outputs/dreamervla/outcome_classifier/libero_goal/v3b_finish_step
  thresh_min: 0.3
  thresh_max: 1.0
  thresh_steps: 20
  stride_train: 8
  stride_val: 1
