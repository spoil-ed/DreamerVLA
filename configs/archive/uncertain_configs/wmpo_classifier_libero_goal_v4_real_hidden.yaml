# LatentSuccessClassifier — v4 (real-hidden, swap-neg off, real failures only)
#
# Diagnosis (CLAUDE.md):
#   1. v2/v3 fed the classifier WM-imagined hidden — cos(real, imagined) drifts
#      to 0.80 by the end of episode, exactly where the positive window lives.
#   2. sklearn LR on real hidden W=8 hits F1 ≈ 0.87 — the latent IS linearly
#      separable; the 137M Transformer at F1 ≈ 0.13–0.33 is overfitting.
#
# Fix in v4:
#   * Run with --use-real-hidden (loads obs_embedding from sidecar HDF5 directly)
#   * Run with --drop-swap-neg  (swap-perturbed neg has no real-hidden analog)
#   * head_type=linear (or mlp2/transformer for ablation)
#   * Negatives come from real pi0 SFT failure rollouts (failure_*_dir below)
#
# Per-epoch window composition (with --drop-swap-neg):
#   pos label=1 windows  = 401 (success end, complete=True)
#   neg label=0 windows  = 401 (success earlier)
#                        + 67×2 (failure end + earlier, complete=False)
#                        ≈ 535
#   ratio ≈ 1:1.3 — moderately balanced. Tune via --fail-oversample if needed.
#
# Launch:
#   CUDA_VISIBLE_DEVICES=0 PYTHONUNBUFFERED=1 \
#       /home/user01/miniconda3/envs/dreamervla/bin/python -u \
#       scripts/train_latent_success_classifier_v3.py \
#       --config configs/wmpo_classifier_libero_goal_v4_real_hidden.yaml \
#       --use-real-hidden --drop-swap-neg \
#       --episode-eval --episode-stride 1 --episode-min-steps 64
classifier:
  latent_dim: 35840
  window: 8
  hidden_dim: 1024
  num_layers: 8
  num_heads: 16
  mlp_ratio: 4.0
  dropout: 0.3        # ↑ from 0.1: stronger regularization for low-data regime
  head_type: linear   # linear | mlp2 | transformer

wm_replay:
  raw_dir: data/processed_data/libero_goal_no_noops_t_256
  hidden_dir: data/processed_data/libero_goal_no_noops_t_256_pi0_legacy_action_hidden_vla_policy_h2
  failure_raw_dir: data/processed_data/libero_goal_no_noops_t_256_failures
  failure_hidden_dir: data/processed_data/libero_goal_no_noops_t_256_failures_pi0_legacy_action_hidden_vla_policy_h2
  # Required field for v3 script even though --use-real-hidden bypasses imagine_all.
  # The script still loads the WM to populate buffers before _replace_with_real_hidden
  # overwrites the trajectories. Any valid chunk WM ckpt works.
  chunk_wm_ckpt: data/outputs/worldmodel/rynn_dino_wm_fullhidden/m1024_d6_rollout8_reward32_bs80/fixed_branch_20260523_195333/ckpt/step_00002000.ckpt
  K: 5
  num_hist: 3
  include_swap_negatives: false   # ignored under --use-real-hidden but explicit
  neg_method: swap
  noise_std: 0.05
  swap_min_frac: 0.30
  swap_max_frac: 0.80
  val_demos_tail: 32   # last 32 success demos held out for val
  val_failure_tail: 8  # last 8 failure demos held out for val

train:
  lr: 1.0e-4
  weight_decay: 1.0e-3   # ↑ from 1e-4: stronger L2 to match LR's C=0.01 effective scale
  batch_size: 8
  max_steps: 20000
  eval_steps: 500
  log_every: 50
  ckpt_dir: data/outputs/dreamervla/outcome_classifier/libero_goal/v4_real_hidden_linear
  thresh_min: 0.3
  thresh_max: 1.0
  thresh_steps: 20
  stride_train: 8
  stride_val: 1
