# Dreamer actor-critic on the DINO-WM-style full RynnVLA action-hidden world model.
# WM target/action hidden shape per step: 5 * 7 * 1024 = 35840.
_target_: src.workspace.JointDreamerVLAWorkspace
seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda
  debug: false

training:
  out_dir: /mnt/data/spoil/workspace/DreamerVLA/data/outputs/dreamervla/actor_critic_ppo/default/manual
  debug: false
  resume: false
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 20
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  checkpoint_every: 1
  use_ema: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  # Only an attached feature backbone/encoder is frozen.  The DINO-WM predictor
  # and reward head keep receiving supervised WM/reward updates.
  run_wm_phase: true
  run_actor_critic_phase: true

init:
  vla_ckpt_path: /mnt/data/spoil/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_goal
  encoder_state_ckpt: null
  require_encoder_state_ckpt: false
  world_model_state_ckpt: /mnt/data/spoil/workspace/DreamerVLA/data/outputs/worldmodel/rynn_dino_wm_fullhidden/m1024_d6_rollout8_reward32_bs80/fixed_branch_20260523_195333/ckpt/step_00002000.ckpt
  dreamervla_state_ckpt: null
  load_dreamervla_world_model: false
  load_dreamervla_critic: false
  load_dreamervla_target_critic: false
  load_dreamervla_policy: false
  load_dreamervla_return_tracker: false
  load_dreamervla_strict: false
  reset_world_model_reward_head: false

encoder: null

dataset:
  _target_: src.dataloader.libero_balanced_terminal_dataset.LIBEROBalancedTerminalDataset
  hdf5_dir: /mnt/data/spoil/workspace/DreamerVLA/data/processed_data/libero_goal_no_noops_t_256_pi06_remaining_reward
  hidden_dir: /mnt/data/spoil/workspace/DreamerVLA/data/processed_data/libero_goal_no_noops_t_256_pi0_legacy_action_hidden_vla_policy_h2
  expected_model_path: /mnt/data/spoil/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_goal
  expected_encoder_state_ckpt: null
  expected_time_horizon: 5
  expected_action_head_type: legacy
  expected_obs_hidden_source: action_query
  expected_prompt_style: vla_policy
  expected_history: 2
  expected_include_state: true
  expected_rotate_images_180: true
  reward_mode: per_window_dense
  balanced_length: 50000
  balanced_seed: 0
  sequence_length: 32
  image_size: 64
  image_keys: [agentview_rgb, eye_in_hand_rgb]
  hidden_key: obs_embedding
  load_actor_sequence: false
  stride: 1
  max_files: null
  max_demos_per_file: null
  max_windows: null

dataloader:
  batch_size: 1
  num_workers: 2
  shuffle: true
  drop_last: true
  pin_memory: false
  persistent_workers: true
  prefetch_factor: 1
  multiprocessing_context: forkserver

world_model:
  # Chunk-aware variant — adds no parameters relative to the parent class,
  # so an m1024 ckpt trained with RynnDinoWMWorldModel loads directly.
  # predict_next_chunk advances K env-steps per call (K must match
  # policy.time_horizon and algorithm.wmpo.chunk_size).
  _target_: src.models.world_model.rynn_dino_wm_chunk.ChunkAwareRynnDinoWMWorldModel
  chunk_size: 5
  obs_dim: 35840
  action_dim: 7
  token_count: 35
  token_dim: 1024
  model_dim: 1024
  depth: 6
  heads: 8
  mlp_dim: 2048
  dropout: 0.1
  num_hist: 3
  num_pred: 1
  max_seq_len: 128
  hidden_loss_scale: 1.0
  cosine_loss_scale: 0.1
  rollout_loss_scale: 1.0
  rollout_horizon: 8
  rollout_context: null
  reward_head_type: binary
  reward_loss_scale: 32.0
  reward_hidden_dim: 1024
  reward_init_logit: 0.0
  reward_pos_weight: 1.0
  return_predictions: false
  freeze_backbone: true

policy:
  _target_: src.models.vla_actor.Pi0ActionHiddenActor
  hidden_dim: 35840
  action_hidden_dim: 1024
  action_dim: 7
  time_horizon: 5
  head_type: legacy
  adapter_type: residual_mlp
  adapter_hidden_dim: 1024
  freeze_output_projection: false
  initial_log_std: -3.0
  min_log_std: -5.0
  max_log_std: -2.0
  freeze_log_std: false
  init_action_head_ckpt: ${init.vla_ckpt_path}

critic:
  _target_: src.models.critic.twohot_critic.TwohotCritic
  hidden_dim: 1024
  critic_hidden_dim: 1024
  critic_layers: 3
  activation: silu
  norm: rms
  outscale: 0.0
  num_bins: 255
  bin_min: -20.0
  bin_max: 20.0

algorithm:
  # Mainline: PPO/WMPO-style imagined-trajectory actor update (src/algorithms/dino_wmpo.py).
  # The dreamer-style lambda-return AC path (src/algorithms/dreamer_vla.py:imagine_actor_critic_step)
  # is preserved as an optional fallback: set `update_type=dreamer` to use it.
  # Dispatch is in src/workspace/dreamer_vla_workspace.py:~1105.
  update_type: wmpo_dense_chunk
  wmpo:
    # K must equal world_model.chunk_size and policy.time_horizon.
    chunk_size: 5
    # ── Used by dino_wmpo_outcome_step (the WMPO/verl reference route) ──
    # T_max = max imagined env-steps per outcome-style rollout. With chunk_size=5,
    # num_chunks = T_max // 5 = 40 chunks per rollout. Reasonable for libero_goal
    # (real env episode_horizon=200; classifier evaluates earlier success).
    episode_max_steps: 200
    # min_steps for classifier sliding-window sweep: windows ending before this
    # env-step are skipped (no early false positives). WMPO uses 100 for ~256-step
    # episodes; T_max//15 ≈ 13 for libero_goal.
    classifier_min_steps: 20
    # Skip GRPO groups with no within-group variance — they produce zero
    # advantage anyway and waste compute on forward passes.
    filter_zero_variance_groups: true
  actor_input_mode: pooled
  rssm_action_scale: env
  rssm_action_clip: true
  imag_last: 4
  imagination_horizon: 5
  horizon: 333
  contdisc: true
  lam: 0.95
  actent: 0.0
  kl_coef: 0.01
  kl_penalty_kind: kl
  actor_bc_to_ref_scale: 0.1
  ppo_rollouts_per_start: 4
  ppo_update_epochs: 1
  ppo_gamma: 1.0
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  advantage_eps: 1.0e-6
  real_rollout_relabel:
    enabled: false
    path: null
    paths: null
    loss_scale: 0.0
    batch_size: 64
    outcome_baseline: 0.5
    positive_weight: 1.0
    negative_weight: 1.0
    reward_placement: terminal
    max_steps_per_trajectory: 0
    accuracy_lower_bound: 0.01
    accuracy_upper_bound: 0.99
    keep_all_failures_as_negatives: true
  tdmpc_ac:
    enabled: false
    value_mode: state
    action_dim: 7
    terminal_value_scale: 1.0
    critic_loss_scale: 1.0
    imagined_critic_loss_scale: 0.1
    replay_critic_loss_scale: 1.0
    target_critic_tau: 0.02
  slowtar: false
  slowreg: 1.0
  repval_loss: true
  repval_scale: 0.3
  repl_loss:
    slowtar: false
    lam: 0.95
    slowreg: 1.0
  target_critic_tau: 0.02
  return_tracker:
    decay: 0.99
    low: 0.05
    high: 0.95
  return_normalization:
    mode: dreamerv3
    low: 0.05
    high: 0.95
    eps: 1.0e-6

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adamw
    lr: 2.0e-6
    betas: [0.9, 0.999]
    eps: 1.0e-20
    weight_decay: 0.0
  policy:
    name: adam
    lr: 5.0e-7
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0
  critic:
    name: adam
    lr: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

eval:
  eval_every: 1

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: epoch_returns_mean
    mode: max
    k: 3
    format_str: 'epoch={epoch:03d}-epoch_returns={epoch_returns_mean:.4f}.ckpt'
