# Discrete-stoch variant of pretokenize_wm_libero_10 (TransDreamer + DreamerV2/V3
# style categorical RSSM).  See src/models/world_model/tssm_discrete.py.
#
# Latent z is `stoch_dims` independent `stoch_categories`-way one-hot
# variables; `latent_dim` is force-set to stoch_dims*stoch_categories so the
# rest of the architecture matches.
#
#   stoch_dims=32, stoch_categories=32  →  latent flat dim = 1024
#   feature dim = latent + d_model = 1024 + 512 = 1536  (used by transition_head,
#   reward_head, image_decoder; downstream policy/critic configs that consume
#   this WM must use hidden_dim=1536, not 768).
_target_: src.workspace.pretokenize_wm_workspace.PretokenizeWMWorkspace
seed: 7
trainer:
  device: cuda:0
  debug: false
training:
  device: cuda:0
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/pretokenize_wm/pretokenize_wm_libero_10_discrete_minimal_warmup
  debug: false
  resume: false
  distributed_strategy: fsdp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 50
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500
ema:
  decay: 0.9999
  update_after_step: 0
init:
  vla_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10
  # Warm-init token_embedder + conv_stem + image_decoder (excl. deter_block) +
  # obs_to_stoch (renamed from VAE's posterior_head) from the pure-VAE ckpt.
  # Posterior+decoder start with already-trained weights (acc≈0.44 on autoencode);
  # full WM training (KL + dynamics + reward + pcont) begins from step 0.
  warmup_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/outputs/pure_vae/pure_vae_20260430_154901/final.ckpt
encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10
  tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/models--Alpha-VLLM--Lumina-mGPT-7B-768
  text_tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 10
  pool: mean
world_model:
  _target_: src.models.world_model.tssm_discrete.TSSMWorldModelTransDreamerDiscrete
  io_mode: token
  token_embed_dim: 512
  num_image_tokens_vocab: null
  hidden_dim: 4096
  in_channels: 512
  obs_dim: 1024
  action_dim: 7
  # Discrete latent: 32 dims × 32 categories → flat 1024.
  # latent_dim is force-set to 32*32 inside the class; do NOT specify here.
  stoch_dims: 32
  stoch_categories: 32
  gumbel_temp: 1.0
  unimix: 0.01
  d_model: 512
  n_heads: 8
  n_layers: 4
  d_ff: 2048
  dropout: 0.1
  free_nats: 1.0              # Per-latent-dim free-bits floor (DreamerV3 standard).
                              # Each of the 32 latent dims is independently clamped to >= 1 nat
                              # of KL before summing. Total KL floor is therefore 32 nats.
                              # Prevents the "concentrate KL in one dim, collapse the other 31"
                              # mode-collapse solution observed when the clamp was on the summed
                              # scalar (eff_rank fell from 6.0 → 1.35).
  kl_balance: 0.83            # was 0.8 — align with V3 dyn:rep = 5:1 ratio
  # In-training VAE warmup is OFF here because init.warmup_ckpt_path already
  # loads a pretrained VAE (set non-zero only if you want extra refinement
  # after loading).
  warmup_vae_steps: 0
  # ── Unified loss weights (shared across all WM configs) ──────────────
  # All structural losses use coef=1.0. Experimental variants differ only
  # via free_nats / dataset / decoder routing — NOT via these weights.
  # Stripped to standard DreamerV3 set: KL + recon CE + reward + pcont only.
  kl_loss_coef: 0.6           # was 1.0 — V3 effective total = 0.5(dyn)+0.1(rep)=0.6
  transition_loss_coef: 0.0     # was 1.0 — extra MSE on per-frame obs (collapse driver)
  reward_loss_coef: 1.0
  delta_latent_coef: 0.0        # was 1.0 — extra MSE on Δobs (collapse driver)
  image_decoder_loss_coef: 1.0
  pcont_loss_coef: 1.0
  pcont_hidden_dim: 256
  pcont_done_threshold: 0.5
  mapper_hidden_dim: 512
  reward_hidden_dim: 256
  min_std: 0.1              # unused under discrete, kept for parent-compat
  use_pretrained_backbone: true
  pretrained_model_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/Action_World_model_512/libero_10
  freeze_transition_backbone: false
  backbone_dtype: bfloat16
  transition_time_horizon: null
  spatial_grid:
  - 16
  - 16
  n_image_tokens: 256
  stem_init_proj_channels: 384
  stem_stage_channels:
  - 96
  - 192
  stem_kernel: 4
  stem_stride: 2
  stem_padding: 1
  stem_post_norm: true                  # add LayerNorm after conv_stem proj (anti-collapse)
  decoder_mid_channels: 192
  decoder_bspace_groups: 8
  decoder_minres:
  - 4
  - 4
  decoder_stage_channels:
  - 96
  - 48
  decoder_kernel: 4
  decoder_stride: 2
  decoder_padding: 1
  decoder_stoch_hidden: 512
  image_decoder_enabled: true
  image_decoder_detach_inputs: false
  image_decoder_stoch_source: post     # was prior — DreamerV3 std reconstructs from posterior
  image_decoder_detach_mode: none
  # TransDreamer-paper style posterior q(z|o); set true to revert to RSSM q(z|h,o).
  posterior_uses_h: false
  # ── Auxiliary regularizers (shared) ──────────────────────────────────
  action_margin_coef: 0.0       # was 0.05 — non-Dreamer aux
  action_margin: 0.1
  action_margin_every: 8
  action_ranking_coef: 0.0
  action_ranking_margin: 0.1
  # ── Image loss internal weights (shared) ─────────────────────────────
  image_recon_ce_coef: 1.0
  image_recon_mse_coef: 0.0
  dynamic_token_coef: 0.0       # was 3.0 — disable static/dynamic CE split
dataset:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_1_third_view_wrist_w_state_1_256_pretokenize_seq.yaml
  # Unified WM dataset: batch_length=1 + replay_context=1 gives T=2,
  # matching the old single-transition PretokenizeDataset path.
  history: 1
  batch_length: 7
  replay_context: 1
  stride: 1
  sequence_next_obs_source: current_obs
dataset_val_ind:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_1_third_view_wrist_w_state_1_256_pretokenize_seq_val_ind.yaml
  history: 1
  batch_length: 1
  replay_context: 1
  stride: 1
  sequence_next_obs_source: current_obs
dataset_val_ood:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_1_third_view_wrist_w_state_1_256_pretokenize_seq_val_ood.yaml
  history: 1
  batch_length: 1
  replay_context: 1
  stride: 1
  sequence_next_obs_source: current_obs
eval:
  eval_every: 1
dataloader:
  batch_size: 8
  num_workers: 8
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true
optim:
  grad_clip_norm: 5.0
  zero_grad_set_to_none: true
  world_model:
    name: adam
    lr: 0.0001
    betas:
    - 0.9
    - 0.95
    eps: 1.0e-08
    weight_decay: 0.01
checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: train_wm_loss
    mode: min
    k: 3
    format_str: epoch={epoch:03d}-train_wm_loss={train_wm_loss:.3f}.ckpt
viz:
  enabled: true
  every_n_steps: 500
  num_samples: 4
  which_block: -2
