seed: 7

algorithm:
  group_size: 4
  clip_ratio: 0.2
  entropy_coef: 0.01
  kl_coef: 0.05
  score_source: reward_head
  advantage_eps: 1.0e-6

critic:
  _target_: src.models.critic.Critic
  hidden_dim: 128
  critic_hidden_dim: 128

policy:
  _target_: src.models.vla_policy.VLAPolicy
  action_dim: 6
  hidden_dim: 128
  policy_head_hidden_dim: 128
  initial_log_std: -0.5
  min_log_std: -5.0
  max_log_std: 2.0
  encoder_type: multimodal
  image_size: 32
  patch_size: 8
  image_channels: 3
  vocab_size: 128
  max_language_length: 12
  proprio_dim: 6
  embed_dim: 64
  image_depth: 2
  language_depth: 2
  num_heads: 4
  mlp_ratio: 2.0
  proprio_hidden_dim: 64
  dropout: 0.0
  pad_token_id: 0
  rynn_pretrained_policy_ckpt: null
  rynn_precision: bf16
  rynn_device: auto
  rynn_encoder_configs: {}
  rynn_condition_frame_num: 1

world_model:
  _target_: src.models.world_model.RSSMWorldModel
  hidden_dim: ${policy.hidden_dim}
  action_dim: ${policy.action_dim}
  latent_dim: 64
  projection_hidden_dim: 128
  dynamics_hidden_dim: 128
  reward_hidden_dim: 128
  reward_loss_coef: 0.1

optim:
  grad_clip_norm: 1.0
  policy:
    name: adam
    lr: 3.0e-4
    weight_decay: 0.0
  world_model:
    name: adam
    lr: 1.0e-3
    weight_decay: 0.0

trainer:
  device: auto
  debug: false
  world_model_pretrain_steps: 3
  actor_update_steps: 3
