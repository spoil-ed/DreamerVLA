_target_: src.workspace.pretokenize_sft_workspace.PretokenizeSFTWorkspace

seed: 7

hydra:
  run:
    dir: .
  output_subdir: null

trainer:
  device: cuda:0
  debug: false

training:
  device: cuda:0
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/pretokenize_tssm_world_model_libero_10
  debug: false
  resume: false
  distributed_strategy: fsdp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 20
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1

dataset:
  _target_: src.dataloader.preencode_sft_dataset.PreencodeSFTDataset
  manifest_path: /home/user01/liops/workspace/DreamerVLA/data/preencode/rynnvla_libero_10/manifest.pt
  max_open_shards: 2

dataloader:
  batch_size: 8
  num_workers: 4
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true

world_model:
  _target_: src.models.world_model.TSSMWorldModel
  hidden_dim: 4096
  action_dim: 7
  latent_dim: 256
  state_token_count: 1
  mapper_hidden_dim: 1024
  dynamics_hidden_dim: 4096
  reward_hidden_dim: 512
  reward_loss_coef: 0.0
  kl_loss_coef: 0.1
  min_std: 0.1
  pretrained_model_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/Action_World_model_512/libero_10
  freeze_transition_backbone: false
  backbone_dtype: bfloat16
  transition_time_horizon: null

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adam
    lr: 1.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: train_wm_loss
    mode: min
    k: 3
    format_str: 'epoch={epoch:03d}-train_wm_loss={train_wm_loss:.4f}.ckpt'
