_target_: src.workspace.pretokenize_wm_workspace.PretokenizeWMWorkspace

seed: 7

hydra:
  run:
    dir: .
  output_subdir: null

trainer:
  device: cuda:0
  debug: false

training:
  device: cuda:0
  # Route-B: strided-conv encoder stem + DreamerV3 bspace deconv decoder.
  # WM state is 1D obs_dim=1024 (learnable pool replaces mean pool).
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/pretokenize_wm_transdreamer_routeB
  debug: false
  resume: false
  distributed_strategy: fsdp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  # shorter run for fast iteration on the codec + KL-floor fix
  num_epochs: 50
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500

ema:
  decay: 0.9999
  update_after_step: 0

init:
  vla_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10

encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/models--Alpha-VLLM--Lumina-mGPT-7B-768
  text_tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 10
  pool: mean

world_model:
  _target_: src.models.world_model.TSSMWorldModelTransDreamer
  # Raw VLA hidden size (what `in_channels` of the conv stem sees).
  hidden_dim: 4096
  in_channels: 4096
  # WM state size after the learnable strided-conv stem (DreamerV3 / TransDreamer style).
  obs_dim: 1024
  action_dim: 7
  latent_dim: 256
  d_model: 512
  n_heads: 8
  n_layers: 4
  d_ff: 2048
  dropout: 0.1
  # Remove the KL floor so post collapse / dyn mismatch can be observed directly.
  free_nats: 0.0
  kl_balance: 0.8
  kl_loss_coef: 1.0
  transition_loss_coef: 1.0
  reward_loss_coef: 0.1
  mapper_hidden_dim: 512
  reward_hidden_dim: 256
  min_std: 0.1
  use_pretrained_backbone: true
  pretrained_model_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/Action_World_model_512/libero_10
  freeze_transition_backbone: false
  backbone_dtype: bfloat16
  transition_time_horizon: null
  # ── Route-B spatial codec ─────────────────────────────────────────────
  # Strided-conv encoder stem (TransDreamer ImgEncoder style): 16×16 → 4×4
  # with K=4 S=2 pad=1, ELU, no norm, xavier init.
  spatial_codec: true
  spatial_grid: [16, 16]
  n_image_tokens: 256
  stem_init_proj_channels: 384
  stem_stage_channels: [96, 192]
  stem_kernel: 4
  stem_stride: 2
  stem_padding: 1
  # bspace conv decoder (DreamerV3 rssm.py:314-327 style).  BlockLinear
  # unfolds the 1D deter to 4×4×mid_channels, stoch branch adds a parallel
  # projection, then ConvTranspose 4→8→16 + 1×1 conv lifting to in_channels.
  decoder_mid_channels: 192
  decoder_bspace_groups: 8
  decoder_minres: [4, 4]
  decoder_stage_channels: [96, 48]
  decoder_kernel: 4
  decoder_stride: 2
  decoder_padding: 1
  decoder_stoch_hidden: 512
  image_decoder_enabled: true          # turned on automatically under spatial_codec
  image_decoder_loss_coef: 1.0         # global scale on (CE + MSE) combined image-recon
  image_recon_ce_coef: 1.0             # cross-entropy on next-frame image token ids
  image_recon_mse_coef: 0.1            # MSE on per-image-token 4096-d hiddens

dataset:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize.yaml

dataset_val_ind:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize_val_ind.yaml

dataset_val_ood:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize_val_ood.yaml

eval:
  eval_every: 1

dataloader:
  batch_size: 8
  num_workers: 8
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adam
    lr: 1.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: train_wm_loss
    mode: min
    k: 3
    format_str: 'epoch={epoch:03d}-train_wm_loss={train_wm_loss:.3f}.ckpt'

viz:
  enabled: true
  every_n_steps: 500
  num_samples: 4
  which_block: -2
