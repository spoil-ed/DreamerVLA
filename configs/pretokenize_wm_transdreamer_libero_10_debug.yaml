_target_: src.workspace.pretokenize_wm_workspace.PretokenizeWMWorkspace

seed: 7

hydra:
  run:
    dir: .
  output_subdir: null

trainer:
  device: cuda:0
  debug: false

training:
  device: cuda:0
  # distinct out_dir so we don't clobber the original run
  out_dir: /home/user01/yuxinglei/workspace/DreamerVLA/data/outputs/pretokenize_wm_transdreamer_debug
  debug: false
  resume: false
  distributed_strategy: fsdp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  # shorter run for fast iteration on the KL floor fix
  num_epochs: 5
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500

ema:
  decay: 0.9999
  update_after_step: 0

init:
  vla_ckpt_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10

encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/models--Alpha-VLLM--Lumina-mGPT-7B-768
  text_tokenizer_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 10
  pool: mean

world_model:
  _target_: src.models.world_model.TSSMWorldModelTransDreamer
  hidden_dim: 4096
  action_dim: 7
  latent_dim: 256
  d_model: 512
  n_heads: 8
  n_layers: 4
  d_ff: 2048
  dropout: 0.1
  # ── ONLY change vs. original: remove the KL floor that pinned train_wm_kl_loss at 1.0 ──
  free_nats: 0.0
  kl_balance: 0.8
  kl_loss_coef: 1.0
  transition_loss_coef: 1.0
  reward_loss_coef: 0.1
  mapper_hidden_dim: 512
  reward_hidden_dim: 256
  min_std: 0.1
  use_pretrained_backbone: true
  pretrained_model_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/Action_World_model_512/libero_10
  freeze_transition_backbone: false
  backbone_dtype: bfloat16
  transition_time_horizon: null
  # Pure-latent image decoder (no current-frame anchor). New head outside
  # pretrained backbone, so ckpt loading is unaffected.
  image_decoder_enabled: true
  n_image_tokens: 256
  image_decoder_hidden_dim: 1024
  image_decoder_loss_coef: 0.1

dataset:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize.yaml

dataset_val_ind:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize_val_ind.yaml

dataset_val_ood:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize_val_ood.yaml

eval:
  eval_every: 1

dataloader:
  batch_size: 8
  num_workers: 8
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adam
    lr: 1.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: train_wm_loss
    mode: min
    k: 3
    format_str: 'epoch={epoch:03d}-train_wm_loss={train_wm_loss:.3f}.ckpt'

viz:
  enabled: true
  every_n_steps: 500
  num_samples: 4
  which_block: -2
