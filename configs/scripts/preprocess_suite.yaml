name: preprocess_suite
data_root: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}
python: python
dry_run: false
only: [10_hdf5_reward, 35_oft_input_tokens, 40_validate]
task: libero_goal
libero_suite: ${task}
task_name: ${task}
artifact_name: null
task_label: null
gpus: "0"
ngpu: 1
num_procs: 8
overwrite: false
env:
  OVERWRITE: ${overwrite}
  TASK: ${task}
  LIBERO_SUITE: ${libero_suite}
  TASK_NAME: ${task_name}
  ARTIFACT_NAME: ${artifact_name}
  TASK_LABEL: ${task_label}
  OFT_CKPT: null
  OFT_HISTORY: null
  OFT_IMAGE_KEYS: null
  OFT_INPUT_TOKEN_GPUS: ${ngpu}
  GPUS: ${gpus}
steps:
  - id: 10_hdf5_reward
    script: scripts/preprocess/10_hdf5_reward.sh
  - id: 35_oft_input_tokens
    script: scripts/preprocess/35_oft_input_tokens.sh
  - id: 40_validate
    script: scripts/preprocess/40_validate.sh
