# @package _global_
name: preprocess_all
data_root: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}
python: python
dry_run: false
only: []
tasks: ${oc.env:SUITES,libero_10 libero_object libero_spatial}
gpus: "0"
ngpu: 1
num_procs: 8
overwrite: false
env:
  OVERWRITE: ${overwrite}
  GPUS: ${gpus}
steps:
  - id: preprocess_suite
    script: scripts/preprocess/prepare_libero_data.sh
    for_each: ${tasks}
    args: ["task={item}", "gpus=${gpus}", "ngpu=${ngpu}", "num_procs=${num_procs}", "overwrite=${overwrite}"]
