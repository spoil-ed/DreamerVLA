# @package _global_
name: preprocess_suite
data_root: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}
python: python
dry_run: false
only: [00_hdf5_reward, 10_oft_hidden_token, 20_validate]
task: libero_goal
libero_suite: ${task}
task_name: ${task}
artifact_name: null
task_label: null
gpus: "0"
ngpu: 1
num_procs: 8
overwrite: false
env:
  OVERWRITE: ${overwrite}
  TASK: ${task}
  LIBERO_SUITE: ${libero_suite}
  TASK_NAME: ${task_name}
  ARTIFACT_NAME: ${artifact_name}
  TASK_LABEL: ${task_label}
  OFT_CKPT: null
  OFT_HISTORY: null
  OFT_IMAGE_KEYS: null
  OFT_HIDDEN_TOKEN_GPUS: ${ngpu}
  GPUS: ${gpus}
steps:
  - id: 00_hdf5_reward
    script: scripts/preprocess/00_hdf5_reward.sh
  - id: 10_oft_hidden_token
    script: scripts/preprocess/10_oft_hidden_token.sh
  - id: 20_validate
    script: scripts/preprocess/20_validate.sh
