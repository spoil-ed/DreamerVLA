name: preprocess_all
data_root: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}
python: python
dry_run: false
only: []
tasks: ${oc.env:SUITES,libero_10 libero_object libero_spatial}
gpus: "0"
num_procs: 8
overwrite: false
env:
  OVERWRITE: ${overwrite}
  PRETOKENIZE_PROCS: ${num_procs}
  GPUS: ${gpus}
steps:
  - id: 20_pretokenize_dataset
    script: scripts/preprocess/20_pretokenize_dataset.sh
    for_each: ${tasks}
    env:
      TASK: "{item}"
