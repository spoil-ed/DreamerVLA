_target_: src.workspace.worldmodel_workspace.WorldModelWorkspace

seed: 7

hydra:
  run:
    dir: .
  output_subdir: null

init:
  vla_ckpt_path: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/data/ckpts/starting_point

encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}

trainer:
  device: cpu
  debug: true
  world_model_pretrain_steps: 1

training:
  device: cpu
  out_dir: data/outputs/minimal
  debug: true
  resume: false
  num_epochs: 1
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: 1
  use_ema: false
  checkpoint_every: 1

dataset:
  _target_: src.dataloader.minimal_dataset.MinimalRynnVLADataset
  num_samples: 4
  image_size: 256
  action_dim: 7
  state_dim: 8
  action_horizon: 5
  with_wrist: true
  with_world_model: true
  seed: 7

dataloader:
  batch_size: 1
  num_workers: 0
  shuffle: false
  drop_last: false
  pin_memory: false
  persistent_workers: false

world_model:
  _target_: src.models.world_model.RSSMWorldModel
  hidden_dim: 128
  action_dim: 7
  latent_dim: 64
  projection_hidden_dim: 128
  dynamics_hidden_dim: 128
  reward_hidden_dim: 128
  reward_loss_coef: 0.0
  training:
    num_epochs: 1

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adam
    lr: 1.0e-3
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.0

checkpoint:
  save_last_ckpt: false
  save_last_snapshot: false
  topk:
    monitor_key: train_loss
    mode: min
    k: 1
    format_str: 'epoch={epoch:03d}-train_loss={train_loss:.3f}.ckpt'
