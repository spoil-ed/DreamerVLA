# @package world_model
# DreamerVLA's native chunk world model over OpenVLA-OFT token grids.
_target_: ${task.openvla_oft.wm_target}
chunk_size: ${task.openvla_oft.hidden_token.chunk_size}
obs_dim: ${task.openvla_oft.hidden_token.wm_obs_dim}
action_dim: ${task.action_dim}
token_count: ${task.openvla_oft.hidden_token.token_count}
token_dim: ${task.openvla_oft.hidden_token.token_dim}
token_normalization: layer_norm
token_norm_eps: 1.0e-6
time_horizon: ${task.openvla_oft.hidden_token.chunk_size}
latent_stage: ${task.openvla_oft.hidden_token.latent_stage}
latent_source: ${task.openvla_oft.hidden_token.latent_source}
action_emb_dim: ${task.openvla_oft.hidden_token.action_emb_dim}
num_action_repeat: ${task.openvla_oft.hidden_token.num_action_repeat}
proprio_dim: ${task.openvla_oft.hidden_token.proprio_dim}
proprio_emb_dim: ${task.openvla_oft.hidden_token.proprio_emb_dim}
num_proprio_repeat: ${task.openvla_oft.hidden_token.num_proprio_repeat}
proprio_reconstruction_loss_scale: 0.0
lang_dim: ${task.openvla_oft.hidden_token.lang_dim}
lang_emb_dim: ${task.openvla_oft.hidden_token.lang_emb_dim}
num_lang_repeat: ${task.openvla_oft.hidden_token.num_lang_repeat}
grad_checkpoint: true
model_dim: ${task.openvla_oft.hidden_token.model_dim}
num_hist: 3
depth: 6
heads: 16
dim_head: 128
attn_impl: sdpa
mlp_dim: 2048
dropout: 0.1
num_pred: 1
max_seq_len: 128
hidden_loss_scale: 1.0
cosine_loss_scale: 0.0
chunk_rollout_chunks: 4
chunk_rollout_loss_scale: 0.2
reward_head_type: binary
reward_loss_scale: 0.0
reward_hidden_dim: 1024
reward_init_logit: 0.0
reward_pos_weight: 1.0
return_predictions: false
freeze_backbone: true
task_conditioning: ${task_conditioning}
