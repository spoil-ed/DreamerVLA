_target_: src.workspace.worldmodel_workspace.WorldModelWorkspace

seed: 7

hydra:
  run:
    dir: .
  output_subdir: null

init:
  vla_ckpt_path: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/data/ckpts/starting_point

encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  freeze_backbone: true

trainer:
  device: cuda:0
  debug: false
  world_model_pretrain_steps: 1

training:
  device: cuda:0
  out_dir: data/outputs/debug_pretrained_transition
  debug: false
  resume: false
  num_epochs: 1
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1000

dataset:
  _target_: src.dataloader.rynnvla_dataset.RynnVLALIBERODataset
  config_path: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/configs/rynnvla_libero_object.yaml
  resolution: 256
  with_state: true
  with_wrist: true
  with_action: true
  with_world_model: true

dataloader:
  batch_size: 8
  num_workers: 0
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: false

world_model:
  _target_: src.models.world_model.PretrainedTransitionWorldModel
  hidden_dim: 4096
  action_dim: 7
  latent_dim: 256
  mapper_hidden_dim: 1024
  transition_hidden_dim: 4096
  state_token_count: 1
  pretrained_model_path: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/data/ckpts/starting_point
  reward_hidden_dim: 512
  reward_loss_coef: 0.0
  consistency_loss_coef: 0.1
  freeze_transition_backbone: false

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adam
    lr: 3.0e-5
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.0

checkpoint:
  save_last_ckpt: false
  save_last_snapshot: false
  topk:
    monitor_key: train_loss
    mode: min
    k: 0
    format_str: 'epoch={epoch:03d}-train_loss={train_loss:.3f}.ckpt'
