# @package _global_
_target_: dreamervla.runners.EmbodiedEvalRunner
seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda:0
  debug: false

training:
  device: cuda:0
  out_dir: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/eval/eval_libero_vla
  debug: false
  resume: false
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: false
  num_epochs: 0
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1
  lr_scheduler: constant
  lr_warmup_steps: 0

init:
  vla_ckpt_path: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/checkpoints/VLA_model_256/libero_goal
  encoder_state_ckpt: null

encoder:
  _target_: dreamervla.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/checkpoints/models--Alpha-VLLM--Lumina-mGPT-7B-768
  text_tokenizer_path: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/checkpoints/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/checkpoints/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/checkpoints/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 5
  action_head_type: legacy
  pool: mean

eval:
  ckpt_path: null
  ckpt_kind: auto
  seed: ${seed}
  task_suite_name: libero_goal
  num_episodes_per_task: 3
  enumerate_all_init_states: false
  num_steps_wait: 10
  render_backend: osmesa
  render_gpu_pool: null
  render_shard_id: 0
  task_start: 0
  task_ids: null
  max_tasks: null
  max_steps: null
  action_steps: 5
  action_postprocess: none
  save_video: false
  video_max_episodes: 1
  dreamer_deterministic: true
  dreamer_policy_source: ckpt
  dreamer_action_repeat: 1
  dreamer_clip_actions: true
  dreamer_unnorm_actions: auto
  dreamer_latent_action_source: env
  dreamer_rollout_mode: stateless
  dreamer_actor_input_source: latent
  dreamer_wm_history_length: 2
  dreamer_wm_rotate_images: true
  dreamer_wm_prompt_style: vla_policy
  dreamer_wm_include_state: true
  obs_hidden_source: auto
  target_token_id: 10004
  dreamer_which_image_block: -2
  dreamer_which_image_blocks: [-2, -1]
  log_action_stats: false
  log_action_stats_limit: 8
  log_hidden_action_compare: false
  hidden_action_compare_limit: 300
  hidden_action_compare_unnorm_policy_outputs: true
  trace_policy_debug: false
  trace_policy_debug_limit: 64
  trace_policy_debug_verbose: false
  empty_cuda_cache_each_step: false
  export_real_relabel: false
  real_relabel_dir: null
  tdmpc_mpc:
    enabled: false
    use_target_critic: true
    horizon: 3
    iterations: 6
    num_samples: 512
    num_elites: 64
    num_pi_trajs: 24
    action_dim: 7
    min_std: 0.05
    max_std: 2.0
    temperature: 0.5
    gamma: 0.995
    terminal_value_scale: 1.0
    reward_scale: 1.0
    value_mode: state
    execute_steps: ${eval.action_steps}
    eval_mode: true
    warm_start: true
    seed: ${seed}

ema:
  decay: 0.9999
  update_after_step: 0

optim:
  grad_clip_norm: 4.0
  zero_grad_set_to_none: true
  vla:
    name: adam
    lr: 0.0
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0

checkpoint:
  save_last_ckpt: false
  save_last_snapshot: false
  topk:
    monitor_key: eval_success_rate
    mode: max
    k: 1
    format_str: eval_success_rate={eval_success_rate:.4f}.ckpt
