_target_: src.workspace.nopretokenize_sft_workspace.NopretokenizeSFTWorkspace

seed: 7

hydra:
  run:
    dir: .
  output_subdir: null

trainer:
  device: cuda:0
  debug: false

training:
  device: cuda:0
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/debug_nopretokenize_sft
  debug: false
  resume: false
  distributed_strategy: fsdp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 40
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500

ema:
  decay: 0.9999
  update_after_step: 0

eval:
  eval_every: 1

init:
  vla_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10

encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/models--Alpha-VLLM--Lumina-mGPT-7B-768
  text_tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 10
  pool: mean

dataset:
  _target_: src.dataloader.nopretokenize_dataset.NopretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/configs/rynnvla_libero_10_cotrain.yaml
  raw_data_dir_override: /home/user01/liops/workspace/DreamerVLA/data/libero/datasets
  task_suite_override: libero_goal
  resolution: 256
  with_state: true
  with_wrist: true
  with_action: true
  with_world_model: false

dataloader:
  batch_size: 8
  num_workers: 8
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true

optim:
  grad_clip_norm: 4.0
  zero_grad_set_to_none: true
  vla:
    name: adam
    lr: 5.0e-6
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.15

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: train_vla_loss
    mode: min
    k: 3
    format_str: 'epoch={epoch:03d}-train_vla_loss={train_vla_loss:.3f}.ckpt'
