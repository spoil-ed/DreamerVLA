# Config consumed by src.cli.train_pure_vae for the Gaussian-latent
# Dreamer-CNN token autoencoder warmup.
defaults:
  - pretokenize_wm_libero_10_dreamer_cnn_gauss
  - _self_

world_model:
  latent_type: gaussian
  latent_dim: 1024
  min_std: 0.1
  obs_encoder_type: dreamer_cnn
  dreamer_cnn_mults:
  - 2
  - 3
  - 4

pure_vae:
  recommended_command: >-
    CUDA_VISIBLE_DEVICES=4,5,6,7 python -m src.cli.train_pure_vae
    --config-name pretokenize_wm_libero_10_dreamer_cnn_gauss_pure_vae
    --latent-type gaussian --latent-dim 1024 --min-std 0.1
    --max-steps 5000 --batch-size 32 --lr 1e-4 --lr-warmup-steps 1000
    --device cuda:0 --data-parallel --seed 7
    --include-state --state-loss-coef 1.0 --which-blocks=-2,-1
    --tokens-per-image-block 256 --spatial-grid 32,16 --decoder-minres 8,4
    --viz-every 500 --log-every 20
