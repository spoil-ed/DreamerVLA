# @package _global_
# Shared process-launch mechanics for full cotrain and frozen Dreamer routes.
launch:
  distributed: false
  ngpu: ${manual_cotrain.ngpu}
  gpus: null
  data_root: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}
  write_libero_config: true
  required_target_values: []
  contract:
    _target_: dreamervla.launchers.contracts.CotrainLaunchContract
  env:
    PYTHONUNBUFFERED: 1
    HYDRA_FULL_ERROR: 1
    NCCL_NVLS_ENABLE: 0
    RAY_DEDUP_LOGS: 0
