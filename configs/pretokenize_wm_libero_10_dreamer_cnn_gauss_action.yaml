# Gaussian latent + 3-down Dreamer-CNN, with stronger dynamics/action signal.
#
# Use this after the Gaussian pure-VAE warmup has finished.  Compared with
# pretokenize_wm_libero_10_dreamer_cnn_gauss:
#   - lower min_std: less sampling noise from the nearly-deterministic warmup
#   - no per-dim free_nats floor: KL/prior keeps receiving gradients
#   - dynamic-token CE weighting: stop letting static tokens dominate image loss
#   - action ranking: explicitly prefer real actions over shuffled actions
defaults:
  - pretokenize_wm_libero_10_dreamer_cnn_gauss
  - _self_

training:
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/worldmodel/pretokenize_wm/pretokenize_wm_libero_10_dreamer_cnn_gauss_action

world_model:
  min_std: 0.03
  free_nats: 0.0

  dynamic_token_coef: 3.0
  imagine_loss_scale: 0.5

  action_ranking_coef: 0.1
  action_ranking_margin: 0.05

  # A small hidden-transition anchor keeps action_ranking from training an
  # otherwise unconstrained transition_head. Keep it low so token CE remains
  # the main observation objective.
  transition_loss_coef: 0.1
  delta_latent_coef: 0.0
