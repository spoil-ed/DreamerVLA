_target_: src.workspace.cotrain_workspace.CotrainWorkspace

seed: 7

hydra:
  run:
    dir: .
  output_subdir: null

trainer:
  device: cuda:0
  debug: false
  precision: bf16

training:
  device: cuda:0
  out_dir: data/outputs/cotrain/libero_10
  debug: false
  resume: false
  num_epochs: 40
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1
  train_vla: true
  train_world_model: true
  train_critic: false

init:
  vla_ckpt_path: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/data/ckpts/VLA_model
  world_model_ckpt_path: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/data/ckpts/Action_World_model
  strict_load_vla: false
  strict_load_world_model: false

encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/data/ckpts/chameleon/base_model
  text_tokenizer_path: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/data/ckpts/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 10
  pool: mean
  freeze_backbone: false

dataset:
  _target_: src.dataloader.rynnvla_dataset.RynnVLALIBERODataset
  config_path: /home/yuxinglei/workspace/2026nips/Dreamer-VLA/configs/rynnvla_libero_10_cotrain.yaml
  resolution: 256
  with_state: true
  with_wrist: true
  with_action: true
  with_world_model: true

dataloader:
  batch_size: 8
  num_workers: 8
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true

world_model:
  _target_: src.models.world_model.RSSMWorldModel
  hidden_dim: 128
  action_dim: 7
  latent_dim: 64
  projection_hidden_dim: 128
  dynamics_hidden_dim: 128
  reward_hidden_dim: 128
  reward_loss_coef: 0.0
  kl_loss_coef: 0.1
  training:
    num_epochs: 40

action_model:
  enabled: true
  init_from_vla_ckpt: true
  action_dim: 7
  time_horizon: 10
  loss:
    name: l1
    weight: 1.0

critic:
  enabled: false
  type: value
  hidden_dim: 1024
  num_layers: 2
  dropout: 0.0
  loss_weight: 0.1

loss:
  action_weight: 1.0
  world_model_weight: 1.0
  critic_weight: 0.1

optim:
  grad_clip_norm: 4.0
  zero_grad_set_to_none: true
  encoder:
    name: adam
    lr: 8.0e-6
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.1
  world_model:
    name: adam
    lr: 5.0e-6
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.15
  action_model:
    name: adam
    lr: 8.0e-6
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.1
  critic:
    name: adam
    lr: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.0

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: train_loss
    mode: min
    k: 3
    format_str: 'epoch={epoch:03d}-train_loss={train_loss:.3f}.ckpt'
