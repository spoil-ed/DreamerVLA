defaults:
  - vla_rynnvla_action_head
  - _self_

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_ROOT,.}/data/outputs/vla/rynnvla_action_head_one_trajectory/${task.name}/${now:%Y%m%d_%H%M%S}}

dataset:
  _target_: dreamer_vla.dataset.one_trajectory_pretokenize_dataset.OneTrajectoryPretokenizeActionChunkDataset
  config_path: ${task.pretokenize_config_path}
  action_horizon: ${task.action_horizon}
  trajectories_per_task: 1
  trajectory_offset: 0
  selection_scope: global
  strict: true

dataset_val_ind:
  _target_: dreamer_vla.dataset.one_trajectory_pretokenize_dataset.OneTrajectoryPretokenizeActionChunkDataset
  config_path: ${task.pretokenize_val_ind_config_path}
  action_horizon: ${task.action_horizon}
  trajectories_per_task: 1
  trajectory_offset: 0
  selection_scope: global
  strict: true

dataset_val_ood:
  _target_: dreamer_vla.dataset.one_trajectory_pretokenize_dataset.OneTrajectoryPretokenizeActionChunkDataset
  config_path: ${task.pretokenize_val_ood_config_path}
  action_horizon: ${task.action_horizon}
  trajectories_per_task: 1
  trajectory_offset: 0
  selection_scope: global
  strict: true
