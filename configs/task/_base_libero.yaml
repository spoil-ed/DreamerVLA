# Shared OpenVLA-OFT hidden-token base for all four LIBERO suites.

image_resolution: 256
image_size: 64
image_keys: [agentview_rgb]
hidden_key: obs_embedding

action_dim: 7

# Task-owned classifier binding. The role recipe under configs/classifier only
# consumes this contract; concrete model and dataset implementations are chosen
# together with the task.
classifier:
  model:
    _target_: dreamervla.algorithms.critic.LatentSuccessClassifier
  dataset:
    train:
      _target_: dreamervla.dataset.lumos_aligned_latent_dataset.LumosAlignedLatentTrainDataset
    validation:
      _target_: dreamervla.dataset.lumos_aligned_latent_dataset.LumosAlignedLatentValDataset
  input:
    latent_dim: ${task.openvla_oft.hidden_token.classifier_latent_dim}
    action_dim: ${task.action_dim}
    time_horizon: ${task.openvla_oft.hidden_token.chunk_size}
    token_dim: ${task.openvla_oft.hidden_token.token_dim}
    token_count: ${task.openvla_oft.hidden_token.token_count}
    proprio_dim: ${task.openvla_oft.hidden_token.proprio_dim}
    proprio_emb_dim: ${task.openvla_oft.hidden_token.proprio_emb_dim}
    num_proprio_repeat: ${task.openvla_oft.hidden_token.num_proprio_repeat}
    lang_dim: ${task.openvla_oft.hidden_token.lang_dim}
    lang_emb_dim: ${task.openvla_oft.hidden_token.lang_emb_dim}
    num_lang_repeat: ${task.openvla_oft.hidden_token.num_lang_repeat}
    chunk_size: ${task.openvla_oft.hidden_token.chunk_size}

hdf5_dir: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/processed_data/${task.suite}/no_noops_t_256
hdf5_reward_dir: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/processed_data/${task.suite}/no_noops_t_256_remaining_reward
collected_rollout_dir: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/collected_rollouts/${task.suite}
collected_reward_dir: ${task.collected_rollout_dir}/reward
collected_hidden_token_dir: ${task.collected_rollout_dir}/hidden
openvla_oft:
  dataset_statistics_key: ${task.suite}_no_noops
  action_horizon: 8
  time_horizon: 8
  image_resolution: 224
  num_images_in_input: 1
  use_wrist_image: false
  use_proprio: false
  use_l1_regression: false
  hdf5_dir: ${task.hdf5_dir}
  hdf5_reward_dir: ${task.hdf5_reward_dir}
  hidden_token_dir: ${task.hdf5_dir}_oft_hidden_token_vla_policy_h1
  failure_hidden_token_dir: null
  expected_action_head_type: oft_discrete_token
  expected_obs_hidden_source: hidden_token
  expected_prompt_style: vla_policy
  expected_history: 1
  expected_include_state: false
  expected_rotate_images_180: true
  chunk_size: ${task.openvla_oft.time_horizon}
  hidden_token:
    expected_action_head_type: ${task.openvla_oft.expected_action_head_type}
    expected_obs_hidden_source: hidden_token
    expected_prompt_style: ${task.openvla_oft.expected_prompt_style}
    expected_history: ${task.openvla_oft.expected_history}
    expected_include_state: ${task.openvla_oft.expected_include_state}
    expected_rotate_images_180: ${task.openvla_oft.expected_rotate_images_180}
    num_images_in_input: ${task.openvla_oft.num_images_in_input}
    patches_per_image: 256
    token_count: ${dvla_mul:${task.openvla_oft.hidden_token.num_images_in_input},${task.openvla_oft.hidden_token.patches_per_image}}
    token_dim: 4096
    wm_obs_dim: ${dvla_mul:${task.openvla_oft.hidden_token.token_count},${task.openvla_oft.hidden_token.token_dim}}
    chunk_size: ${task.openvla_oft.chunk_size}
    hidden_state_dim: 4096
    latent_stage: query_before
    latent_source: OpenVLA-OFT current-frame projected vision patch tokens [256,4096]
    proprio_keys: [ee_pos, ee_ori, gripper_states]
    proprio_dim: 8
    proprio_emb_dim: 10
    num_proprio_repeat: 1
    lang_emb_dir: ${task.openvla_oft.hidden_token_dir}
    lang_dim: 4096
    lang_emb_dim: 32
    num_lang_repeat: 1
    classifier_latent_dim: 4138
    action_emb_dim: 10
    num_action_repeat: 1
    model_dim: 4148
  sft_policy_target: dreamervla.models.embodiment.OpenVLAOFTPolicy
  sft_dataset_target: dreamervla.dataset.VLASFTHDF5DatasetFactory
  wm_target: dreamervla.models.embodiment.world_model.wm_chunk.ChunkAwareWorldModel
  actor_target: dreamervla.algorithms.actor.LatentToOpenVLAHiddenStateActor
  actor_head_type: oft_discrete_token
  actor_adapter_type: residual_mlp
  actor_adapter_hidden_dim: 1024
  actor_freeze_lm_head: true
  critic_target: dreamervla.algorithms.critic.twohot_critic.TwohotCritic
