defaults:
  - OpenVLA_Onetraj_LIBERO
  - _self_

name: OpenVLA_Onetraj_ColdStart_LIBERO

# Single source of truth for cold-start collection AND discrete-WM consumption:
# DISCRETE one-trajectory OFT, single-frame history (h1), no proprio state.
# Used by experiment=collect_rollouts_onetraj (write) and
# experiment=oft_discrete_token_world_model_dinowm_chunk (read) via task=...
# ckpt_path / hdf5_reward_dir / dataset_statistics_key and the remaining
# expected_* (obs_hidden_source=action_query, prompt_style=vla_policy,
# rotate_images_180=true) are inherited from OpenVLA_Onetraj_LIBERO -> libero_goal.
openvla_oft:
  action_hidden_dir: ${task.hdf5_dir}_oft_legacy_action_hidden_vla_policy_h1
  expected_action_head_type: oft_discrete_token
  expected_include_state: false
  expected_history: 1
  time_horizon: 8
  token_dim: 4096
  chunk_size: 8
