name: libero_object
suite: libero_object
task_name: object

image_resolution: 256
image_size: 64
image_keys: [agentview_rgb, eye_in_hand_rgb]
hidden_key: obs_embedding

action_dim: 7
action_horizon: 5
time_horizon: 5

vla_init_tag: libero_object
vla_ckpt_path: ${oc.env:DVLA_DATA_ROOT,data}/ckpts/VLA_model_256/libero_object

tokenizer_path: ${oc.env:DVLA_DATA_ROOT,data}/ckpts/models--Alpha-VLLM--Lumina-mGPT-7B-768
text_tokenizer_path: ${oc.env:DVLA_DATA_ROOT,data}/ckpts/chameleon/tokenizer/text_tokenizer.json
chameleon_vqgan_config: ${oc.env:DVLA_DATA_ROOT,data}/ckpts/chameleon/tokenizer/vqgan.yaml
chameleon_vqgan_ckpt: ${oc.env:DVLA_DATA_ROOT,data}/ckpts/chameleon/tokenizer/vqgan.ckpt

pretokenize_config_path: ${oc.env:DVLA_DATA_ROOT,data}/configs/libero_object/his_1_third_view_wrist_w_state_1_256_pretokenize.yaml
pretokenize_val_ind_config_path: ${oc.env:DVLA_DATA_ROOT,data}/configs/libero_object/his_1_third_view_wrist_w_state_1_256_pretokenize_val_ind.yaml
pretokenize_val_ood_config_path: ${oc.env:DVLA_DATA_ROOT,data}/configs/libero_object/his_1_third_view_wrist_w_state_1_256_pretokenize_val_ood.yaml

hdf5_dir: ${oc.env:DVLA_DATA_ROOT,data}/processed_data/libero_object_no_noops_t_256
hdf5_reward_dir: ${oc.env:DVLA_DATA_ROOT,data}/processed_data/libero_object_no_noops_t_256_pi06_remaining_reward
rynnvla_action_hidden_dir: ${oc.env:DVLA_DATA_ROOT,data}/processed_data/libero_object_no_noops_t_256_pi0_legacy_action_hidden_vla_policy_h2

legacy_action_hidden:
  expected_action_head_type: legacy
  expected_obs_hidden_source: action_query
  expected_prompt_style: vla_policy
  expected_history: 2
  expected_include_state: true
  expected_rotate_images_180: true
  wm_obs_dim: null
  token_count: null
  token_dim: 1024
  chunk_size: 5

openvla_oft:
  ckpt_path: ${oc.env:DVLA_DATA_ROOT,data}/ckpts/OpenVLA-OFT/libero_object
  component_ckpt_dir: ${oc.env:DVLA_DATA_ROOT,data}/ckpts/OpenVLA-OFT/libero_object
  resume_step: 150000
  dataset_statistics_path: ${oc.env:DVLA_DATA_ROOT,data}/ckpts/OpenVLA-OFT/libero_object/dataset_statistics.json
  dataset_statistics_key: libero_object_no_noops
  action_head_ckpt: ${oc.env:DVLA_DATA_ROOT,data}/ckpts/OpenVLA-OFT/libero_object/action_head--150000_checkpoint.pt
  proprio_projector_ckpt: ${oc.env:DVLA_DATA_ROOT,data}/ckpts/OpenVLA-OFT/libero_object/proprio_projector--150000_checkpoint.pt
  action_horizon: 8
  time_horizon: 8
  image_resolution: 224
  use_wrist_image: true
  use_proprio: true
  hdf5_dir: ${task.hdf5_dir}
  hdf5_reward_dir: ${task.hdf5_reward_dir}
  action_hidden_dir: ${oc.env:DVLA_DATA_ROOT,data}/processed_data/libero_object_no_noops_t_256_oft_official_legacy_action_hidden_vla_policy_h2
  failure_hdf5_dir: null
  failure_action_hidden_dir: null
  expected_action_head_type: oft_l1_regression
  expected_obs_hidden_source: action_query
  expected_prompt_style: vla_policy
  expected_history: 2
  expected_include_state: true
  expected_rotate_images_180: true
  wm_obs_dim: null
  token_count: null
  token_dim: 4096
  chunk_size: 8
  latent_source: OpenVLA-OFT legacy [8,7,4096] action hidden
  sft_policy_target: dreamer_vla.models.encoder.OpenVLAOFTPolicy
  sft_dataset_target: dreamer_vla.dataset.OpenVLAOFTHDF5DatasetFactory
  wm_target: dreamer_vla.models.world_model.rynn_dino_wm_chunk.ChunkAwareRynnDinoWMWorldModel
  classifier_target: dreamer_vla.models.reward.LatentSuccessClassifier
  actor_target: dreamer_vla.models.actor.RynnVLAActionHiddenActor
  actor_head_type: legacy
  actor_adapter_type: residual_mlp
  actor_adapter_hidden_dim: 1024
  actor_freeze_output_projection: false
  critic_target: dreamer_vla.models.critic.twohot_critic.TwohotCritic
