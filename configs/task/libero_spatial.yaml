name: libero_spatial
suite: libero_spatial
task_name: spatial

image_resolution: 256
image_size: 64
image_keys: [agentview_rgb, eye_in_hand_rgb]
hidden_key: obs_embedding

action_dim: 7
action_horizon: 10
time_horizon: 10

vla_init_tag: libero_spatial
vla_ckpt_path: ${oc.env:DVLA_DATA_ROOT,data}/checkpoints/VLA_model_256/libero_spatial

tokenizer_path: ${oc.env:DVLA_DATA_ROOT,data}/checkpoints/models--Alpha-VLLM--Lumina-mGPT-7B-768
text_tokenizer_path: ${oc.env:DVLA_DATA_ROOT,data}/checkpoints/chameleon/tokenizer/text_tokenizer.json
chameleon_vqgan_config: ${oc.env:DVLA_DATA_ROOT,data}/checkpoints/chameleon/tokenizer/vqgan.yaml
chameleon_vqgan_ckpt: ${oc.env:DVLA_DATA_ROOT,data}/checkpoints/chameleon/tokenizer/vqgan.ckpt

pretokenize_config_path: ${oc.env:DVLA_DATA_ROOT,data}/configs/libero_spatial/his_1_third_view_wrist_w_state_1_256_pretokenize.yaml
pretokenize_val_ind_config_path: ${oc.env:DVLA_DATA_ROOT,data}/configs/libero_spatial/his_1_third_view_wrist_w_state_1_256_pretokenize_val_ind.yaml
pretokenize_val_ood_config_path: ${oc.env:DVLA_DATA_ROOT,data}/configs/libero_spatial/his_1_third_view_wrist_w_state_1_256_pretokenize_val_ood.yaml

hdf5_dir: ${oc.env:DVLA_DATA_ROOT,data}/processed_data/libero_spatial/libero_spatial_no_noops_t_256
hdf5_reward_dir: ${oc.env:DVLA_DATA_ROOT,data}/processed_data/libero_spatial/libero_spatial_no_noops_t_256_pi06_remaining_reward
rynnvla_action_hidden_dir: ${oc.env:DVLA_DATA_ROOT,data}/processed_data/libero_spatial/libero_spatial_no_noops_t_256_pi0_legacy_action_hidden_vla_policy_h2
rynnvla_input_token_hidden_dir: ${task.hdf5_dir}_pi0_input_token_embedding_vla_policy_h2

legacy_action_hidden:
  expected_action_head_type: legacy
  expected_obs_hidden_source: action_query
  expected_prompt_style: vla_policy
  expected_history: 2
  expected_include_state: true
  expected_rotate_images_180: true
  wm_obs_dim: null
  token_count: null
  token_dim: 1024
  chunk_size: 10

legacy_input_tokens:
  expected_action_head_type: legacy
  expected_obs_hidden_source: input_token_embedding
  expected_prompt_style: vla_policy
  expected_history: 2
  expected_include_state: true
  expected_rotate_images_180: true
  wm_obs_dim: null
  token_count: 2048
  token_dim: 4096
  chunk_size: ${task.time_horizon}
  action_hidden_dim: 1024
  latent_source: RynnVLA current-frame Chameleon VQ input tokens [2048,4096]

openvla_oft:
  ckpt_path: ${oc.env:DVLA_DATA_ROOT,data}/checkpoints/OpenVLA-OFT/libero_spatial
  component_ckpt_dir: ${oc.env:DVLA_DATA_ROOT,data}/checkpoints/OpenVLA-OFT/libero_spatial
  resume_step: 150000
  dataset_statistics_path: ${oc.env:DVLA_DATA_ROOT,data}/checkpoints/OpenVLA-OFT/libero_spatial/dataset_statistics.json
  dataset_statistics_key: libero_spatial_no_noops
  action_head_ckpt: ${oc.env:DVLA_DATA_ROOT,data}/checkpoints/OpenVLA-OFT/libero_spatial/action_head--150000_checkpoint.pt
  proprio_projector_ckpt: ${oc.env:DVLA_DATA_ROOT,data}/checkpoints/OpenVLA-OFT/libero_spatial/proprio_projector--150000_checkpoint.pt
  action_horizon: 8
  time_horizon: 8
  image_resolution: 224
  use_wrist_image: true
  use_proprio: true
  hdf5_dir: ${task.hdf5_dir}
  hdf5_reward_dir: ${task.hdf5_reward_dir}
  action_hidden_dir: ${task.hdf5_dir}_oft_legacy_action_hidden_vla_policy_h2
  input_token_hidden_dir: ${task.hdf5_dir}_oft_input_token_embedding_vla_policy_h2
  failure_hdf5_dir: null
  failure_action_hidden_dir: null
  failure_input_token_hidden_dir: null
  expected_action_head_type: oft_l1_regression
  expected_obs_hidden_source: action_query
  expected_prompt_style: vla_policy
  expected_history: 2
  expected_include_state: true
  expected_rotate_images_180: true
  wm_obs_dim: null
  token_count: null
  token_dim: 4096
  chunk_size: 8
  latent_source: OpenVLA-OFT legacy [8,7,4096] action hidden
  input_tokens:
    expected_action_head_type: ${task.openvla_oft.expected_action_head_type}
    expected_obs_hidden_source: input_token_embedding
    expected_prompt_style: ${task.openvla_oft.expected_prompt_style}
    expected_history: ${task.openvla_oft.expected_history}
    expected_include_state: ${task.openvla_oft.expected_include_state}
    expected_rotate_images_180: ${task.openvla_oft.expected_rotate_images_180}
    wm_obs_dim: null
    token_count: 512
    token_dim: 4096
    chunk_size: ${task.openvla_oft.chunk_size}
    action_hidden_dim: 4096
    latent_source: OpenVLA-OFT current-frame projected vision patch tokens [512,4096]
  sft_policy_target: dreamer_vla.models.encoder.OpenVLAOFTPolicy
  sft_dataset_target: dreamer_vla.dataset.OpenVLAOFTHDF5DatasetFactory
  wm_target: dreamer_vla.models.world_model.rynn_dino_wm_chunk.ChunkAwareRynnDinoWMWorldModel
  classifier_target: dreamer_vla.models.reward.LatentSuccessClassifier
  actor_target: dreamer_vla.models.actor.RynnVLAActionHiddenActor
  actor_head_type: legacy
  actor_adapter_type: residual_mlp
  actor_adapter_hidden_dim: 1024
  actor_freeze_output_projection: false
  critic_target: dreamer_vla.models.critic.twohot_critic.TwohotCritic
