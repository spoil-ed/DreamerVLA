# Faithful TransDreamer backbone (Chen et al. 2022): rel-pos bias + GRU gating
# + KV-cache step(). Random-init, no pretrained LLM.
#
# Same training stack as zfocus, only the dynamics backbone differs:
#   transformer_variant       = "transdreamer"
#   use_pretrained_backbone   = false
#   transformer_max_rel_pos   = 64
_target_: src.workspace.pretokenize_wm_workspace.PretokenizeWMWorkspace
seed: 7
trainer:
  device: cuda:0
  debug: false
training:
  device: cuda:0
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/pretokenize_wm/pretokenize_wm_libero_10_discrete_longt_zfocus_transdreamer
  debug: false
  resume: false
  distributed_strategy: fsdp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 50
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500
ema:
  decay: 0.9999
  update_after_step: 0
init:
  vla_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10
  # Set to a pure-VAE final.ckpt path to warm-init token_embedder/conv_stem/
  # image_decoder/posterior_head from a pretrained VAE; null = no external init.
  warmup_ckpt_path: null
encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10
  tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/models--Alpha-VLLM--Lumina-mGPT-7B-768
  text_tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 10
  pool: mean
world_model:
  _target_: src.models.world_model.tssm_discrete.TSSMWorldModelTransDreamerDiscrete
  io_mode: token
  token_embed_dim: 512
  num_image_tokens_vocab: null
  hidden_dim: 4096
  in_channels: 512
  obs_dim: 1024
  action_dim: 7
  stoch_dims: 32
  stoch_categories: 32
  gumbel_temp: 1.0
  unimix: 0.01
  d_model: 512
  n_heads: 8
  n_layers: 4
  d_ff: 2048
  dropout: 0.1
  free_nats: 0.1
  kl_balance: 0.8
  # In-training VAE warmup: gate KL/Transformer/reward/pcont off for the first
  # `warmup_vae_steps` global steps so the VAE half (posterior + decoder) trains
  # alone before full WM training kicks in.  Set 0 if init.warmup_ckpt_path is
  # already loading a pretrained VAE.
  warmup_vae_steps: 5000
  kl_loss_coef: 1.0
  transition_loss_coef: 1.0
  reward_loss_coef: 1.0
  delta_latent_coef: 1.0
  image_decoder_loss_coef: 1.0
  pcont_loss_coef: 1.0
  pcont_hidden_dim: 256
  pcont_done_threshold: 0.5
  mapper_hidden_dim: 512
  reward_hidden_dim: 256
  min_std: 0.1
  # ── Backbone: faithful TransDreamer transformer ──────────────────────
  use_pretrained_backbone: false
  transformer_variant: transdreamer
  transformer_max_rel_pos: 64
  freeze_transition_backbone: false
  backbone_dtype: bfloat16
  transition_time_horizon: null
  spatial_grid:
  - 16
  - 16
  n_image_tokens: 256
  stem_init_proj_channels: 384
  stem_stage_channels:
  - 96
  - 192
  stem_kernel: 4
  stem_stride: 2
  stem_padding: 1
  decoder_mid_channels: 192
  decoder_bspace_groups: 8
  decoder_minres:
  - 4
  - 4
  decoder_stage_channels:
  - 96
  - 48
  decoder_kernel: 4
  decoder_stride: 2
  decoder_padding: 1
  decoder_stoch_hidden: 512
  image_decoder_enabled: true
  image_decoder_detach_inputs: false
  image_decoder_stoch_source: post
  image_decoder_detach_mode: none
  posterior_uses_h: false
  action_margin_coef: 0.05
  action_margin: 0.1
  action_margin_every: 8
  action_ranking_coef: 0.0
  action_ranking_margin: 0.1
  image_recon_ce_coef: 1.0
  image_recon_mse_coef: 0.0
  dynamic_token_coef: 3.0
  imagine_loss_steps: 7
  imagine_loss_context: 1
  imagine_loss_scale: 1.0
dataset:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_1_third_view_wrist_w_state_1_256_pretokenize_seq.yaml
  history: 1
  batch_length: 7
  replay_context: 1
  stride: 1
dataset_val_ind:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_1_third_view_wrist_w_state_1_256_pretokenize_seq_val_ind.yaml
  history: 1
  batch_length: 7
  replay_context: 1
  stride: 1
dataset_val_ood:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_1_third_view_wrist_w_state_1_256_pretokenize_seq_val_ood.yaml
  history: 1
  batch_length: 7
  replay_context: 1
  stride: 1
eval:
  eval_every: 1
dataloader:
  batch_size: 8
  num_workers: 8
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true
optim:
  grad_clip_norm: 5.0
  zero_grad_set_to_none: true
  world_model:
    name: adam
    lr: 0.0001
    betas:
    - 0.9
    - 0.95
    eps: 1.0e-08
    weight_decay: 0.01
checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: train_wm_loss
    mode: min
    k: 3
    format_str: epoch={epoch:03d}-train_wm_loss={train_wm_loss:.3f}.ckpt
viz:
  enabled: true
  every_n_steps: 500
  num_samples: 4
  which_block: -2
