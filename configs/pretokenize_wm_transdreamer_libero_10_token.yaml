_target_: src.workspace.pretokenize_wm_workspace.PretokenizeWMWorkspace

seed: 7

hydra:
  run:
    dir: .
  output_subdir: null

trainer:
  device: cuda:0
  debug: false

training:
  device: cuda:0
  # Token-mode WM: input/output both operate on discrete image BPE ids.
  # No frozen Chameleon forward per step; no lm_head borrow; CE only.
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/pretokenize_wm_transdreamer_token
  debug: false
  resume: false
  distributed_strategy: fsdp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 50
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  use_ema: false
  checkpoint_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500

ema:
  decay: 0.9999
  update_after_step: 0

init:
  vla_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10

# Encoder is still instantiated so we can (a) read the image-vocab mapping
# for num_image_tokens_vocab auto-injection and _bpe_to_img_idx buffer, and
# (b) hand VQGAN + bpe2vq to the visualiser.  In token mode it is NOT called
# during the training forward pass.
encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/models--Alpha-VLLM--Lumina-mGPT-7B-768
  text_tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 10
  pool: mean

world_model:
  _target_: src.models.world_model.TSSMWorldModelTransDreamer
  # ── I/O: discrete image BPE tokens ───────────────────────────────────
  io_mode: token
  token_embed_dim: 512
  num_image_tokens_vocab: null     # auto-filled from encoder.vocabulary_mapping.bpe2img

  # hidden_dim kept so the signature still accepts it; not used on the
  # input side in token mode (Chameleon is bypassed).
  hidden_dim: 4096
  in_channels: 512                # ConvEncoderStem input channels = token_embed_dim
  obs_dim: 1024
  action_dim: 7
  latent_dim: 256
  d_model: 512
  n_heads: 8
  n_layers: 4
  d_ff: 2048
  dropout: 0.1

  # ── KL with proper free-bits floor (canonical TransDreamer default) ──
  # NOTE: 1.0 is too loose for our 256-d continuous Gaussian latent — KL was
  # pinned at the floor after ~100 steps, so prior_head / posterior got zero
  # KL gradient for the remainder of training.  Dropped to 1.0 so the KL
  # signal stays alive.
  free_nats: 1.0
  kl_balance: 0.8
  kl_loss_coef: 1.0
  transition_loss_coef: 1.0
  reward_loss_coef: 0.1
  mapper_hidden_dim: 512
  reward_hidden_dim: 256
  min_std: 0.1

  # ── Causal Transformer: reuse pretrained Chameleon WM weights ────────
  use_pretrained_backbone: true
  pretrained_model_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/Action_World_model_512/libero_10
  freeze_transition_backbone: false
  backbone_dtype: bfloat16
  transition_time_horizon: null

  # ── Spatial codec scaffolding (stem / decoder) — shared with hidden mode
  spatial_codec: true
  spatial_grid: [16, 16]
  n_image_tokens: 256
  stem_init_proj_channels: 384
  stem_stage_channels: [96, 192]
  stem_kernel: 4
  stem_stride: 2
  stem_padding: 1
  decoder_mid_channels: 192
  decoder_bspace_groups: 8
  decoder_minres: [4, 4]
  decoder_stage_channels: [96, 48]
  decoder_kernel: 4
  decoder_stride: 2
  decoder_padding: 1
  decoder_stoch_hidden: 512

  image_decoder_enabled: true
  image_decoder_loss_coef: 1.0
  image_recon_ce_coef: 1.0
  # MSE is force-disabled by the WM in token mode; keep the key for symmetry.
  image_recon_mse_coef: 0.0

dataset:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize.yaml

dataset_val_ind:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize_val_ind.yaml

dataset_val_ood:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize_val_ood.yaml

eval:
  eval_every: 1

dataloader:
  batch_size: 8
  num_workers: 8
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adam
    lr: 1.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: train_wm_loss
    mode: min
    k: 3
    format_str: 'epoch={epoch:03d}-train_wm_loss={train_wm_loss:.3f}.ckpt'

viz:
  enabled: true
  every_n_steps: 5000
  num_samples: 4
  which_block: -2
