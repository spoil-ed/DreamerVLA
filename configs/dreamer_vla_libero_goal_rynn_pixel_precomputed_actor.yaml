_target_: src.workspace.dreamer_vla_workspace.DreamerVLAWorkspace

seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda
  debug: false

training:
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/dreamervla/rynn_pixel_dreamer_actor_libero_goal
  debug: false
  resume: false
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: false
  num_epochs: 20
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  checkpoint_every: 1
  use_ema: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  run_wm_phase: true
  run_actor_critic_phase: true

init:
  vla_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_goal
  encoder_state_ckpt: /home/user01/liops/workspace/DreamerVLA/data/outputs/vla/pretokenize_vla/pretokenize_vla_libero_goal_libero_goal_h5_20260508_060320/checkpoints/goal_h5_epoch000_train_vla_loss_1p323.ckpt
  require_encoder_state_ckpt: false
  world_model_state_ckpt: null
  reset_world_model_reward_head: false

encoder: null

dataset:
  _target_: src.dataloader.libero_pixel_rynn_hidden_sequence_dataset.LIBEROPixelRynnHiddenSequenceDataset
  hdf5_dir: /home/user01/liops/workspace/DreamerVLA/data/processed_data/libero_goal_no_noops_t_256
  hidden_dir: /home/user01/liops/workspace/DreamerVLA/data/processed_data/libero_goal_no_noops_t_256_rynn_hidden_goal_h5_epoch000
  expected_model_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_goal
  expected_encoder_state_ckpt: /home/user01/liops/workspace/DreamerVLA/data/outputs/vla/pretokenize_vla/pretokenize_vla_libero_goal_libero_goal_h5_20260508_060320/checkpoints/goal_h5_epoch000_train_vla_loss_1p323.ckpt
  expected_time_horizon: 5
  sequence_length: 32
  image_size: 64
  image_keys: [agentview_rgb, eye_in_hand_rgb]
  hidden_key: obs_embedding
  load_actor_sequence: false
  stride: 1
  max_files: null
  max_demos_per_file: null
  max_windows: null

dataloader:
  batch_size: 6
  num_workers: 2
  shuffle: true
  drop_last: true
  pin_memory: false
  persistent_workers: true
  prefetch_factor: 1
  multiprocessing_context: forkserver

world_model:
  _target_: src.models.world_model.dreamerv3_torch.DreamerV3PixelRynnBackboneWorldModel
  obs_dim: 4096
  action_dim: 7
  image_channels: 6
  image_size: 64
  embed_dim: null
  encoder_hidden: 2048
  encoder_layers: 2
  deter: 8192
  hidden: 1024
  stoch: 32
  classes: 64
  blocks: 8
  depth: 64
  mults: [2, 3, 4, 4]
  kernel: 5
  act: silu
  unimix: 0.01
  free_nats: 1.0
  dyn_scale: 1.0
  rep_scale: 0.1
  rec_scale: 1.0
  rew_scale: 1.0
  con_scale: 1.0
  hidden_rec_scale: 0.0
  hidden_decoder_layers: 1
  hidden_decoder_units: 2048
  full_hidden_rec_scale: 0.0
  actor_sequence_length: 0
  actor_input_kind: feature
  reward_bins: 255
  reward_head_type: binary
  reward_init_logit: -5.0

policy:
  _target_: src.models.vla_policy.VLAPolicy
  hidden_dim: 10240
  action_dim: 7
  time_horizon: 5
  policy_head_hidden_dim: 1024
  num_layers: 3
  act: silu
  initial_log_std: -0.5
  min_log_std: -5.0
  max_log_std: 2.0

critic:
  _target_: src.models.critic.twohot_critic.TwohotCritic
  hidden_dim: 10240
  critic_hidden_dim: 1024
  critic_layers: 3
  activation: silu
  norm: rms
  outscale: 0.0
  num_bins: 255
  bin_min: -20.0
  bin_max: 20.0

algorithm:
  actor_input_mode: pooled
  imag_last: 4
  imagination_horizon: 15
  horizon: 333
  contdisc: true
  lam: 0.95
  actent: 3.0e-4
  slowtar: false
  slowreg: 1.0
  target_critic_tau: 0.02
  return_tracker:
    decay: 0.99
    low: 0.05
    high: 0.95
  return_normalization:
    mode: minmax01
    low: 0.05
    high: 0.95
    eps: 1.0e-6

optim:
  grad_clip_norm: 100.0
  zero_grad_set_to_none: true
  world_model:
    name: adamw
    lr: 4.0e-5
    betas: [0.9, 0.999]
    eps: 1.0e-20
    weight_decay: 0.0
  policy:
    name: adam
    lr: 3.0e-5
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01
  critic:
    name: adam
    lr: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

eval:
  eval_every: 1

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: epoch_returns_mean
    mode: max
    k: 3
    format_str: 'epoch={epoch:03d}-epoch_returns_mean={epoch_returns_mean:.4f}.ckpt'
