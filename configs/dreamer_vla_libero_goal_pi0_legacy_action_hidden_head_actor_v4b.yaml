# CURRENT ACTION-HIDDEN ACTOR ROUTE:
#   RSSM (h,z) -> reconstructed pi0 action hidden -> VLA output_projection -> action.
_target_: src.workspace.JointDreamerVLAWorkspace
seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda
  debug: false

training:
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/dreamervla/pi0_action_hidden_head_actor_libero_goal
  debug: false
  resume: false
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: false
  num_epochs: 20
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  checkpoint_every: 1
  use_ema: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  run_wm_phase: true
  run_actor_critic_phase: true

init:
  vla_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_goal
  encoder_state_ckpt: null
  require_encoder_state_ckpt: false
  world_model_state_ckpt: null
  dreamervla_state_ckpt: null
  load_dreamervla_world_model: false
  load_dreamervla_critic: false
  load_dreamervla_target_critic: false
  load_dreamervla_policy: false
  load_dreamervla_return_tracker: false
  load_dreamervla_strict: false
  reset_world_model_reward_head: false

encoder: null

dataset:
  _target_: src.dataloader.libero_balanced_terminal_dataset.LIBEROBalancedTerminalDataset
  hdf5_dir: /home/user01/liops/workspace/DreamerVLA/data/processed_data/libero_goal_no_noops_t_256_pi06_remaining_reward
  hidden_dir: /home/user01/liops/workspace/DreamerVLA/data/processed_data/libero_goal_no_noops_t_256_pi0_legacy_action_hidden_vla_policy_h2
  expected_model_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_goal
  expected_encoder_state_ckpt: null
  expected_time_horizon: 5
  expected_action_head_type: legacy
  # Stage 1 v2: WMPO-style binary reward labeling — every step in a positive
  # window (window ending at episode terminal) gets reward=1; negative all 0.
  reward_mode: per_window_dense
  balanced_length: 50000        # virtual dataset size; 1:1 pos/neg via __getitem__ remap
  balanced_seed: 0
  expected_obs_hidden_source: action_query
  expected_prompt_style: vla_policy
  expected_history: 2
  expected_include_state: true
  expected_rotate_images_180: true
  sequence_length: 32
  image_size: 64
  image_keys: [agentview_rgb, eye_in_hand_rgb]
  hidden_key: obs_embedding
  load_actor_sequence: false
  stride: 1
  max_files: null
  max_demos_per_file: null
  max_windows: null

dataloader:
  batch_size: 6
  num_workers: 2
  shuffle: true
  drop_last: true
  pin_memory: false
  persistent_workers: true
  prefetch_factor: 1
  multiprocessing_context: forkserver

world_model:
  _target_: src.models.world_model.dreamerv3_torch.DreamerV3PixelRynnBackboneWorldModel
  obs_dim: 35840
  action_dim: 7
  image_channels: 6
  image_size: 64
  embed_dim: null
  encoder_hidden: 2048
  encoder_layers: 2
  deter: 8192
  hidden: 1024
  stoch: 32
  classes: 64
  blocks: 8
  depth: 64
  mults: [2, 3, 4, 4]
  kernel: 5
  act: silu
  unimix: 0.01
  free_nats: 1.0
  dyn_scale: 1.0
  rep_scale: 0.1
  rec_scale: 1.0                  # keep pixel decoder enabled (for later visualization)
  rew_scale: 10.0                 # Stage 1 v2: boost reward gradient (image_decoder=628 dominated at scale=1)
  con_scale: 1.0
  hidden_rec_scale: 100.0
  hidden_decoder_layers: 2
  hidden_decoder_units: 8192
  full_hidden_rec_scale: 0.0
  actor_sequence_length: 0
  actor_input_kind: hidden
  reward_bins: 255
  reward_head_type: binary       # Stage 1 v2: BinaryRewardHead for 0/1 per_window_dense labels
  reward_init_logit: 0.0
  reward_pos_weight: 1.0

policy:
  _target_: src.models.vla_actor.Pi0ActionHiddenActor
  hidden_dim: 35840                 # legacy: time_horizon * action_dim * action_hidden_dim = 5*7*1024
  action_hidden_dim: 1024
  action_dim: 7
  time_horizon: 5
  head_type: legacy                 # use original ActionHead's L1RegressionActionHead (5*7 tokens)
  # WM hidden_decoder emits 35 action-query token hiddens (5*7*1024=35840 flattened);
  # reshape to (B, 35, 1024) and feed the original VLA L1Regression output_projection.
  adapter_type: identity            # nn.Identity, no params, no transforms
  adapter_hidden_dim: 1024          # unused under identity
  freeze_output_projection: false   # let the L1Regression head learn from RL signal
  initial_log_std: -3.0
  min_log_std: -5.0
  max_log_std: -2.0   # cap std <= exp(-2)≈0.135 under SFT-init regime
  freeze_log_std: false   # ablation knob: set true to lock std at exp(initial_log_std)
  init_action_head_ckpt: ${init.vla_ckpt_path}   # HF safetensors dir, loader auto-dispatches

critic:
  _target_: src.models.critic.twohot_critic.TwohotCritic
  hidden_dim: 10240
  critic_hidden_dim: 1024
  critic_layers: 3
  activation: silu
  norm: rms
  outscale: 0.0
  num_bins: 255
  bin_min: -20.0
  bin_max: 20.0

algorithm:
  actor_input_mode: pooled
  # Pi0/VLA action heads output normalized policy actions; the WM is trained on
  # LIBERO HDF5 env-scale actions, so map actor actions before RSSM rollout.
  rssm_action_scale: env
  rssm_action_clip: true
  imag_last: 4
  # TODO(2026-05-17): lowered 15 → 5 to reduce open-loop WM compounding error
  # under SFT-init + frozen-WM regime. Revisit and raise back if KL anchor +
  # low log_std keep actor in-distribution and `reward_pred` looks stable.
  imagination_horizon: 5
  horizon: 333
  contdisc: true
  lam: 0.95
  actent: 0.0           # was 3.0e-4; SFT-init does not need entropy bonus
  # WMPO-style KL penalty against the frozen SFT reference policy.
  # KL is computed as one-sample MC `log π_θ(a) - log π_ref(a)` and subtracted
  # from imagined reward (β·KL → reward), then propagates through λ-returns.
  # Set to 0 to disable. `kl_penalty_kind` ∈ {kl, abs, mse}.
  kl_coef: 0.01
  kl_penalty_kind: kl
  # Head-level BC anchor against the frozen `ref_policy` (deepcopy of actor at init).
  # actor_bc_to_ref_scale > 0 → add MSE(actor_action_chunk, ref_action_chunk) to actor loss.
  # Cures REINFORCE-driven `output_projection` mean drift that the soft KL-on-reward
  # cannot counteract in time. Set to 0 to disable.
  actor_bc_to_ref_scale: 0.1
  slowtar: false
  slowreg: 1.0
  repval_loss: true
  repval_scale: 0.3
  repl_loss:
    slowtar: false
    lam: 0.95
    slowreg: 1.0
  target_critic_tau: 0.02
  return_tracker:
    decay: 0.99
    low: 0.05
    high: 0.95
  return_normalization:
    mode: dreamerv3
    low: 0.05
    high: 0.95
    eps: 1.0e-6

optim:
  grad_clip_norm: 1.0    # was 100.0; tight clip to keep SFT mean stable
  zero_grad_set_to_none: true
  world_model:
    name: adamw
    lr: 4.0e-6           # was 4.0e-5; SFT-init joint train — slow WM adaptation
    betas: [0.9, 0.999]
    eps: 1.0e-20
    weight_decay: 0.0
  policy:
    name: adam
    lr: 5.0e-7           # was 5.0e-6 (Phase-1 v1); v2 ×0.1 for slower mean drift
    # combined with actor_bc_to_ref_scale=0.1 head-level BC anchor
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0    # was 0.01; do not L2-decay SFT mean toward zero
  critic:
    name: adam
    lr: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

eval:
  eval_every: 1

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    # WM-only pretrain stage: track epoch_wm_loss (min). Switch to
    # epoch_returns_mean (max) once actor-critic phase is enabled.
    monitor_key: epoch_wm_loss
    mode: min
    k: 3
    format_str: 'epoch={epoch:03d}-epoch_wm_loss={epoch_wm_loss:.4f}.ckpt'
