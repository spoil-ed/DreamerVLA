# @package _global_
_target_: dreamervla.runners.ManualCotrainRayRunner
seed: 7
render_backend: osmesa

training:
  out_dir: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/manual_cotrain_ray_tiny
  seed: 7

runner:
  logger:
    logger_backends: []

cluster:
  num_nodes: 1
  num_gpus: 0

manual_cotrain:
  ngpu: 0
  global_steps: 1
  learner_update_step: 999999
  sync_every: 1
  requires_bootstrap_value: false
  wm_env_write_replay: false
  rollout_epoch: 1
  real_rollout_epoch: ${manual_cotrain.rollout_epoch}
  wm_rollout_epoch: ${manual_cotrain.rollout_epoch}
  wm_rollout_target_trajectories: null
  max_steps_per_rollout_epoch: 2
  wm_rollout_multiplier: 1
  num_action_chunks: 2
  envs_per_worker: 2
  wm_envs_per_worker: ${manual_cotrain.envs_per_worker}
  task_id: 0

algorithm:
  group_size: 2
  rollout_epoch: 1
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  clip_ratio_c: 3.0
  gamma: 0.99
  gae_lambda: 0.95
  kl_beta: 0.0
  entropy_bonus: 0.0

actor:
  policy_cfg:
    target: dreamervla.workers.actor._test_models:TinyLumosPolicy
    kwargs:
      hidden_dim: 4
      action_dim: 3
      chunk_size: 2
  init_ckpt: {}
  train_cfg:
    device: cpu
    lr: 1.0e-3
    syncer:
      store_name: DreamerVLATinyActorRolloutPatchStore
    fsdp:
      strategy: none
      precision: fp32
      cpu_offload: false
      activation_checkpointing: false
      backend: null
    algorithm_cfg:
      group_size: 2
      ppo_update_epochs: 1
      clip_ratio_low: 0.2
      clip_ratio_high: 0.28
      clip_ratio_c: 3.0
      gamma: 0.99
      gae_lambda: 0.95
      entropy_coef: 0.0

rollout:
  policy_cfg: ${actor.policy_cfg}
  encoder_cfg: null
  init_ckpt: {}
  train_cfg:
    device: cpu
    deterministic: false
    syncer:
      store_name: DreamerVLATinyActorRolloutPatchStore

learner:
  init_ckpt: {}
  model_cfg:
    policy: null
    world_model:
      target: dreamervla.workers.actor._test_models:TinyLumosWorldModel
      kwargs:
        hidden_dim: 4
        action_dim: 3
    classifier:
      target: dreamervla.workers.actor._test_models:TinySuccessClassifier
      kwargs:
        hidden_dim: 4
        window: 1
  train_cfg:
    mode: wm_classifier_only
    device: cpu
    precision: fp32
    batch_size: 1
    classifier_batch_size: 1
    classifier_early_neg_stride: 1
    lr: 1.0e-3
    syncer:
      store_name: DreamerVLATinyLearnerStore

env:
  train:
    total_num_envs: 2
    max_episode_steps: 2
    max_steps_per_rollout_epoch: 2
  real:
    cfg:
      target: dreamervla.workers.env._test_envs:CounterEnv
      kwargs:
        horizon: 2
        embedding_dim: 4
  wm:
    cfg:
      target: dreamervla.envs.world_model.latent_world_model_env:LatentWorldModelEnv
      kwargs:
        world_model:
          target: dreamervla.workers.actor._test_models:TinyLumosWorldModel
          kwargs:
            hidden_dim: 4
            action_dim: 3
        classifier:
          target: dreamervla.workers.actor._test_models:TinySuccessClassifier
          kwargs:
            hidden_dim: 4
            window: 1
        latent_dim: 4
        action_dim: 3
        success_threshold: 0.5
        max_episode_steps: 2
        num_envs: ${manual_cotrain.wm_envs_per_worker}
        device: cpu

replay:
  cfg:
    capacity: 64
    sequence_length: 1
    task_ids: [0]
    rank: 0
