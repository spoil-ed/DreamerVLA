# @package _global_
# Online cotrain — Scheme 2: ACTION-HIDDEN world model (WM after the Action Query,
# before the Action Head). Predicts future action-hidden; classifier scores
# imagined latent windows; actor trained by wmpo_outcome.  Single Hydra call:
#   python -m dreamervla.train --config-name online_cotrain_oft_action_hidden
#
# NOTE the online env-rollout policy is the RynnVLA one-trajectory VLA (the ~40%
# success seed) because DreamerVLAOnlineTrainEnv emits the action_query latent
# via RynnVLAEncoder. The OFT one-trajectory checkpoint is handled by the OFFLINE
# OFT action-hidden path (experiment=dreamervla_oft_dino_wm_wmpo_outcome); see the
# tutorial doc. This is a policy/action-latent WM, NOT the original pixel DINO-WM.
defaults:
  - /task: libero_goal
  - _self_

_target_: dreamervla.runners.OnlineCotrainRunner
latent_type: action_hidden
seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda
  debug: false

training:
  out_dir: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/dreamervla/online_cotrain_action_hidden/${now:%Y%m%d_%H%M%S}
  debug: false
  resume: false
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 1
  gradient_accumulate_every: 1
  lr_scheduler: constant
  lr_warmup_steps: 0
  use_ema: false
  checkpoint_every: 2000
  # cotrain phase control (step-gated): warmup trains WM+classifier only;
  # after warmup_steps the actor RL update is added (WM+classifier keep training).
  warmup_steps: 5000
  train_actor_after_warmup: true
  train_classifier_inline: true
  classifier_batch_size: 16

init:
  vla_ckpt_path: ${task.vla_ckpt_path}
  encoder_state_ckpt: null
  require_encoder_state_ckpt: false
  world_model_state_ckpt: null   # train WM online from replay (or warm-start a ckpt)
  classifier_state_ckpt: null    # train classifier online (or warm-start)
  dreamervla_state_ckpt: null
  load_dreamervla_world_model: false
  load_dreamervla_critic: false
  load_dreamervla_target_critic: false
  load_dreamervla_policy: false
  load_dreamervla_return_tracker: false
  load_dreamervla_strict: false
  reset_world_model_reward_head: false

encoder:
  _target_: dreamervla.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: ${task.tokenizer_path}
  text_tokenizer_path: ${task.text_tokenizer_path}
  chameleon_vqgan_config: ${task.chameleon_vqgan_config}
  chameleon_vqgan_ckpt: ${task.chameleon_vqgan_ckpt}
  resolution: ${task.image_resolution}
  action_dim: ${task.action_dim}
  time_horizon: ${task.legacy_action_hidden.chunk_size}
  action_head_type: ${task.legacy_action_hidden.expected_action_head_type}
  pool: mean
  freeze_backbone: true

online_rollout:
  buffer_size: 20000
  sequence_length: 24
  min_replay: 2000
  min_episodes_per_task: 1
  train_every: 8
  updates_per_train: 1
  total_env_steps: 200000
  rollout_policy_source: dreamer_actor
  classifier_early_neg_stride: 8
  # one-command dry-run (training.debug=true): short episodes so a rollout
  # truncates and fills replay; window*chunk_size(=40) <= debug_episode_horizon.
  debug_total_env_steps: 160
  debug_warmup_steps: 2
  debug_min_replay: 48
  debug_max_train_updates: 4
  debug_episode_horizon: 50

env:
  task_suite_name: ${task.suite}
  task_ids: [0]
  episode_horizon: 200
  history_length: ${task.legacy_action_hidden.expected_history}
  include_state: ${task.legacy_action_hidden.expected_include_state}
  vla_rotate_180: ${task.legacy_action_hidden.expected_rotate_images_180}
  target_token_id: 10004

world_model:
  _target_: dreamervla.models.world_model.dino_wm_chunk.ChunkAwareDinoWMWorldModel
  chunk_size: ${task.legacy_action_hidden.chunk_size}
  obs_dim: ${task.legacy_action_hidden.wm_obs_dim}
  action_dim: ${task.action_dim}
  token_count: ${task.legacy_action_hidden.token_count}
  token_dim: ${task.legacy_action_hidden.token_dim}
  time_horizon: ${task.legacy_action_hidden.chunk_size}
  latent_stage: ${task.legacy_action_hidden.latent_stage}
  latent_source: ${task.legacy_action_hidden.latent_source}
  action_emb_dim: 10
  num_action_repeat: 1
  model_dim: 1034
  depth: 6
  heads: 16
  dim_head: 64
  mlp_dim: 2048
  dropout: 0.1
  num_hist: 3
  num_pred: 1
  max_seq_len: 128
  hidden_loss_scale: 1.0
  cosine_loss_scale: 0.1
  chunk_rollout_chunks: 4
  chunk_rollout_loss_scale: 1.0
  reward_head_type: binary
  reward_loss_scale: 32.0
  reward_hidden_dim: 1024
  reward_init_logit: 0.0
  reward_pos_weight: 1.0
  return_predictions: false
  freeze_backbone: true

policy:
  _target_: dreamervla.models.actor.RynnVLAActionHiddenActor
  hidden_dim: null
  action_hidden_dim: ${task.legacy_action_hidden.token_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.legacy_action_hidden.chunk_size}
  head_type: ${task.legacy_action_hidden.expected_action_head_type}
  adapter_type: residual_mlp
  adapter_hidden_dim: 1024
  freeze_output_projection: false
  initial_log_std: -3.0
  min_log_std: -5.0
  max_log_std: -2.0
  freeze_log_std: false
  init_action_head_ckpt: ${init.vla_ckpt_path}

critic:
  _target_: dreamervla.models.critic.twohot_critic.TwohotCritic
  hidden_dim: 1024
  critic_hidden_dim: 1024
  critic_layers: 3
  activation: silu
  norm: rms
  outscale: 0.0
  num_bins: 255
  bin_min: -20.0
  bin_max: 20.0

classifier:
  latent_dim: ${task.legacy_action_hidden.wm_obs_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.legacy_action_hidden.chunk_size}
  token_dim: ${task.legacy_action_hidden.token_dim}
  window: 8
  hidden_dim: 1024
  num_layers: 4
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.1
  granularity: chunk
  chunk_size: ${task.legacy_action_hidden.chunk_size}
  chunk_pool: last

algorithm:
  update_type: wmpo_outcome
  wmpo:
    chunk_size: ${task.legacy_action_hidden.chunk_size}
    episode_max_steps: 300
    classifier_min_steps: 4
    filter_zero_variance_groups: true
  actor_input_mode: pooled
  rssm_action_scale: env
  rssm_action_clip: true
  imag_last: 4
  imagination_horizon: 5
  horizon: 333
  contdisc: true
  lam: 0.95
  actent: 0.0
  kl_coef: 0.01
  kl_penalty_kind: kl
  actor_bc_to_ref_scale: 0.1
  ppo_rollouts_per_start: 4
  ppo_update_epochs: 1
  ppo_gamma: 1.0
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  advantage_eps: 1.0e-6
  slowtar: false
  slowreg: 1.0
  repval_loss: true
  repval_scale: 0.3
  target_critic_tau: 0.02
  return_tracker:
    decay: 0.99
    low: 0.05
    high: 0.95
  return_normalization:
    mode: dreamerv3
    low: 0.05
    high: 0.95
    eps: 1.0e-6

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adamw
    lr: 2.0e-6
    betas: [0.9, 0.999]
    eps: 1.0e-20
    weight_decay: 0.0
  policy:
    name: adam
    lr: 5.0e-7        # slow policy so the WM keeps up with policy distribution shift
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0
  critic:
    name: adam
    lr: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01
  classifier:
    name: adamw
    lr: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 1.0e-4

dataloader:
  batch_size: 4

runner:
  logger:
    logger_backends: [tensorboard]   # local only; no W&B API key needed
    project_name: dreamervla
    log_path: ${training.out_dir}/log

checkpoint:
  save_last_ckpt: true
  topk:
    monitor_key: rollout_success_rate
    mode: max
    k: 3
    format_str: 'step={global_step:06d}-succ={rollout_success_rate:.4f}.ckpt'
