# @package _global_
# Canonical rollout collection recipe. Ray is the configured implementation backend.
defaults:
  - _self_
  - /task: openvla_onetraj_coldstart_libero

_target_: dreamervla.runners.RolloutCollectionRunner
mode: oft

launch:
  distributed: false
  ngpu: 1
  gpus: null
  master_port: 29502
  python: python
  write_libero_config: true
  required_target_values: []
  env: {}

collect:
  backend: ray
  policy_mode: discrete
  num_images_in_input: ${task.openvla_oft.num_images_in_input}
  episodes_per_task: 50   # all LIBERO init states per task (one episode each)
  episode_horizon: 64
  envs_per_gpu: 2
  demos_per_shard: 1      # 1 = one identity-named hdf5 per trajectory; >1 = roll a new shard every N demos; 0 = one shard per job
  memory_fraction: 0.8
  task_ids: all
  # Ray inference-worker count (multi-GPU collect; 1 = single GPU). Declared so the
  # multi_gpu profile's `collect.num_inference_workers=4` is a valid struct override
  # (the runner reads it via collect.get("num_inference_workers", 1)).
  num_inference_workers: 1

env:
  num_workers: 112   # osmesa CPU env-stepping processes; ~112 of 128 cores, ~16-core headroom (the e2e launcher profile/autoscale still overrides this)
  cfg:
    target: dreamervla.envs.libero.libero_env:DreamerVLAOnlineTrainEnv
    use_from_config: true
    render_backend: osmesa

rollout:
  target_episodes: 4
  # max_steps unset -> auto-derives as target_episodes * episode_horizon so the
  # full per-task init-state sweep is never truncated (real stop = done_count>=target).

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/coldstart_oft}
  distributed_strategy: single
  data_parallel: false
  seed: 7
  resume: false
