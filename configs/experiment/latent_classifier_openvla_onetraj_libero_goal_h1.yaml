# @package _global_
defaults:
  - /task: openvla_onetraj_libero
  - _self_

_target_: dreamervla.runners.SuccessClassifierTrainingRunner
seed: 7

training:
  out_dir: ${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/classifier/wmpo_token_cls_openvla_onetraj_libero_goal_h1/${now:%Y%m%d_%H%M%S}
  seed: 7
  device: cuda
  checkpoint_format: torch
  resume: false
  num_epochs: 8
  steps_per_epoch: 0
  batch_size: 4
  val_batch_size: 32
  num_workers: 0
  lr: 3.0e-5
  weight_decay: 1.0e-4
  loss_type: bce
  label_smoothing: 0.0
  class_balanced: false
  log_every: 10
  eval_every: 250
  ckpt_every: 250
  thresh_min: 0.05
  thresh_max: 0.95
  thresh_steps: 19
  episode_eval_enabled: true
  episode_eval_min_steps: 0
  episode_eval_stride: 1
  episode_eval_batch: 32

runner:
  logger:
    project_name: dreamervla
    logger_backends: [tensorboard]
    log_path: ${training.out_dir}/log

data:
  success_dir_raw: ${task.collected_reward_dir}
  success_dir_hidden: ${task.collected_hidden_token_dir}
  failure_dir_raw: null
  failure_dir_hidden: null
  window: 8
  stride_train: 8
  stride_val: 8
  chunk_subsample: ${task.openvla_oft.hidden_token.chunk_size}
  chunk_pool: last
  proprio_keys: ${task.openvla_oft.hidden_token.proprio_keys}
  # Read lang_emb from each matched hidden sidecar so success/failure demo keys
  # do not need to coexist in one shared language directory.
  lang_emb_dir: __source_hidden__
  lang_emb_key: lang_emb
  sampling_protocol: wmpo
  balance_batches: true

classifier:
  _target_: dreamervla.algorithms.critic.latent_success_classifier.LatentSuccessClassifier
  latent_dim: ${task.openvla_oft.hidden_token.classifier_latent_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.openvla_oft.hidden_token.chunk_size}
  token_dim: ${task.openvla_oft.hidden_token.token_dim}
  token_count: ${task.openvla_oft.hidden_token.token_count}
  head_type: spatial_tf
  proprio_dim: ${task.openvla_oft.hidden_token.proprio_dim}
  proprio_emb_dim: ${task.openvla_oft.hidden_token.proprio_emb_dim}
  num_proprio_repeat: ${task.openvla_oft.hidden_token.num_proprio_repeat}
  lang_dim: ${task.openvla_oft.hidden_token.lang_dim}
  lang_emb_dim: ${task.openvla_oft.hidden_token.lang_emb_dim}
  num_lang_repeat: ${task.openvla_oft.hidden_token.num_lang_repeat}
  window: ${data.window}
  hidden_dim: 1024
  num_layers: 12
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.1
  output_dim: 1
  granularity: chunk
  chunk_size: ${data.chunk_subsample}
  chunk_pool: ${data.chunk_pool}
