# @package _global_
defaults:
  - _self_
  - /task: openvla_onetraj_coldstart_libero

_target_: dreamervla.runners.ColdStartRayCollectRunner
mode: oft

collect:
  policy_mode: auto
  num_images_in_input: ${task.openvla_oft.num_images_in_input}
  episodes_per_task: 50   # all LIBERO init states per task (one episode each)
  episode_horizon: 64
  envs_per_gpu: 2
  memory_fraction: 0.8
  task_ids: all

env:
  num_workers: 2
  cfg:
    target: dreamervla.envs.train_env:DreamerVLAOnlineTrainEnv
    use_from_config: true

rollout:
  target_episodes: 4
  # max_steps unset -> auto-derives as target_episodes * episode_horizon so the
  # full per-task init-state sweep is never truncated (real stop = done_count>=target).

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/ray_coldstart_oft}
  distributed_strategy: single
  data_parallel: false
  seed: 7
  resume: false
