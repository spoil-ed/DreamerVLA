# @package _global_
defaults:
  - /task: openvla_onetraj_coldstart_libero
  - override /dreamervla: online_cotrain_pipeline_openvla_oft_action_hidden
  - _self_

# Mainline cotrain logging: TensorBoard + W&B, offline by default (no API key needed;
# sync later with `wandb sync`). Set in the experiment body so it wins over the
# `logger=tensorboard_wandb` group default. Use runner.logger.wandb_mode=online to stream.
runner:
  logger:
    logger_backends: [tensorboard, wandb]
    wandb_mode: offline
    wandb_proxy: null
