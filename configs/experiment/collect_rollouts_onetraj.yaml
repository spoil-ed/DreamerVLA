# @package _global_
# Pure-Hydra cold-start rollout collection.  Single source of truth = the task.
#   torchrun --standalone --nproc_per_node=M -m dreamervla.train \
#     experiment=collect_rollouts_onetraj task=openvla_onetraj_coldstart_libero
defaults:
  - _self_
  - /task: openvla_onetraj_coldstart_libero

_target_: dreamervla.runners.CollectRolloutsRunner

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/collect_rollouts/${task.name}/${now:%Y%m%d_%H%M%S}}
  distributed_strategy: single
  data_parallel: false
  seed: 7
  resume: false

collect:
  policy_mode: auto        # auto-detect l1 vs discrete from the checkpoint
  num_images_in_input: ${task.openvla_oft.num_images_in_input}
  gpu_id: 0                # single-process device; ignored under torchrun
  task_ids: all            # "all", csv ("0,2"), int, or list
  episodes_per_task: 50    # all LIBERO init states per task (one episode each)
  episode_horizon: 64      # must be >= WM sequence_length (36 for discrete chunk WM)
  envs_per_gpu: 1          # K within-rank envs; >1 enables batched vectorized path
  demos_per_shard: 0       # 0 = one shard per rank; >0 = slice demos into N-sized shards
  memory_fraction: 0.8     # PyTorch allocator cap for the collector process
  render_backend: osmesa   # osmesa default (parallel subprocess); egl explicit opt-in
  render_devices: []       # empty -> use the collector-visible GPU pool
  min_free_gpu_gb: 18.0    # preflight: fail fast if a rank's GPU has less free (0 disables)
