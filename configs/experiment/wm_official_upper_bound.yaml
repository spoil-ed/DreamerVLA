# @package _global_
# Pre-mainline WM capacity test trained only from official LIBERO data.
defaults:
  - wm_full_dataset_train
  - override /pre_mainline: libero_goal_official
  - _self_

pre_mainline:
  stage: wm_upper_bound

training:
  out_dir: ${oc.env:RUN_ROOT,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/pre_mainline/wm/${now:%Y%m%d_%H%M%S}}
  classifier_warmup_steps: 0

offline_warmup:
  data_dir: ${task.hdf5_reward_dir}
  hidden_dir: ${task.openvla_oft.hidden_token_dir}
  required_task_ids: ${pre_mainline.official_task_ids}
  require_reference_complete: false

online_rollout:
  total_env_steps: 0
