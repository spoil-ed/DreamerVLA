_target_: src.workspace.dreamer_v3_vla_workspace.DreamerV3VLAWorkspace

seed: 7

hydra:
  run:
    dir: .
  output_subdir: null

trainer:
  device: cuda
  debug: false

# ── training ──────────────────────────────────────────────────────────────────
training:
  device: cuda
  out_dir: /home/user01/yuxinglei/workspace/DreamerVLA/data/outputs/dreamer_v3_vla_libero_10
  debug: false
  resume: false
  distributed_strategy: ddp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: false
  num_epochs: 20
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  checkpoint_every: 1
  use_ema: false
  lr_scheduler: cosine
  lr_warmup_steps: 500

  # Per-batch alternation: Phase-1 WM step → Phase-2 DreamerV3 actor-critic step
  run_wm_phase: true
  run_actor_critic_phase: true

ema:
  decay: 0.9999
  update_after_step: 0

eval:
  eval_every: 1

# ── model init ────────────────────────────────────────────────────────────────
init:
  vla_ckpt_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10

# ── encoder (frozen feature extractor) ───────────────────────────────────────
encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/models--Alpha-VLLM--Lumina-mGPT-7B-768
  text_tokenizer_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 10
  pool: mean

# ── world model (TSSM, trains in Phase-1; unchanged from V1/V2) ──────────────
world_model:
  _target_: src.models.world_model.TSSMWorldModel
  hidden_dim: 4096          # overridden at runtime from encoder output dim
  action_dim: 7
  latent_dim: 256
  state_token_count: 1
  mapper_hidden_dim: 1024
  dynamics_hidden_dim: 4096
  reward_hidden_dim: 512
  reward_loss_coef: 0.1
  kl_loss_coef: 0.1
  min_std: 0.1
  pretrained_model_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/ckpts/Action_World_model_512/libero_10
  freeze_transition_backbone: false
  backbone_dtype: bfloat16
  transition_time_horizon: null

# ── policy (Dreamer actor, acts in WM latent space) ──────────────────────────
policy:
  _target_: src.models.vla_policy.VLAPolicy
  action_dim: 7
  hidden_dim: 4352            # latent_dim(256) + dynamics_hidden_dim(4096)
  policy_head_hidden_dim: 512
  initial_log_std: -0.5
  min_log_std: -5.0
  max_log_std: 2.0

# ── critic (DreamerV3 twohot critic; online + target copy instantiated together) ─
critic:
  _target_: src.models.critic.twohot_critic.TwohotCritic
  hidden_dim: 4352            # latent_dim(256) + dynamics_hidden_dim(4096)
  critic_hidden_dim: 512
  num_bins: 255
  bin_min: -20.0
  bin_max: 20.0

# ── DreamerV3 actor-critic hyper-params ──────────────────────────────────────
algorithm:
  imagination_horizon: 15
  gamma: 0.997              # DreamerV3 default
  lam: 0.95
  entropy_coef: 3.0e-4      # DreamerV3 fixed entropy bonus
  target_critic_tau: 0.02   # Polyak averaging rate for target critic

  return_tracker:
    decay: 0.99
    low: 0.05               # P5
    high: 0.95              # P95

# ── dataset ───────────────────────────────────────────────────────────────────
dataset:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize.yaml

dataset_val_ind:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize_val_ind.yaml

dataset_val_ood:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/yuxinglei/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize_val_ood.yaml

dataloader:
  batch_size: 4
  num_workers: 4
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true

# ── optimizers ────────────────────────────────────────────────────────────────
optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true

  world_model:
    name: adam
    lr: 1.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

  policy:
    name: adam
    lr: 3.0e-5
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

  critic:
    name: adam
    lr: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

# ── checkpointing ─────────────────────────────────────────────────────────────
checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: epoch_returns_mean
    mode: max
    k: 3
    format_str: 'epoch={epoch:03d}-epoch_returns_mean={epoch_returns_mean:.4f}.ckpt'
