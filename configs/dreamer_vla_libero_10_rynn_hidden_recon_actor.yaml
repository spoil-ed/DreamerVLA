_target_: src.workspace.dreamer_vla_workspace.DreamerVLAWorkspace

seed: 7

hydra:
  run:
    dir: ${training.out_dir}
  output_subdir: .hydra

trainer:
  device: cuda
  debug: false

training:
  out_dir: /home/user01/liops/workspace/DreamerVLA/data/outputs/dreamervla/rynn_hidden_recon_actor
  debug: false
  resume: false
  distributed_strategy: fsdp
  fsdp_mixed_precision: bf16
  enable_activation_checkpointing: true
  num_epochs: 20
  gradient_accumulate_every: 1
  tqdm_interval_sec: 1.0
  max_train_steps: null
  checkpoint_every: 1
  use_ema: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  run_wm_phase: true
  run_actor_critic_phase: true

init:
  vla_ckpt_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/VLA_model_256/libero_10
  encoder_state_ckpt: /home/user01/liops/workspace/DreamerVLA/data/outputs/vla/pretokenize_vla/pretokenize_vla_libero_10_20260425_015740/checkpoints/epoch=005-train_vla_loss=2.840.ckpt
  world_model_state_ckpt: null

encoder:
  _target_: src.models.encoder.RynnVLAEncoder
  model_path: ${init.vla_ckpt_path}
  tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/models--Alpha-VLLM--Lumina-mGPT-7B-768
  text_tokenizer_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/text_tokenizer.json
  chameleon_vqgan_config: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.yaml
  chameleon_vqgan_ckpt: /home/user01/liops/workspace/DreamerVLA/data/ckpts/chameleon/tokenizer/vqgan.ckpt
  resolution: 256
  action_dim: 7
  time_horizon: 10
  pool: mean

dataset:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize.yaml
  history: 2
  batch_length: 31
  replay_context: 1
  sequence_length: 32
  stride: 1
  sequence_next_obs_source: current_obs

dataset_val_ind:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize_val_ind.yaml

dataset_val_ood:
  _target_: src.dataloader.pretokenize_dataset.PretokenizeDataset
  config_path: /home/user01/liops/workspace/DreamerVLA/data/configs/libero_goal/his_2_third_view_wrist_w_state_10_256_pretokenize_val_ood.yaml

dataloader:
  batch_size: 2
  num_workers: 2
  shuffle: true
  drop_last: false
  pin_memory: true
  persistent_workers: true

world_model:
  _target_: src.models.world_model.TSSMWorldModel
  hidden_dim: 4096
  action_dim: 7
  latent_dim: 256
  state_token_count: 1
  mapper_hidden_dim: 1024
  dynamics_hidden_dim: 4096
  reward_hidden_dim: 512
  reward_loss_coef: 0.1
  kl_loss_coef: 0.1
  min_std: 0.1
  pretrained_model_path: /home/user01/liops/workspace/DreamerVLA/data/ckpts/Action_World_model_512/libero_10
  freeze_transition_backbone: false
  backbone_dtype: bfloat16
  transition_time_horizon: null
  # Actor receives transition_head(latent.feature()), i.e. a reconstructed
  # RynnVLA hidden observation, then runs the native VLA action head directly.
  actor_input_mode: predicted_obs

policy:
  _target_: src.models.vla_actor.VLAActionHeadActor
  hidden_dim: 4096
  action_dim: 7
  time_horizon: 10
  vla_hidden_size: 4096
  hidden_size_factor: 0.25
  num_encoder_layers: 2
  adapter_type: identity
  adapter_hidden_dim: 1024
  initial_log_std: -0.5
  min_log_std: -5.0
  max_log_std: 2.0
  init_action_head_ckpt: ${init.encoder_state_ckpt}

critic:
  _target_: src.models.critic.twohot_critic.TwohotCritic
  hidden_dim: 4096
  critic_hidden_dim: 512
  num_bins: 255
  bin_min: -20.0
  bin_max: 20.0

algorithm:
  imag_last: 0
  imagination_horizon: 15
  horizon: 333
  contdisc: true
  lam: 0.95
  actent: 3.0e-4
  slowtar: false
  slowreg: 1.0
  target_critic_tau: 0.02
  return_tracker:
    decay: 0.99
    low: 0.05
    high: 0.95

optim:
  grad_clip_norm: 1.0
  zero_grad_set_to_none: true
  world_model:
    name: adam
    lr: 1.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01
  policy:
    name: adam
    lr: 3.0e-5
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01
  critic:
    name: adam
    lr: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

eval:
  eval_every: 1

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    monitor_key: epoch_returns_mean
    mode: max
    k: 3
    format_str: 'epoch={epoch:03d}-epoch_returns_mean={epoch_returns_mean:.4f}.ckpt'
