# @package _global_
# Scheme B classifier over OpenVLA-OFT frame-level projected vision tokens.
defaults:
  - openvla_oft_action_chunk
  - _self_

classifier:
  latent_dim: ${task.openvla_oft.input_tokens.classifier_latent_dim}
  token_dim: ${task.openvla_oft.input_tokens.token_dim}
  token_count: ${task.openvla_oft.input_tokens.token_count}
  head_type: spatial_tf
  proprio_dim: ${task.openvla_oft.input_tokens.proprio_dim}
  proprio_emb_dim: ${task.openvla_oft.input_tokens.proprio_emb_dim}
  num_proprio_repeat: ${task.openvla_oft.input_tokens.num_proprio_repeat}
  lang_dim: ${task.openvla_oft.input_tokens.lang_dim}
  lang_emb_dim: ${task.openvla_oft.input_tokens.lang_emb_dim}
  num_lang_repeat: ${task.openvla_oft.input_tokens.num_lang_repeat}
  chunk_size: ${task.openvla_oft.input_tokens.chunk_size}

data:
  success_dir_hidden: ${task.openvla_oft.input_token_hidden_dir}
  failure_dir_hidden: ${task.openvla_oft.failure_input_token_hidden_dir}
  proprio_keys: ${task.openvla_oft.input_tokens.proprio_keys}
  lang_emb_dir: ${task.openvla_oft.input_tokens.lang_emb_dir}
  chunk_subsample: ${task.openvla_oft.input_tokens.chunk_size}

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/dreamervla/outcome_classifier/oft/${task.name}/input_tokens_chunk}
