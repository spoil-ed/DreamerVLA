# @package _global_
# LatentSuccessClassifier — CHUNK-LEVEL variant aligned 1:1 with the
# action-level small_tf baseline, with ONLY the time unit reinterpreted:
#
#   action-level (small_tf):                     chunk-level (this config):
#     window=8 env-steps consecutive               window=8 chunks (= 40 env-steps)
#     stride_train=8 env-steps (non-overlap)       stride_train=8 chunks = 40 env-steps
#     stride_val=1 env-step (dense sweep)          stride_val=1 chunk  = 5 env-steps
#     1 "frame" = 1 env-step hidden                1 "frame" = chunk-end hidden
#
# Every other knob (arch, optimizer, regularization, num_epochs, batch_size,
# label_smoothing, weight_decay, episode_eval cadence) is byte-identical to
# the earlier small_tf config — only the data-time unit and the chunk-pool
# fields change.
#
# chunk_pool="last" matches the user spec "实实在在做完 chunk 的那一帧": each
# classifier-frame is the hidden AT the end of the chunk (= after executing
# the K-action chunk), which is also what the chunk WM's
# predict_next_chunk hidden_seq[:, -1] emits at inference time.
#
# Launch:
#   bash scripts/train_wm.sh experiment=latent_classifier_libero_goal_chunk task=rynnvla_libero gpus=4

defaults:
  - _self_
  - /task: libero_goal

_target_: dreamervla.runners.LatentClassifierRunner

classifier:
  latent_dim: ${task.legacy_action_hidden.wm_obs_dim}
  action_dim: ${task.action_dim}
  time_horizon: ${task.legacy_action_hidden.chunk_size}
  token_dim: ${task.legacy_action_hidden.token_dim}
  window: 8
  head_type: transformer
  hidden_dim: 256
  num_layers: 4
  num_heads: 4
  mlp_ratio: 2.0
  dropout: 0.5
  granularity: chunk
  chunk_size: ${task.legacy_action_hidden.chunk_size}
  chunk_pool: last

data:
  success_dir_raw: ${task.hdf5_dir}
  success_dir_hidden: ${task.rynnvla_action_hidden_dir}
  failure_dir_raw: ${task.hdf5_dir}_failures
  failure_dir_hidden: ${task.hdf5_dir}_failures_legacy_action_hidden_vla_policy_h2
  window: 8
  # stride values in env-step units; mapped to "chunks" by multiplying by K=5
  # so they match small_tf's stride semantics: stride_train = 1 window-length
  # (non-overlapping negatives), stride_val = 1 unit (dense sweep).
  stride_train: 40
  stride_val: 5
  chunk_subsample: ${task.legacy_action_hidden.chunk_size}
  chunk_pool: last

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,${oc.env:DVLA_ROOT,.}/data}/outputs/dreamervla/outcome_classifier/${task.name}/wmpo_aligned_small_tf_chunk}
  device: cuda
  seed: 0
  resume: false

  # ---- optimization (byte-identical to small_tf) ----
  num_epochs: 20
  max_steps: null
  batch_size: 32
  val_batch_size: 256
  num_workers: 2
  lr: 1.0e-4
  weight_decay: 1.0e-2
  label_smoothing: 0.1
  class_balanced: false

  # ---- cadence ----
  eval_every: 200
  ckpt_every: 500
  log_every: 50

  # ---- threshold sweep ----
  thresh_min: 0.3
  thresh_max: 1.0
  thresh_steps: 20

  # ---- episode-level eval ----
  # CHUNK units (native).  Effective gate: first_end_chunk = max(W, min_steps + W)
  # = max(8, 7 + 8) = 15 chunks → 75 env-step (K=5).  Matches action-level
  # small_tf baseline (W=8 env-step + min_steps=64 → first_end=72 env-step).
  # Lower min_steps would false-negative success demos finishing early.
  episode_eval_enabled: true
  episode_eval_min_steps: 7  # CHUNK units (was 32 env-step / K=5, ceil → 7)
  episode_eval_stride: 1     # CHUNK units
  episode_eval_batch: 256
