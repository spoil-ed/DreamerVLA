# @package _global_
# Scheme B classifier over RynnVLA frame-level input-token latents.
defaults:
  - rynnvla_action_chunk
  - _self_

classifier:
  latent_dim: 4096
  token_dim: 4096
  token_pool: mean
  chunk_size: 5

data:
  success_dir_hidden: ${oc.env:DVLA_DATA_ROOT,data}/processed_data/libero_goal/libero_goal_no_noops_t_256_pi0_input_token_embedding_vla_policy_h2
  failure_dir_hidden: ${oc.env:DVLA_DATA_ROOT,data}/processed_data/libero_goal/libero_goal_no_noops_t_256_failures_pi0_input_token_embedding_vla_policy_h2
  chunk_subsample: 5

training:
  out_dir: ${oc.env:DVLA_DATA_ROOT,data}/outputs/dreamervla/outcome_classifier/libero_goal/input_tokens_chunk
