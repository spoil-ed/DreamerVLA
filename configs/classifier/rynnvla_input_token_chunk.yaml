# @package _global_
# Scheme B classifier over RynnVLA frame-level input-token latents.
defaults:
  - rynnvla_action_chunk
  - _self_

classifier:
  latent_dim: 4096
  token_dim: 4096
  token_pool: mean
  chunk_size: 5

data:
  success_dir_hidden: ${task.rynnvla_input_token_hidden_dir}
  failure_dir_hidden: ${task.hdf5_dir}_failures_input_token_embedding_vla_policy_h2
  chunk_subsample: 5

training:
  out_dir: ${oc.env:OUT_DIR,${oc.env:DVLA_DATA_ROOT,data}/outputs/dreamervla/outcome_classifier/${task.name}/input_tokens_chunk}
